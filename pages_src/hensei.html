// 仅本地 dev 環境で stats 計算 trace を表示。GitHub Pages 上では UI 入口無効・生成も no-op。
// 判定対象：localhost / 127.0.0.1 / file:// / LAN IP (192.168.x.x / 10.x.x.x / 172.16-31.x.x) / *.local
// （スマホ実機テスト時は LAN IP 経由でアクセスするため、これらも dev 扱い）。
const IS_LOCAL_DEV = (() => {
  if (typeof location === 'undefined') return false;
  const h = location.hostname;
  if (!h || h === 'localhost' || h === '127.0.0.1' || location.protocol === 'file:') return true;
  if (h.endsWith('.local')) return true;
  if (/^192\.168\.\d+\.\d+$/.test(h)) return true;
  if (/^10\.\d+\.\d+\.\d+$/.test(h)) return true;
  if (/^172\.(1[6-9]|2\d|3[01])\.\d+\.\d+$/.test(h)) return true;
  return false;
})();

export const elementMatchupMult = (srcElem, tgtElem, mode) => {
  if (mode === 'guildbattle') {
    const k = (ELEMENT_K_GUILD[srcElem]||{})[tgtElem] || 0;
    if (k === 3)  return 15.0;
    if (k === 2)  return 10.0;
    if (k === -2) return 0.1;
    return 1.0;
  }
  if (mode === 'guildbattle_special') {
    const k = (ELEMENT_K_GUILD_SPECIAL[srcElem]||{})[tgtElem] || 0;
    if (k === 3)  return 15.0;     // 特別版正向克制（用 ギルバト 同值）
    if (k === -3) return 0.01;
    return 1.0;
  }
  // normal / other
  const k = (ELEMENT_K_NORMAL[srcElem]||{})[tgtElem] || 0;
  if (k === 1)  return 2.0;
  if (k === -1) return 0.5;
  return 1.0;
}

export const _applyRevise = (arr, revise) => {
  if (!Array.isArray(revise)) return;
  const idx = new Map(arr.map((c, i) => [c.id, i]));
  revise.forEach(r => {
    const i = idx.get(r.id);
    if (i != null) deepApply(arr[i], r);
  });
}

Promise.all([

  fetch('../data/souls.json').then(r=>r.json()),
  fetch('../data/bladegraphs.json').then(r=>r.json()),

  fetch('../data/masou.json').then(r=>r.ok?r.json():[]).catch(()=>[]),

// ===== HELPERS =====
const getBestState = (c) => {
  for (const s of ['極弐', '改造', '通常']) if (c?.states?.[s]) return c.states[s];
  return null;
}

export const crystalSlotCount = (c, slotIdx) => {
  if(!c) return 0;
  const trState = slotIdx != null ? team[slotIdx]?.tr?.state : null;
  const st = (trState && c.states?.[trState]) ? c.states[trState] : getBestState(c);
  let n = parseInt(st?.basic_info?.['結晶スロット']??0)||0;
  // 結婚（marriage != 0）→ 結晶スロット +1
  if(slotIdx != null && team[slotIdx]?.tr?.marriage){ n += 1; }
  return n;
}

export const fmtVal = (ef) => {
  const bunrui = ef.bunrui || [];
  const isHitOnly = bunrui.length===1 && bunrui[0]===7;
  if(isHitOnly) return fmtHitStages(ef);
  let v = '';
  if (ef.bairitu != null && ef.bairitu !== 0) {
    const sc = ef.bairitu_scaling;
    // ct: 0=×, 1=+, 2=+(終), 3=×(終)
    const ct  = ef.calc_type ?? 0;
    const pfx = ct === 1 ? '+' : ct === 2 ? '+(終)' : ct === 3 ? '×(終)' : 'x';
    const isAddCt = (ct === 1 || ct === 2);
    // inner: 加算は単値、乗算は init〜max 範囲対応
    let inner;
    if (!isAddCt) {
      const lo = ef.bairitu_init, hi = ef.bairitu;
      inner = (lo != null && lo !== hi) ? fmtLarge(lo) + '〜' + fmtLarge(hi) : fmtLarge(hi);
    } else {
      inner = fmtLarge(ef.bairitu);
    }
    // sc あり → 括弧で括って "+(v + sc * 熟度)"。なし → 単に "+v"。
    v = pfx + (sc ? '(' + inner + ' + ' + sc + ' * 熟度)' : inner);
  }
  if (bunrui.includes(7)) {
    const hitStr = fmtHitStages(ef);
    if (hitStr) v += (v ? ' / ' : '') + hitStr;
  }
  return v;
}
// scope tag のスタイル/略称は utils.js / soul-render.js と統一（自/全/X/X·自/X·全）。
export const fmtScopeTag = (ef) => {
  const elStr = ef.element != null ? [].concat(ef.element).map(e => ELEMENT[e] || e).join('/') : '';
  const tyStr = ef.weapon    != null ? [].concat(ef.weapon   ).map(t => WEAPON [t] || t).join('/') : '';
  const parts = [elStr, tyStr].filter(Boolean);
  const lim   = parts.join('·');
  if (ef.scope === 0) return '<span class="scope-tag scope-self">自</span>';
  if (ef.scope === 1) return '<span class="scope-tag scope-all">全</span>';
  if (ef.scope === 2) return '<span class="scope-tag scope-lim">'      + (lim || '限') + '</span>';
  if (ef.scope === 3) return '<span class="scope-tag scope-equip-s">' + (lim || '装') + '·自</span>';
  if (ef.scope === 4) return '<span class="scope-tag scope-equip-a">' + (lim || '装') + '·全</span>';
  if (ef.scope === 5) {
    const nm = ef.name ? escHtml(ef.name).slice(0,12) : '限';
    return '<span class="scope-tag scope-lim">' + nm + '限定</span>';
  }
  return '';
}
export const renderEfRow = (ef) => {
  const btags = (ef.bunrui||[]).map(b => `<span class="bunrui-tag">${escHtml(BUNRUI_SHORT[b]||b)}</span>`).join('');
  const cond  = ef.condition ? `<span class="cond-tag cond-${ef.condition}">${CONDITION[ef.condition]}</span>` : '';
  return `<div class="eftags">${btags}<span class="tag-val">${fmtVal(ef)}</span>${fmtScopeTag(ef)}${cond}</div>`;
}
export const _resolveCharaSkills = (c, trState) => {
  if(!c||!c.states) return [];
  let stateLabel=null, state=null;
  if(trState && c.states[trState]){ stateLabel=trState; state=c.states[trState]; }
  else { for(const s of ['極弐','改造','通常']){ if(c.states[s]){ stateLabel=s; state=c.states[s]; break; } } }
  if(!state) return [];
  const dead = new Set(Array.isArray(c._deleted_skills)?c._deleted_skills:[]);
  const base = (state.skills||[]).filter(sk=>!dead.has(sk.name||''));
  const added = (c._added_skills && c._added_skills[stateLabel]) || [];
  return base.concat(added);
}
export const _resolveSoulSkills = (s) => {
  if(!s) return [];
  const dead = new Set(Array.isArray(s._deleted_skills)?s._deleted_skills:[]);
  const base = (s.skills||[]).filter(sk=>!dead.has(sk.name||''));
  const added = Array.isArray(s._added_skills)?s._added_skills:[];
  return base.concat(added);
}

  }).filter(Boolean).join('');
  return rows?'<div class="skills-panel">'+rows+'</div>':'';
}

// 乗性 delta 三次元公式（weight / purity / lv）：
//   factor_i = delta + (1 - delta) * pos     (pos ∈ [0,1])
//   ct=0/3 (mult/final-mult): eff = (baseB - 1) * factor + 1   (neutral=1)
//   ct=1/2 (add /final-add):  eff = baseB * factor             (neutral=0)
// delta 缺字段 / 空串 → factor=1 不衰减; delta=0 → 端点満衰减; step 仅 slider 颗粒度、不入公式。
const _crystalDimFactor = (pos, deltaRaw) => {
  if (deltaRaw == null || deltaRaw === '') return 1;
  const d = _parseScaling(deltaRaw);
  if (!Number.isFinite(d)) return 1;
  if (pos == null || !Number.isFinite(pos)) return 1;
  return d + (1 - d) * pos;
};
const _crystalEffectiveBairitu = (cr, cfg, e) => {
  const baseB = _parseScaling(e.bairitu);
  if (!Number.isFinite(baseB)) return null;
  const wPos = cfg.weight != null ? cfg.weight / 100 : null;
  const pPos = cfg.purity != null ? cfg.purity / 100 : null;
  const maxLv = cryLvMax(cr);
  const lvVal = cfg.lv != null ? cfg.lv : maxLv;
  const lvPos = maxLv > 1 ? (lvVal - 1) / (maxLv - 1) : 1;
  const fw  = _crystalDimFactor(wPos,  e.weight_delta);
  const fp  = _crystalDimFactor(pPos,  e.purity_delta);
  const flv = _crystalDimFactor(lvPos, e.lv_delta);
  const factor = fw * fp * flv;
  if (factor === 1) return baseB;
  const ct = e.calc_type ?? 0;
  return (ct === 0 || ct === 3) ? ((baseB - 1) * factor + 1) : (baseB * factor);
};
export const renderCrystalEffList = (cfgs) => {
  // cfgs: [{id, weight, purity}, ...] or null。weight/purity 衰减後 effective bairitu を表示。
  const items = (cfgs || []).filter(Boolean).map(cfg => {
    const cr = allCrystals.find(x => x.id === cfg.id);
    return cr ? { cr, cfg } : null;
  }).filter(Boolean);
  if (!items.length) return '';
  return '<div class="cr-eff-list">' + items.map(({cr, cfg}) => {
    const tags = (cr.effects || []).map(ef => {
      const btags = (ef.bunrui || []).map(b => `<span class="bunrui-tag">${escHtml(BUNRUI_SHORT[b]||b)}</span>`).join('');
      const eff = _crystalEffectiveBairitu(cr, cfg, ef);
      const val = (ef.calc_type === 1 ? '+' : 'x') + fmtLarge(eff, 3);
      return btags + `<span class="tag-val">${val}</span>`;
    }).join(' ');
    return `<div class="cr-eff-row"><span class="cr-eff-name" title="${escHtml(cr.name)}">${escHtml(cr.name)}</span><div class="cr-eff-tags">${tags}</div></div>`;
  }).join('') + '</div>';
}

export const autoAssignSoul = (si) => {
  const used=new Set(team.filter((_,i)=>i!==si).map(s=>s.soul).filter(Boolean));
  const byId=[...allSouls].sort((a,b)=>a.id-b.id);
  const found=byId.find(s=>!used.has(s.id));
  team[si].soul=found?found.id:null;
  _clampSoulTr(si);
}
// 把 tr.soul_lv / tr.soul_awakening 夹紧到当前 soul 的 cap（rarity 决定）
export const _clampSoulTr = (si) => {
  const soul=allSouls.find(x=>x.id===team[si].soul);
  if(!soul) return;
  const awMax=soulAwkMax(soul);
  if(team[si].tr.soul_awakening>awMax) team[si].tr.soul_awakening=awMax;
  const cap=soulLvCap(soul,team[si].tr.soul_awakening);
  if(team[si].tr.soul_lv>cap) team[si].tr.soul_lv=cap;
}
export const syncCrystals = (si) => {
  const c=allCharas.find(x=>x.id===team[si].chara);
  const n=crystalSlotCount(c, si),cur=team[si].crystals;
  if(cur.length<n)team[si].crystals=[...cur,...Array(n-cur.length).fill(null)];
  else if(cur.length>n)team[si].crystals=cur.slice(0,n);
}
export const setTeamSize = (n) => {
  teamSize=n;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.toggle('on',+b.dataset.n===n));
  for(let i=0;i<3;i++)document.getElementById('slot-'+i).classList.toggle('disabled',i>=n);
  if(isMob()&&mobileActiveSlot>=n){mobileActiveSlot=n-1;updateMobVisible();}
  else if(isMob())updateMobIndicator();
  refreshAllStats();
}
export const _maxOmoideThreshold = (c) => {
  if(!c||!Array.isArray(c.omoide))return 0;
  return c.omoide.reduce((m,r)=>Math.max(m,+r.threshold||0),0);
}
export const setChara = (si,id) => {
  // 清空 chara：只清魔剣 + 結晶 + 魔装；魂 / 心象結晶 保留
  if(id===null){team[si].chara=null;team[si].crystals=[];team[si].masou=null;renderSlot(si);refreshAllStats();return;}
  const other=team.findIndex((s,i)=>i!==si&&s.chara===id);
  if(other>=0){
    // swap entire slot — chara/soul/bg/masou/crystals/tr all move together（保留交换语义）
    [team[si],team[other]]=[team[other],team[si]];
    renderSlot(other);
  } else{
    // 更换魔剣（非 swap）：清空結晶 + 魔装（魔装是 chara 限定），魂 / 心象結晶不动
    team[si].chara=id;
    team[si].masou=null;
    const c=allCharas.find(x=>x.id===id);
    team[si].tr.affinity=_maxOmoideThreshold(c);
    // 重置 tr：默认最高 state（極弐>改造>通常）、awakening=0；SS 特例 38/255，其他 jukudo/lv = state max
    if(c){
      const r=c.rarity;
      const newState=['極弐','改造','通常'].find(s=>c.states?.[s])||'通常';
      team[si].tr.state=newState;
      team[si].tr.awakening=0;
      if(r===4){
        team[si].tr.jukudo=38;
        team[si].tr.level=255;
      } else {
        team[si].tr.jukudo=JUKUDO_MAX_TBL[r]?.[newState]||1;
        team[si].tr.level =LEVEL_MAX_TBL[r]?.[newState] ||1;
      }
    }
    if(!team[si].soul)autoAssignSoul(si);
    team[si].crystals=[];
    syncCrystals(si);
    equipAllOmoide(si);
  }
  renderSlot(si);refreshAllStats();
}
// 换 soul 时把 tr.soul_lv / tr.soul_awakening 重置：觉醒=0、lv=该觉醒下的 max（不保留上一只魂的进度）
const _resetSoulTr = (si) => {
  team[si].tr.soul_awakening = 0;
  const s = allSouls.find(x => x.id === team[si].soul);

export const setSoul = (si,id) => {
  if(id===null){team[si].soul=null;renderSlot(si);refreshAllStats();return;}

export const setCrystalDim = (si, ci, dim, val) => {  // dim: 'weight' | 'purity' | 'lv'
  const cfg = team[si].crystals[ci];

    cfg.lv = Math.max(1, Math.min(maxLv, Math.round(n)));

  }

// ===== 結晶 重量/純度 popover（⚙ 触发，浮在 slot-card 正上方）=====
let _crystalPopEl = null;
let _crystalPopHandler = null;
// row 排版：[label][slider][number][unit]、slider/number 双向同步、都触发 setCrystalDim
const _popRow = (si, ci, kind, opts) => {
  const { label, min, max, step, value, unit, oninp } = opts;
  return `<div class="pop-row" data-kind="${kind}">
    <label>${label}</label>
    <input type="range"   min="${min}" max="${max}" step="${step}" value="${value}" oninput="this.parentNode.querySelector('input[type=number]').value=this.value;${oninp}">
    <input type="number" min="${min}" max="${max}" step="${step}" value="${value}" oninput="this.parentNode.querySelector('input[type=range]').value=this.value;${oninp}">
    <span class="pop-unit">${unit}</span>
  </div>`;
};
export const openCrystalDimPopover = (si, ci, btnEl) => {
  closeCrystalDimPopover();
  const cfg = team[si]?.crystals?.[ci];
  if (!cfg) return;
  const cr = allCrystals.find(x => x.id === cfg.id);
  if (!cr) return;
  const wStep = _parseScaling(cr.weight_step);
  const pStep = _parseScaling(cr.purity_step);
  const hasLv = (cr.effects || []).some(e => e.lv_delta !== undefined);
  const maxLv = cryLvMax(cr);
  if (!wStep && !pStep && !(hasLv && maxLv > 1)) return;
  const wRow = wStep > 0 ? _popRow(si, ci, 'weight', {
    label: '重', min: 0, max: 100, step: wStep, value: cfg.weight ?? 100, unit: 'g',
    oninp: `setCrystalDim(${si},${ci},'weight',this.value)`,
  }) : '';
  const pRow = pStep > 0 ? _popRow(si, ci, 'purity', {
    label: '純', min: 0, max: 100, step: pStep, value: cfg.purity ?? 100, unit: '%',
    oninp: `setCrystalDim(${si},${ci},'purity',this.value)`,
  }) : '';
  const lvRow = (hasLv && maxLv > 1) ? _popRow(si, ci, 'lv', {
    label: 'Lv', min: 1, max: maxLv, step: 1, value: cfg.lv ?? maxLv, unit: '',
    oninp: `setCrystalDim(${si},${ci},'lv',this.value)`,
  }) : '';
  const pop = document.createElement('div');
  pop.className = 'crystal-dim-popover';
  pop.innerHTML = `
    <div class="pop-title">${escHtml(cr.name)}</div>
    ${wRow}${pRow}${lvRow}
    <div class="pop-actions">
      <button onclick="resetCrystalDim(${si},${ci})">リセット</button>
      <button onclick="closeCrystalDimPopover()">×</button>
    </div>`;
  document.body.appendChild(pop);
  _crystalPopEl = pop;
  // 定位：「整个結晶 section 的正上方」— anchor 用 ⚙ 所在的 .equip-section（記憶結晶 那一块）；
  // 箭头横向指向 ⚙ 自身。
  const card = btnEl?.closest('.equip-section');
  const cardRect = card ? card.getBoundingClientRect() : btnEl.getBoundingClientRect();
  const btnRect = btnEl.getBoundingClientRect();
  const popW = pop.offsetWidth;
  const popH = pop.offsetHeight;
  // 横向：以 slot-card 中心为基准；防溢出
  let left = cardRect.left + cardRect.width/2 - popW/2 + window.scrollX;
  const margin = 8;
  if (left < margin) left = margin;
  if (left + popW > window.innerWidth - margin) left = window.innerWidth - margin - popW;
  pop.style.left = left + 'px';
  // 纵向：卡片**上方**（pop 底边离卡片顶部 12px），箭头朝下指向 ⚙
  pop.style.top = (cardRect.top - popH - 12 + window.scrollY) + 'px';
  // 箭头 x：指向 ⚙ 按钮中心（不是卡片中心，更明确指向触发点）
  const arrowX = btnRect.left + btnRect.width/2 - left + window.scrollX;
  pop.style.setProperty('--arrow-x', Math.max(12, Math.min(popW - 12, arrowX)) + 'px');
  setTimeout(() => {
    _crystalPopHandler = (e) => {
      if (!pop.contains(e.target) && e.target !== btnEl) closeCrystalDimPopover();
    };
    document.addEventListener('click', _crystalPopHandler);
  }, 0);
};
export const closeCrystalDimPopover = () => {
  if (_crystalPopEl) { _crystalPopEl.remove(); _crystalPopEl = null; }
  if (_crystalPopHandler) {
    document.removeEventListener('click', _crystalPopHandler);
    _crystalPopHandler = null;
  }
};
export const resetCrystalDim = (si, ci) => {

}

export const renderTraining = (i,chara) => {
  if(!chara)return'';
  const r=chara.rarity,tr=team[i].tr;
  const stOpts=r===4?['通常','改造']:['通常','改造','極弐'];
  if(!stOpts.includes(tr.state))team[i].tr.state=tr.state='通常';
  const jMax=JUKUDO_MAX_TBL[r]?.[tr.state]??0;
  const aMax=AWAKENING_MAX_TBL[r]??0;
  const jk=Math.min(Math.max(1,tr.jukudo||1),jMax),aw=Math.min(tr.awakening,aMax);
  const lev1=LEVEL_1JUK_TBL[r]?.[tr.state],levMax=LEVEL_MAX_TBL[r]?.[tr.state];
  let lvCap=null;
  if(lev1!=null&&levMax!=null){const base=jk===0?lev1-5:Math.min(levMax,lev1+(jk-1)*5);lvCap=base+aw*5;}
  const lvCapDisp=lvCap!=null?lvCap:'-';

// ===== STATS CALCULATOR =====
const _STAT_KEYS = ['攻撃力','防御力','HP','ブレイク力'];
const _BUNRUI_TO_STAT = { 1:'攻撃力', 2:'ブレイク力', 10:'HP', 12:'防御力' };

export const _capLevel = (chara, tr) => {
  const r = chara.rarity;
  const lev1 = LEVEL_1JUK_TBL[r]?.[tr.state];
  const levMax = LEVEL_MAX_TBL[r]?.[tr.state];
  if (lev1 == null || levMax == null) return null;
  const jMax = JUKUDO_MAX_TBL[r]?.[tr.state] ?? 1;
  const jk = Math.min(Math.max(1, tr.jukudo||1), jMax);
  return Math.min(levMax, lev1 + (jk-1) * 5);
}

export const _baseStat = (chara, tr, attr) => {
  const state = chara.states?.[tr.state];
  const stMax = state?.stats?.max?.[attr];
  if (stMax == null) return null;
  // initial / max ratio: always from 通常 state for non-通常 calculation
  const sourceState = (tr.state === '通常') ? state : chara.states?.['通常'];
  const initial = sourceState?.stats?.initial?.[attr];
  const normalMax = sourceState?.stats?.max?.[attr];
  const r = chara.rarity;
  const levMax = LEVEL_MAX_TBL[r]?.[tr.state];
  const cap = _capLevel(chara, tr);
  if (cap == null || levMax == null || levMax <= 1 || initial == null || normalMax == null) return stMax;
  const lvBase = Math.min(tr.level || 1, cap);
  let v = stMax * (1 - (levMax - lvBase) / (levMax - 1) * initial / normalMax);
  // Awakening boost when level exceeds base cap
  if ((tr.level || 1) > cap) {
    const aMax = AWAKENING_MAX_TBL[chara.rarity] || 1;
    const mult = AWAKENING_MULT_TBL[chara.rarity] || 1;
    const overLv = (tr.level || 1) - cap;
    v = v * (1 + overLv / (aMax * 5) * (mult - 1));
  }
  return v;
}

export const _omoidePicksFor = (chara, tr) => {
  // Returns array of senzai info objects for currently picked icons.
  // Gates by tr.affinity: only thresholds <= affinity contribute.
  const picks = tr.omoide_picks || {};
  const aff = +tr.affinity || 0;
  const result = [];
  (chara.omoide || []).forEach(row => {
    if ((+row.threshold || 0) > aff) return;
    const pickedIcon = picks[row.threshold];
    if (pickedIcon == null) return;
    const info = SENZAI_TABLE[pickedIcon] || SENZAI_TABLE[String(pickedIcon)];
    if (info) result.push(info);
  });
  return result;
}

export const _selfAppliesChara = (c, e) => {
  const sc = e.scope;
  if (sc === 0 || sc === 1) return true;
  if (sc === 2 || sc === 3) {
    const elem = e.element;
    const elemOK = elem == null || (Array.isArray(elem) ? elem.indexOf(c.element) >= 0 : elem === c.element);
    const tp = e.weapon;
    const typeOK = tp == null || (Array.isArray(tp) ? tp.indexOf(c.weapon) >= 0 : tp === c.weapon);
    return elemOK && typeOK;
  }
  return false;
}

// 元素 / 武器种匹配。useElementBuff=true 时（仅魔剣技能）拿 tgtChara.element_buff[]
// 做集合包含判定；其它来源（crystal / bladegraph / soul / guild）依然用单值 element。
export const _matchElemType = (e, tgtChara, useElementBuff) => {
  const elem = e.element;
  let elemOK;
  if (elem == null) {
    elemOK = true;
  } else {
    const reqElems = Array.isArray(elem) ? elem : [elem];
    const tgtElems = (useElementBuff && Array.isArray(tgtChara.element_buff) && tgtChara.element_buff.length)
      ? tgtChara.element_buff
      : [tgtChara.element];
    elemOK = reqElems.some(r => tgtElems.indexOf(r) >= 0);
  }
  const tp = e.weapon;
  const typeOK = tp == null || (Array.isArray(tp) ? tp.indexOf(tgtChara.weapon) >= 0 : tp === tgtChara.weapon);
  return elemOK && typeOK;
}

// Cross-slot: source (srcChara) buffs target (tgtChara). Returns true if effect e applies.
// useElementBuff=true → 魔剣技能特例，element 走 tgtChara.element_buff[]
export const _buffApplies = (srcChara, tgtChara, e, useElementBuff = false) => {
  if (!tgtChara) return false;
  const sc = e.scope;
  if (sc == null || sc === 1) return true; // 全体
  if (sc === 0) {
    return !!srcChara && srcChara.id === tgtChara.id;
  }
  if (sc === 3) {
    if (!srcChara || srcChara.id !== tgtChara.id) return false;
    return _matchElemType(e, tgtChara, useElementBuff);
  }
  if (sc === 2 || sc === 4) {
    return _matchElemType(e, tgtChara, useElementBuff);
  }
  if (sc === 5) {
    // chara 限定：精确相等のみ（substring を許すと "魔剣グラム" effect が
    // "魔剣グラム:Blaze" 等の別 chara に誤発火する。wiki 上 effect.name は
    // tgtChara.name と完全一致するのが正常 — 一致しない = wiki 表記不整合）
    const nm = e.name;
    return !!nm && tgtChara.name === nm;
  }
  return false;
}

// 魂等级 → 倍率加成。rarity 对应的"无觉醒最高等级" = rarity*10，超过后线性增长到 lv=75。
//   lv ≤ rarity*10:  1 + 0.01*lv
//   lv > rarity*10:  base = 1 + 0.1*rarity
//                    inc  = rarity===5 ? 0.3 : 0.1
//                    return base + inc * (lv - rarity*10) / (75 - rarity*10)
const SOUL_AWK_MAX = {1: 13, 2: 11, 3: 9, 4: 7, 5: 5};
export const soulMultiplier = (rarity, lv) => {
  const r = +rarity || 1;
  const L = Math.max(1, +lv || 1);
  const maxNoAwk = r * 10;
  if (L <= maxNoAwk) return 1 + 0.01 * L;
  const base = 1 + 0.1 * r;
  const range = 75 - maxNoAwk;
  if (range <= 0) return base;
  const inc = r === 5 ? 0.3 : 0.1;
  return base + inc * (L - maxNoAwk) / range;
}
// hit_per_stage* 値を数値化（"1/3" / "0.5" / 0.5 受け入れ、無効値は 0）。
const _parseHit = (s) => {
  if (s == null) return 0;
  if (typeof s === 'number') return Number.isFinite(s) ? s : 0;
  const t = String(s).trim();
  if (t === '') return 0;
  if (t.includes('/')) {
    const [n, d] = t.split('/').map(parseFloat);
    return (Number.isFinite(n) && Number.isFinite(d) && d !== 0) ? n / d : 0;
  }
  const v = parseFloat(t);
  return Number.isFinite(v) ? v : 0;
};

// soul affinity の atk/def_effect 値を数値化。"5/4" / "1.9" / 1.9 全部受け入れ、無効値は 1。
const _parseAff = (s) => {
  if (s == null) return 1;
  if (typeof s === 'number') return Number.isFinite(s) ? s : 1;
  const t = String(s).trim();
  if (t === '') return 1;
  if (t.includes('/')) {
    const [n, d] = t.split('/').map(parseFloat);
    return (Number.isFinite(n) && Number.isFinite(d) && d !== 0) ? n / d : 1;
  }
  const n = parseFloat(t);
  return Number.isFinite(n) ? n : 1;
};

// soul.max_awakening が定義されてれば SOUL_AWK_MAX[r] を上書き（覚醒不可な特例魂用）
export const soulAwkMax = (soul) => {
  const ovr = soul && soul.max_awakening;
  if (ovr != null && Number.isFinite(+ovr)) return +ovr;
  const r = +(soul && soul.rarity) || 1;
  return SOUL_AWK_MAX[r] || 0;
}
// lv cap = max_level + aw*5（最多 75）。max_level は通常 rarity*10 だが、souls_revise.json で
// 上書きされた特例魂（ダイナスティ/ディシディア = 1）は自然に cap=1 + 0 = 1 に落ちる。
export const soulLvCap = (soul, awakening) => {
  const maxLv = +(soul && soul.max_level) || 0;
  const aw = Math.min(+awakening || 0, soulAwkMax(soul));
  return Math.min(75, maxLv + aw * 5);
}

// HP-based condition factor (multiplier on bairitu)
//   1=逆窮鼠 → linear hp%/100  (0 at 0% HP → 1 at 100% HP)
//   2=窮鼠   → linear (100-hp%)/100  (1 at 0% HP → 0 at 100% HP)
//   3=破損 → binary  (1 if hp%<50 else 0)
//   0/null → 1
// Applied via:
//   additive: effective = bairitu * factor
//   multiplicative: effective = (bairitu - 1) * factor + 1
export const _conditionFactor = (condition, hpPct) => {
  if (!condition) return 1;
  // condition=4 (BK状態時) — 二元，依赖全局 enemy.bk
  if (condition === 4) return enemy.bk ? 1 : 0;
  let h = +hpPct; if (isNaN(h)) h = 100;
  h = Math.max(0, Math.min(100, h));
  if (condition === 1) return h / 100;
  if (condition === 2) return (100 - h) / 100;
  if (condition === 3) return h < 50 ? 1 : 0;
  return 1;
}

export const _parseScaling = (v) => {
  if (v == null || v === 0 || v === '') return 0;
  if (typeof v === 'number') return v;
  if (typeof v === 'string' && v.indexOf('/') >= 0) {
    const parts = v.split('/').map(Number);
    return parts[1] ? parts[0] / parts[1] : 0;
  }
  return parseFloat(v) || 0;
}
// chara skill name に Lv2/Lv3/Lv4/Lv5 が含まれるか（Lv50/Lv500 等は対象外）。
// hensei calc 専用：crawl 段階では effect に保存しない。
export const _LV2_5_RE = /Lv[2-5](?!\d)/;

// 熟度 scaling 適用：
//   jkMinus1=true (skill name に Lv2/Lv3/Lv4/Lv5) → b + (jk - 1) * s
//   それ以外（Lv6+ / Lv1 / 無 Lv 後缀 / chara 以外）→ b + jk * s
// 任意の jukudo は外側で >=1 にクランプ済み。
// b / sc 双方とも数値・分式文字列 ("1/2") を受け入れる。
export const _scaledBairitu = (b, sc, jukudo, jkMinus1 = false) => {
  const bv = _parseScaling(b);
  const s  = _parseScaling(sc);
  if (!s) return bv;
  const factor = jkMinus1 ? (jukudo - 1) : jukudo;
  return bv + factor * s;
}

export const computeStats = (chara, tr, slotIdx) => {
  if (!chara || !tr) return null;
  const stats = {};
  for (const attr of _STAT_KEYS) {
    const b = _baseStat(chara, tr, attr);
    stats[attr] = b != null ? b : 0;
  }
  // Init hits from chara state's basic_info
  const baseHitsRaw = chara.states?.[tr.state]?.basic_info?.['Hit数'];
  const hits = Array.isArray(baseHitsRaw) ? baseHitsRaw.slice(0, 3).map(h => +h || 0) : [0, 0, 0];
  while (hits.length < 3) hits.push(0);
  let damageLimit = 2147483647;
  // bunrui=18（BDゲージの最大値）は 4 種 calc_type を独立に累加し、最後に合成式で max を計算：
  //   raw      = ((10 + Σadd) * (1 + Σmul) + ΣfinalAdd) * (1 + ΣfinalMul)
  //   bdCapMax = floor(raw) - 1
  // mul/finalMul は (v-1) を累加（「N倍」加性叠加で 1.5×+1.2× → 1.7× の意味）。
  // base = 10、表示時 -1（BD ゲージ上限は 0-indexed level、buff 無し floor(10)-1 = 9）。
  const acc = {
    stats, damageLimit, hits,
    bdCapAdd: 0,       // ct=1（普通加算）の累加
    bdCapMul: 0,       // ct=0（普通乗算）の累加：bairitu-1 を加える
    bdCapFinalAdd: 0,  // ct=2（最終加算）
    bdCapFinalMul: 0,  // ct=3（最終乗算）：bairitu-1 を加える
  };
  const tgt = chara;

  // ===== Trace 容器（IS_LOCAL_DEV のみ生成、それ以外は no-op）=====
  // 始終生成 / 同 pass push で必ず最終値と一致。
  let _curStage = null;
  const trace = IS_LOCAL_DEV ? {
    base: _STAT_KEYS.reduce((m, k) => (m[k] = stats[k], m), {}),
    damageLimitBase: damageLimit,
    hitsBase: hits.slice(),
    stages: [],
  } : null;
  const _enterStage = IS_LOCAL_DEV
    ? (key, label) => { _curStage = { key, label, steps: [] }; trace.stages.push(_curStage); }
    : () => {};
  const _pushStep = IS_LOCAL_DEV
    ? (step) => { if (_curStage) _curStage.steps.push(step); }
    : () => {};

  // Apply one effect to acc, scaled by source HP via _conditionFactor.
  // sourceMult: 来源倍率（魂等级用），默认 1 不影响。
  // mode: 'add' (ct=1, normal additive) / 'mul' (ct=0, normal multiplicative)
  //       'final-add' (ct=2, 最終加算) / 'final-mul' (ct=3, 最終乗算)
  // 加算系（add / final-add）と乗算系（mul / final-mul）は値の適用ロジック共通、ct 過濾だけ違う。
  function _applyEf(e, srcJk, srcHp, mode, sourceMult = 1, srcLabel = '') {
    const factor = _conditionFactor(e.condition, srcHp);
    const bunrui = e.bunrui || [];
    const isAddMode = (mode === 'add' || mode === 'final-add');
    const isMulMode = (mode === 'mul' || mode === 'final-mul');
    const _label = srcLabel || e._srcLabel || '';

    // ===== Hit 处理（bunrui 含 7）— 每步取整 =====
    // hit_type: 1/0=add (default), 2=mul, 3=set
    // hit は mode='add'/'mul' のみ処理。final-add/final-mul は hit を再走しない（hit_type=2 で乗算は十分）。
    if (bunrui.includes(7) && (mode === 'add' || mode === 'mul')) {
      const ht = e.hit_type != null ? e.hit_type : 1;
      const isHitAdd = (ht === 1 || ht === 0 || ht === 3);
      const isHitMul = (ht === 2);
      const hps = e.hit_per_stage || [];
      const hpss = e.hit_per_stage_scaling || [];
      if ((mode === 'add' && isHitAdd) || (mode === 'mul' && isHitMul)) {
        for (let s = 0; s < 3; s++) {
          // 新公式：base + (jukudo - 1) * scaling。分数字符列対応のため _parseHit 経由。
          const baseV = _parseHit(hps[s]) + (srcJk - 1) * _parseHit(hpss[s]);
          if (baseV === 0) continue;
          let v = baseV * sourceMult;
          const hitBefore = acc.hits[s];
          if (mode === 'add') {
            v = v * factor;
            if (ht === 3) acc.hits[s] = Math.floor(v);              // set
            else acc.hits[s] = acc.hits[s] + Math.floor(v);          // add (ht 0/1)
          } else {
            // mul: (v-1)*factor + 1，再乘到当前 hit 后取整
            v = (v - 1) * factor + 1;
            acc.hits[s] = Math.floor(acc.hits[s] * v);
          }
          _pushStep({
            src: _label, stat: 'Hit' + (s + 1), op: mode, val: v,
            hpFactor: factor, sourceMult,
            scope: e.scope, calc_type: e.calc_type, condition: e.condition,
            before: hitBefore, after: acc.hits[s],
          });
        }
      }
    }

    // ===== Stat / Damage Limit 处理（bunrui 含 1/2/10/12/17 等）=====
    const ct = e.calc_type ?? 1;
    if (mode === 'add'       && ct !== 1) return;
    if (mode === 'mul'       && ct !== 0) return;
    if (mode === 'final-add' && ct !== 2) return;
    if (mode === 'final-mul' && ct !== 3) return;
    // sourceMult（魂 lv 加成等）の適用 — ゲーム仕様：魂 lv は bairitu に直接乗算される。
    //   加算：v = bairitu * sourceMult * factor             （加える量を K 倍）
    //   乗算：v = (bairitu * sourceMult - 1) * factor + 1   （bairitu に直接乗算 →
    //                                                         condition で净增量を割引）
    // 例：bairitu=1.5（+50%UP）+ 4★ lv40 (sourceMult=1.4) + 浑身 50%血 (factor=0.5)
    //   = (1.5*1.4 - 1)*0.5 + 1 = 1.55× （+55%）
    // bairitu=1 占位 entry も soulMult を受ける — ゲーム仕様で「占位 = ×1 base に魂 lv 倍率」が乗る。
    const v0 = _scaledBairitu(e.bairitu, e.bairitu_scaling, srcJk, !!e._jkm1);
    let v;
    if (isAddMode) v = v0 * sourceMult * factor;
    else           v = (v0 * sourceMult - 1) * factor + 1;
    for (const b of bunrui) {
      if (b === 7) continue;  // 已在上面处理
      if (b === 17) {
        const before = acc.damageLimit;
        if (isAddMode) acc.damageLimit += v;
        else           acc.damageLimit *= v;
        _pushStep({
          src: _label, stat: 'ダメ上限', op: mode, val: v,
          bairituRaw: e.bairitu, hpFactor: factor, sourceMult,
          scope: e.scope, calc_type: e.calc_type, condition: e.condition,
          before, after: acc.damageLimit,
        });
      } else if (b === 18) {
        // BDゲージ最大値：4 種 mode を独立に累加。mul/finalMul は (v-1) を加える
        // （v 自体は乗数なので、加性叠加には 1 を引いた残差を取る）。
        let beforeBD, afterBD, bdKey;
        if      (mode === 'add')       { beforeBD = acc.bdCapAdd;      acc.bdCapAdd      += v;       afterBD = acc.bdCapAdd;      bdKey = 'BDCap-add'; }
        else if (mode === 'mul')       { beforeBD = acc.bdCapMul;      acc.bdCapMul      += (v - 1); afterBD = acc.bdCapMul;      bdKey = 'BDCap-mul'; }
        else if (mode === 'final-add') { beforeBD = acc.bdCapFinalAdd; acc.bdCapFinalAdd += v;       afterBD = acc.bdCapFinalAdd; bdKey = 'BDCap-final-add'; }
        else if (mode === 'final-mul') { beforeBD = acc.bdCapFinalMul; acc.bdCapFinalMul += (v - 1); afterBD = acc.bdCapFinalMul; bdKey = 'BDCap-final-mul'; }
        _pushStep({
          src: _label, stat: bdKey, op: mode, val: v,
          bairituRaw: e.bairitu, hpFactor: factor, sourceMult,
          scope: e.scope, calc_type: e.calc_type, condition: e.condition,
          before: beforeBD, after: afterBD,
        });
      } else {
        const stat = _BUNRUI_TO_STAT[b];
        if (!stat || acc.stats[stat] == null) continue;
        const before = acc.stats[stat];
        if (isAddMode) acc.stats[stat] += v;
        else           acc.stats[stat] *= v;
        _pushStep({
          src: _label, stat, op: mode, val: v,
          bairituRaw: e.bairitu, hpFactor: factor, sourceMult,
          scope: e.scope, calc_type: e.calc_type, condition: e.condition,
          before, after: acc.stats[stat],
        });
      }
    }
  }

  // 全 _applyList 完了後の Final pass 用キュー。BD はここに push しない（skipFinal=true）。
  const finalDeferred = [];

  // Apply a list of effects with srcChara/srcHp/srcJk context: filter by buff scope,
  // then run additive pass, then multiplicative pass.
  // Condition (逆窮鼠/窮鼠/破損) scales bairitu inside _applyEf, no longer a gate.
  // sourceMult: 来源倍率（如魂的 lv 倍率），同时作用于 stat / hit。
  // useElementBuff: 仅魔剣技能 → element 走 tgt.element_buff[]；其他来源传 false。
  // skipFinal: BD effects は final pass に参加しない（BD 自体が「最後」なので）。
  function _applyList(effects, srcChara, srcHp, srcJk, sourceMult = 1, useElementBuff = false, skipFinal = false, srcLabel = '') {
    if (!effects || !effects.length) return;
    const filtered = effects.filter(e => _buffApplies(srcChara, tgt, e, useElementBuff));
    if (!filtered.length) return;
    for (const e of filtered) _applyEf(e, srcJk, srcHp, 'add', sourceMult, srcLabel);
    for (const e of filtered) _applyEf(e, srcJk, srcHp, 'mul', sourceMult, srcLabel);
    if (!skipFinal) finalDeferred.push({ effects: filtered, srcJk, srcHp, sourceMult, srcLabel });
  }

  // ===== Stage 1: Self omoide (gated by affinity) =====
  const selfJk = Math.max(1, tr.jukudo || 1);
  const selfHp = tr.hpPercent ?? 100;
  // trace 用：threshold + koka を捕えるためインライン展開。_omoidePicksFor は外部 API として残す。
  const _picksWithLabel = [];
  {
    const aff = +tr.affinity || 0;
    const omPicks = tr.omoide_picks || {};
    (chara.omoide || []).forEach(row => {
      if ((+row.threshold || 0) > aff) return;
      const pickedIcon = omPicks[row.threshold];
      if (pickedIcon == null) return;
      const info = SENZAI_TABLE[pickedIcon] || SENZAI_TABLE[String(pickedIcon)];
      if (info) _picksWithLabel.push({ info, label: '思い出 thresh ' + row.threshold + ' ' + (info.koka || '') });
    });
  }
  _enterStage('omoide', 'Stage 1 思い出');
  for (const p of _picksWithLabel) _applyEf(p.info, selfJk, selfHp, 'add', 1, p.label);
  for (const p of _picksWithLabel) _applyEf(p.info, selfJk, selfHp, 'mul', 1, p.label);

  // ===== Stage 2: External buffs in fixed slot order =====
  // slot s: crystals → chara skills, then souls (1..3), then bgs (1..3)
  for (let si = 0; si < teamSize; si++) {
    const slot = team[si]; if (!slot) continue;
    const srcChara = allCharas.find(x => x.id === slot.chara) || null;
    const srcHp = slot.tr?.hpPercent ?? 100;
    const srcJk = Math.max(1, slot.tr?.jukudo || 1);

    // Crystals — 乗性 delta 三次元衰减（weight / purity / lv）、step 仅 slider 颗粒度、不入公式。
    // 公式见 _crystalEffectiveBairitu / _crystalDimFactor (renderEffList 上方)。
    _enterStage('stage2-cr-s' + si, 'Stage 2 Slot' + (si + 1) + ' 記憶結晶');
    const crEffs = [];
    (slot.crystals || []).forEach(cfg => {
      if (!cfg) return;
      const cr = allCrystals.find(x => x.id === cfg.id);
      if (!cr) return;
      const crLabel = 'Slot' + (si + 1) + ' 結晶 ' + (cr.name || '');
      for (const e of (cr.effects || [])) {
        const eff = _crystalEffectiveBairitu(cr, cfg, e);
        const rawB = _parseScaling(e.bairitu);
        if (eff != null && Number.isFinite(rawB) && eff !== rawB) {
          crEffs.push({ ...e, bairitu: eff, _srcLabel: crLabel });
        } else {
          crEffs.push({ ...e, _srcLabel: crLabel });
        }
      }
    });
    _applyList(crEffs, srcChara, srcHp, srcJk);

    // Chara skills (current state, with revise) — element 匹配走 tgt.element_buff[]
    if (srcChara) {
      _enterStage('stage2-ch-s' + si, 'Stage 2 Slot' + (si + 1) + ' ' + (srcChara.name || '') + ' (魔剣 skill)');
      const skills = _resolveCharaSkills(srcChara, slot.tr?.state);
      const charaEffs = [];
      // skill name に Lv2/Lv3/Lv4/Lv5 → bairitu_scaling 公式 (jk-1)*s。それ以外 jk*s。
      // _jkm1 を effect の浅 copy に注入（src データを汚染しない）。
      skills.forEach(sk => {
        const jkm1 = _LV2_5_RE.test(sk.name || '');
        const skLabel = (srcChara.name || '') + ' ' + (sk.name || '');
        (sk.effects || []).forEach(e => {
          const ec = { ...e, _srcLabel: skLabel };
          if (jkm1) ec._jkm1 = true;
          charaEffs.push(ec);
        });
      });
      _applyList(charaEffs, srcChara, srcHp, srcJk, 1, true);
    }

    // Masou effects（chara-bound; element 匹配走 tgt.element 直接判定，不走 element_buff[]）
    if (slot.masou != null) {
      const masou = allMasou.find(x => x.id === slot.masou);
      if (masou) {
        _enterStage('stage2-ms-s' + si, 'Stage 2 Slot' + (si + 1) + ' 魔装 ' + (masou.name || ''));
        const msLabel = 'Slot' + (si + 1) + ' 魔装 ' + (masou.name || '');
        const msEffs = (masou.effects || []).map(e => ({ ...e, _srcLabel: msLabel }));
        _applyList(msEffs, srcChara, srcHp, srcJk, 1, false);
      }
    }
  }
  for (let si = 0; si < teamSize; si++) {
    const slot = team[si]; if (!slot) continue;
    const srcChara = allCharas.find(x => x.id === slot.chara) || null;
    const srcHp = slot.tr?.hpPercent ?? 100;
    const srcJk = Math.max(1, slot.tr?.jukudo || 1);
    const soul = allSouls.find(x => x.id === slot.soul);
    if (!soul) continue;
    _enterStage('stage2-so-s' + si, 'Stage 2 Slot' + (si + 1) + ' ' + (soul.name || '') + ' (魂 skill)');
    // 魂的倍率：根据 rarity + lv 计算（task 7+8）。乘到所有 effect 的 bairitu / hit_per_stage 上。
    const soulMult = soulMultiplier(soul.rarity || 1, slot.tr?.soul_lv || 1);
    const skills = _resolveSoulSkills(soul);
    const soulEffs = [];
    skills.forEach(sk => {
      const skLabel = (soul.name || '') + ' ' + (sk.name || '');
      (sk.effects || []).forEach(e => soulEffs.push({ ...e, _srcLabel: skLabel }));
    });
    _applyList(soulEffs, srcChara, srcHp, srcJk, soulMult);
  }
  for (let si = 0; si < teamSize; si++) {
    const slot = team[si]; if (!slot) continue;
    const srcChara = allCharas.find(x => x.id === slot.chara) || null;
    const srcHp = slot.tr?.hpPercent ?? 100;
    const srcJk = Math.max(1, slot.tr?.jukudo || 1);
    const bg = allBGs.find(x => x.id === slot.bg);
    if (!bg) continue;
    _enterStage('stage2-bg-s' + si, 'Stage 2 Slot' + (si + 1) + ' ' + (bg.name || '') + ' (心象結晶)');
    const bgLabel = 'Slot' + (si + 1) + ' 心象結晶 ' + (bg.name || '');
    const bgEffs = (bg.effects || []).map(e => ({ ...e, _srcLabel: bgLabel }));
    _applyList(bgEffs, srcChara, srcHp, srcJk);
  }

  // ===== Stage 2.5: Soul Affinity (独立乘区, self-only) =====
  // 自分の chara の element/weapon ↔ 装備した soul の affinity を引き、
  // atk_effect → 攻撃力 + ブレイク力、def_effect → 防御力 を独立に乗算。
  const mySlot = team[slotIdx];
  if (mySlot && mySlot.soul != null) {
    const mySoul = allSouls.find(x => x.id === mySlot.soul);
    if (mySoul) {
      const elemName = _ELEMS_ORDER[(chara.element || 6) - 1];
      const weapName = _WEAPS_ORDER[(chara.weapon || 1) - 1];
      const eAff = (mySoul.element_affinity || {})[elemName] || {};
      const wAff = (mySoul.weapon_affinity  || {})[weapName] || {};
      const atkAff = _parseAff(eAff.atk_effect) * _parseAff(wAff.atk_effect);
      const defAff = _parseAff(eAff.def_effect) * _parseAff(wAff.def_effect);
      _enterStage('affinity', 'Stage 2.5 魂 affinity (自身)');
      const atkSrc = '元素 ' + elemName + ' atk ' + (eAff.atk_effect ?? '1') + ' × 武器 ' + weapName + ' atk ' + (wAff.atk_effect ?? '1');
      const defSrc = '元素 ' + elemName + ' def ' + (eAff.def_effect ?? '1') + ' × 武器 ' + weapName + ' def ' + (wAff.def_effect ?? '1');
      { const before = acc.stats['攻撃力'];    acc.stats['攻撃力']    *= atkAff; _pushStep({ src: atkSrc, stat: '攻撃力',    op: 'mul', val: atkAff, before, after: acc.stats['攻撃力']    }); }
      { const before = acc.stats['ブレイク力']; acc.stats['ブレイク力'] *= atkAff; _pushStep({ src: atkSrc, stat: 'ブレイク力', op: 'mul', val: atkAff, before, after: acc.stats['ブレイク力'] }); }
      { const before = acc.stats['防御力'];    acc.stats['防御力']    *= defAff; _pushStep({ src: defSrc, stat: '防御力',    op: 'mul', val: defAff, before, after: acc.stats['防御力']    }); }
    }
  }

  // ===== Stage 3: Self-only finishers (結婚 / 燃心 / LP / 主武器) =====
  _enterStage('stage3', 'Stage 3 結婚 / 燃心 / LP / 主武器');
  const mr = [1.00, 1.03, 1.05][tr.marriage] || 1;
  if (mr !== 1) {
    const mrSrc = '結婚 ' + tr.marriage + ' (×' + mr + ')';
    for (const k of _STAT_KEYS) {
      const before = acc.stats[k]; acc.stats[k] *= mr;
      _pushStep({ src: mrSrc, stat: k, op: 'mul', val: mr, before, after: acc.stats[k] });
    }
  }
  if (tr.moeshin) {
    const before = acc.stats['攻撃力']; acc.stats['攻撃力'] *= 1.3;
    _pushStep({ src: '燃心 ×1.3', stat: '攻撃力', op: 'mul', val: 1.3, before, after: acc.stats['攻撃力'] });
  }
  const lpMult = [1.0, 1.1, 1.5][tr.lp] || 1;
  if (lpMult !== 1) {
    const before = acc.stats['攻撃力']; acc.stats['攻撃力'] *= lpMult;
    _pushStep({ src: 'LP ' + tr.lp + ' (×' + lpMult + ')', stat: '攻撃力', op: 'mul', val: lpMult, before, after: acc.stats['攻撃力'] });
  }
  // 主武器装備（あり=1.0 / なし=1/21）作用于 攻撃力 + ブレイク力
  const mwMult = (tr.main_weapon === false) ? (1 / 21) : 1.0;
  if (mwMult !== 1) {
    const mwSrc = '主武器なし (×1/21)';
    { const before = acc.stats['攻撃力'];    acc.stats['攻撃力']    *= mwMult; _pushStep({ src: mwSrc, stat: '攻撃力',    op: 'mul', val: mwMult, before, after: acc.stats['攻撃力']    }); }
    { const before = acc.stats['ブレイク力']; acc.stats['ブレイク力'] *= mwMult; _pushStep({ src: mwSrc, stat: 'ブレイク力', op: 'mul', val: mwMult, before, after: acc.stats['ブレイク力'] }); }
  }

  // ===== Stage 4: 敵 / 副本 / 公会 multipliers =====
  //   元素克制 / BK / 有利武器 / 難易度 / 公会役職 + 4 紋章 / 副本 BD 上限
  _enterStage('stage4-env', 'Stage 4 敵 / 副本');
  const isGuildMode = (enemy.mode === 'guildbattle' || enemy.mode === 'guildbattle_special');
  // 4a. 元素克制 → 攻撃力 + ブレイク力
  const elemMult = elementMatchupMult(chara.element, enemy.element, enemy.mode);
  if (elemMult !== 1) {
    const emSrc = '元素克制 ' + (ELEMENT[chara.element] || '?') + '→' + (ELEMENT[enemy.element] || '?') + ' (×' + elemMult + ')';
    { const before = acc.stats['攻撃力'];    acc.stats['攻撃力']    *= elemMult; _pushStep({ src: emSrc, stat: '攻撃力',    op: 'mul', val: elemMult, before, after: acc.stats['攻撃力']    }); }
    { const before = acc.stats['ブレイク力']; acc.stats['ブレイク力'] *= elemMult; _pushStep({ src: emSrc, stat: 'ブレイク力', op: 'mul', val: elemMult, before, after: acc.stats['ブレイク力'] }); }
  }
  // 4b. BK状態 → 攻撃力（普通 3.0；ギルバト 高耐性 6.0）
  if (enemy.bk) {
    const bkMult = (isGuildMode && enemy.bkResistance === 'high') ? 6.0 : 3.0;
    const before = acc.stats['攻撃力']; acc.stats['攻撃力'] *= bkMult;
    _pushStep({ src: 'BK状態 ×' + bkMult, stat: '攻撃力', op: 'mul', val: bkMult, before, after: acc.stats['攻撃力'] });
  }
  // 4c. ギルバト/特別版 限定（有利武器 + 難易度）→ 攻撃力
  if (isGuildMode) {
    if (chara.weapon != null && enemy.advantageWeapons && enemy.advantageWeapons.has(chara.weapon)) {
      const before = acc.stats['攻撃力']; acc.stats['攻撃力'] *= 2.0;
      _pushStep({ src: '有利武器 ' + (WEAPON[chara.weapon] || '?') + ' ×2.0', stat: '攻撃力', op: 'mul', val: 2.0, before, after: acc.stats['攻撃力'] });
    }
    const diffMult = ({Normal:1.0, Hard:0.1, Lunatic:0.005})[enemy.difficulty] ?? 1.0;
    if (diffMult !== 1) {
      const before = acc.stats['攻撃力']; acc.stats['攻撃力'] *= diffMult;
      _pushStep({ src: '難易度 ' + enemy.difficulty + ' ×' + diffMult, stat: '攻撃力', op: 'mul', val: diffMult, before, after: acc.stats['攻撃力'] });
    }
  }
  // 4d. 公会役職 + 4 紋章（外部 buff，按 effects schema 应用）
  _enterStage('stage4-guild', 'Stage 4 公会役職 + 紋章');
  const guildEffects = [];
  if (isGuildMode && enemy.guildTitle != null) {
    const gt = allGuildTitles.find(g => g.id === enemy.guildTitle);
    if (gt) {
      const gtLabel = '役職 ' + (gt.name || '');
      (gt.effects || []).forEach(e => guildEffects.push({ ...e, _srcLabel: gtLabel }));
    }
  }
  (enemy.emblems || []).forEach((slot, s) => {
    if (slot.id == null) return;
    const em = allGuildEmblems.find(g => g.id === slot.id);
    if (!em) return;
    if (em.guild_only && !isGuildMode) return;
    // bairitu 在配置里填的是"满级倍率"。按 level 线性插值到 1.0：
    //   bairitu(lv) = (bairitu_max - 1) * (lv - 1) / (lvMax - 1) + 1
    const lvMax = emblemLvMax(em.rarity);
    const lv = Math.max(1, Math.min(lvMax, +slot.level || 1));
    const emLabel = '紋章 ' + (COLOR_LABELS[SLOT_COLORS[s]] || '') + ' ' + (em.name || '') + ' lv' + lv;
    for (const e of (em.effects || [])) {
      const ec = Object.assign({}, e, { _srcLabel: emLabel });
      // bairitu は数値・分式文字列 ("1/2") 双方受け入れ。
      const baseB = _parseScaling(e.bairitu);
      if (lvMax > 1 && Number.isFinite(baseB) && baseB !== 0) {
        ec.bairitu = (baseB - 1) * (lv - 1) / (lvMax - 1) + 1;
      }
      guildEffects.push(ec);
    }
  });
  if (guildEffects.length) {
    // src=null：scope=0/3 不会应用（要 src.id===tgt.id），其他全部按 _buffApplies 走
    _applyList(guildEffects, null, 100, 1, 1);
  }
  // 4e. BDゲージ上限：enemy.bd_cap = 当前選択値（[0, _computeBdCapMax()] 範囲）。
  //     倍率 = 1 + (bd_cap // 2) * 0.25 → 攻撃力 (bunrui=1)。
  //     bunrui=18 effects は 4 種 ct を独立累加し、合成式
  //     ((10 + Σadd)*(1 + Σmul) + ΣfinalAdd)*(1 + ΣfinalMul) を floor して -1 で slot ごとに max を出し、
  //     slot 間の最大値を取って floor → slider/input の max 属性に流す。倍率公式自体には加算しない。
  const bdCap = +enemy.bd_cap || 0;
  const bdCapMult = 1 + Math.floor(bdCap / 2) * 0.25;
  if (bdCapMult !== 1) {
    _enterStage('stage4-bdcap', 'Stage 4 BDゲージ上限');
    const before = acc.stats['攻撃力']; acc.stats['攻撃力'] *= bdCapMult;
    _pushStep({ src: 'BDゲージ上限 ' + bdCap + ' (×' + bdCapMult + ')', stat: '攻撃力', op: 'mul', val: bdCapMult, before, after: acc.stats['攻撃力'] });
  }

  // ===== Stage 5: Final pass — 全 normal stage 完了後に ct=2 (最終加算) → ct=3 (最終乗算) =====
  // BD は finalDeferred に入っていない（_applyList を skipFinal=true で呼ぶ）ので影響しない。
  _enterStage('final-add', 'Stage 5 Final pass (最終加算)');
  for (const it of finalDeferred) {
    for (const e of it.effects) _applyEf(e, it.srcJk, it.srcHp, 'final-add', it.sourceMult, it.srcLabel);
  }
  _enterStage('final-mul', 'Stage 5 Final pass (最終乗算)');
  for (const it of finalDeferred) {
    for (const e of it.effects) _applyEf(e, it.srcJk, it.srcHp, 'final-mul', it.sourceMult, it.srcLabel);
  }

  // ===== Stage 6: BD effects（仅 tr.bd_on === true 的 slot 触发；BD は全 final 之後に走る）=====
  for (let si = 0; si < teamSize; si++) {
    const slot = team[si]; if (!slot) continue;
    if (!slot.tr?.bd_on) continue;
    const srcChara = allCharas.find(x => x.id === slot.chara) || null;
    if (!srcChara) continue;
    const bdEffs = (srcChara.bd_skill && srcChara.bd_skill.effects) || [];
    if (!bdEffs.length) continue;
    const srcHp = slot.tr?.hpPercent ?? 100;
    const srcJk = Math.max(1, slot.tr?.jukudo || 1);
    _enterStage('stage6-bd-s' + si, 'Stage 6 Slot' + (si + 1) + ' ' + (srcChara.name || '') + ' B.D.');
    const bdLabel = 'Slot' + (si + 1) + ' ' + (srcChara.name || '') + ' B.D.';
    const bdEffsLabeled = bdEffs.map(e => ({ ...e, _srcLabel: bdLabel }));
    _applyList(bdEffsLabeled, srcChara, srcHp, srcJk, 1, true, /* skipFinal */ true);
  }

  // BDゲージ最大値の合成：((10 + 普通加算) * (1 + 普通乗算) + 最終加算) * (1 + 最終乗算) → floor して -1
  const bdCapRaw = ((10 + acc.bdCapAdd) * (1 + acc.bdCapMul) + acc.bdCapFinalAdd) * (1 + acc.bdCapFinalMul);
  const bdCapMax = Math.floor(bdCapRaw) - 1;
  const result = { stats: acc.stats, damageLimit: acc.damageLimit, hits: acc.hits, bdCapMax };
  if (trace) result.trace = trace;
  return result;
}

// ===== ENEMY BAR (敵方/副本/工会信息) =====
export const renderEnemyBar = () => {
  const eb = document.getElementById('enemy-bar');
  if (!eb) return;
  const isGuild = (enemy.mode === 'guildbattle' || enemy.mode === 'guildbattle_special');
  // 1. 元素
  const elemBtns = [1,2,3,4,5,6].map(e =>
    `<button class="eb-btn elem-${e}${enemy.element===e?' on':''}" onclick="setEnemyElem(${e})">${ELEMENT[e]}</button>`
  ).join('');
  // 2. BK状態（单按钮 toggle：あり/なし）
  const bkLabel = enemy.bk ? 'あり' : 'なし';
  const bkBtns = `<button class="eb-btn${enemy.bk?' on':''}" onclick="setEnemyBk(${!enemy.bk})">${bkLabel}</button>`;
  // 3. mode
  const modeOpts = [
    ['normal','普通'],
    ['guildbattle','ギルバト'],
    ['guildbattle_special','ギルバト特別版'],
    ['other','他'],
  ].map(([v,l])=>`<option value="${v}"${enemy.mode===v?' selected':''}>${l}</option>`).join('');
  // 4. BK耐性 (guild only) — 单按钮 toggle：普通/高
  let bkResHtml = '';
  if (isGuild) {
    const isHigh = enemy.bkResistance === 'high';
    bkResHtml = `<div class="eb-group">
      <span class="eb-label">BK耐性</span>
      <button class="eb-btn${isHigh?' on':''}" onclick="setEnemyBkRes('${isHigh?'normal':'high'}')">${isHigh?'高':'普通'}</button>
    </div>`;
  }
  // 7. 有利武器 (guild only) — 桌面行内 / 移动 6x2 grid
  let advWeapHtml = '';
  if (isGuild) {
    const wbtns = [];
    for (let w=1; w<=12; w++) {
      const on = enemy.advantageWeapons.has(w) ? ' on' : '';
      wbtns.push(`<button class="eb-btn${on}" onclick="toggleAdvWeapon(${w})">${WEAPON[w]}</button>`);
    }
    advWeapHtml = `<div class="eb-group eb-adv-weapon">
      <span class="eb-label">有利武器</span>
      <div class="adv-weapon-grid">${wbtns.join('')}</div>
    </div>`;
  }
  // 8. difficulty (guild only)
  let diffHtml = '';
  if (isGuild) {
    diffHtml = `<div class="eb-group">
      <span class="eb-label">難易度</span>
      ${['Normal','Hard','Lunatic'].map(d=>`<button class="eb-btn${enemy.difficulty===d?' on':''}" onclick="setEnemyDiff('${d}')">${d}</button>`).join('')}
    </div>`;
  }
  // 9. ギルド役職 (guild only)
  let titleHtml = '';
  if (isGuild) {
    const opts = [`<option value="">-- 役職なし --</option>`].concat(
      allGuildTitles.map(g => `<option value="${g.id}"${enemy.guildTitle===g.id?' selected':''}>${escHtml(g.name)} — ${escHtml(g.effect_text||'')}</option>`)
    ).join('');
    titleHtml = `<div class="eb-group">
      <span class="eb-label">ギルド役職</span>
      <select onchange="setEnemyGuildTitle(this.value)">${opts}</select>
    </div>`;
  }
  // 10. エンブレム — 4 槽 icon picker（参考 crystals 槽位风格）
  let emblemHtml = `<div class="eb-group">
    <span class="eb-label">エンブレム</span>
    <div class="emblem-slots">`;
  for (let s=0; s<4; s++) {
    const slot = enemy.emblems[s] || {id:null, level:1};
    if (slot.id != null) {
      const em = allGuildEmblems.find(g => g.id === slot.id);
      const lvMax = em ? emblemLvMax(em.rarity) : 1;
      emblemHtml += `<div class="emblem-slot-wrap" onclick="openEmblemModal(${s})">
        <div class="emblem-thumb-wrap">
          <img class="emblem-thumb" src="../${em && em.image ? em.image : 'icon/emblem/'+slot.id+'.png'}" onerror="this.style.opacity='.3'" title="${escHtml(em ? em.name : '')}" alt="">
          <button class="emblem-rm" onclick="event.stopPropagation();setEmblem(${s},'')" title="外す">×</button>
        </div>
        <div class="emblem-slot-meta" onclick="event.stopPropagation()">
          <input type="number" min="1" max="${lvMax}" value="${slot.level||1}" class="emblem-lv-input" onchange="setEmblemLv(${s},+this.value)">
          <span class="emblem-lv-max">/${lvMax}</span>
        </div>
      </div>`;
    } else {
      emblemHtml += `<div class="emblem-slot-wrap" onclick="openEmblemModal(${s})">
        <div class="emblem-empty" title="エンブレムを選択">+</div>
        <div class="emblem-slot-meta" style="visibility:hidden" aria-hidden="true">
          <input type="number" value="1" class="emblem-lv-input" tabindex="-1">
          <span class="emblem-lv-max">/1</span>
        </div>
      </div>`;
    }
  }
  emblemHtml += `</div></div>`;

  // 11. BDゲージ上限条 — slider + integer input。max は _computeBdCapMax で算出。
  const bdCapMax = _computeBdCapMax();
  if ((+enemy.bd_cap || 0) > bdCapMax) enemy.bd_cap = bdCapMax;
  const bdCap = +enemy.bd_cap || 0;
  const bdCapHtml = `<div class="eb-group">
    <span class="eb-label">BDゲージ上限</span>
    <input type="range" min="0" max="${bdCapMax}" step="1" value="${bdCap}" class="bd-cap-slider" oninput="setEnemyBdCap(+this.value)">
    <input type="number" min="0" max="${bdCapMax}" step="1" value="${bdCap}" class="bd-cap-input" oninput="setEnemyBdCap(this.value)">
    <span class="bd-cap-max">/${bdCapMax}</span>
  </div>`;

  eb.innerHTML = `
    <div class="eb-group"><span class="eb-label">敵属性</span>${elemBtns}</div>
    <div class="eb-group"><span class="eb-label">敵BK状態</span>${bkBtns}</div>
    <div class="eb-group"><span class="eb-label">副本</span><select onchange="setEnemyMode(this.value)">${modeOpts}</select></div>
    ${bkResHtml}
    ${diffHtml}
    ${advWeapHtml}
    ${titleHtml}
    ${emblemHtml}
    ${bdCapHtml}
  `;
}

export const setEnemyElem = (e) => { enemy.element = e;        renderEnemyBar(); refreshAllStats(); }
export const setEnemyBk = (b) => { enemy.bk = !!b;           renderEnemyBar(); refreshAllStats(); }
export const setEnemyMode = (m) => { enemy.mode = m;           renderEnemyBar(); refreshAllStats(); }
export const setEnemyBkRes = (r) => { enemy.bkResistance = r;   renderEnemyBar(); refreshAllStats(); }
export const setEnemyDiff = (d) => { enemy.difficulty = d;     renderEnemyBar(); refreshAllStats(); }
export const setEnemyGuildTitle = (v) => { enemy.guildTitle = v ? +v : null; renderEnemyBar(); refreshAllStats(); }
export const setEnemyBdCap = (v) => {
  let n = parseInt(v, 10); if (!Number.isFinite(n)) n = 0;
  // 動的 max：slider の max 属性を信頼する（renderEnemyBar 側で _computeBdCapMax() 拡張済み）
  const sl = document.querySelector('.bd-cap-slider');
  const dynMax = sl ? (+sl.max || 9) : 9;
  enemy.bd_cap = Math.max(0, Math.min(dynMax, n));
  if (sl) sl.value = enemy.bd_cap;
  const ip = document.querySelector('.bd-cap-input');  if (ip) ip.value = enemy.bd_cap;
  refreshAllStats();
}
export const toggleAdvWeapon = (w) => {
  if (enemy.advantageWeapons.has(w)) enemy.advantageWeapons.delete(w);
  else enemy.advantageWeapons.add(w);
  renderEnemyBar(); refreshAllStats();
}
export const setEmblem = (slotIdx, v) => {
  if (!enemy.emblems[slotIdx]) enemy.emblems[slotIdx] = {id:null, level:1};
  const newId = v ? +v : null;
  enemy.emblems[slotIdx].id = newId;
  const em = newId != null ? allGuildEmblems.find(g => g.id === newId) : null;
  enemy.emblems[slotIdx].level = em ? emblemLvMax(em.rarity) : 1;
  renderEnemyBar(); refreshAllStats();
}
export const setEmblemLv = (slotIdx, lv) => {
  if (!enemy.emblems[slotIdx]) enemy.emblems[slotIdx] = {id:null, level:1};
  const em = allGuildEmblems.find(g => g.id === enemy.emblems[slotIdx].id);
  const max = em ? emblemLvMax(em.rarity) : 1;
  enemy.emblems[slotIdx].level = Math.max(1, Math.min(max, Math.floor(+lv)||1));
  renderEnemyBar(); refreshAllStats();
}

// スロット色固定：0→黄(1) / 1→青(2) / 2→緑(3) / 3→赤(4)
const SLOT_COLORS = [1, 2, 3, 4];
const COLOR_LABELS = { 1: '黄', 2: '青', 3: '緑', 4: '赤' };
const COLOR_HEX = { 1: '#ffd040', 2: '#5b8bff', 3: '#5bd47a', 4: '#ff6b6b' };
let emblemModalSlot = -1;
const emblemModalFilter = { rarity: new Set() };

export const openEmblemModal = (slotIdx) => {
  emblemModalSlot = slotIdx;
  const c = SLOT_COLORS[slotIdx];
  const title = document.querySelector('#emblem-modal .modal-header-title');
  if (title) {
    title.innerHTML = c
      ? `エンブレム選択 <span style="color:${COLOR_HEX[c]};font-size:13px;margin-left:6px">● ${COLOR_LABELS[c]}スロット</span>`
      : 'エンブレム選択';
  }
  document.getElementById('emblem-modal').classList.add('open');
  _renderEmblemModalSidebar();
  _renderEmblemModalList();
}
export const closeEmblemModal = () => {
  document.getElementById('emblem-modal').classList.remove('open');
  emblemModalSlot = -1;
}
export const _renderEmblemModalSidebar = () => {
  const html = `
    <div class="f-section"><div class="f-label">レア度</div><div class="f-toggles">
      ${[1,2,3,4].map(r =>
        `<button class="ftog${emblemModalFilter.rarity.has(r)?' on':''}" onclick="toggleEmblemRarity(${r})">★${r}</button>`
      ).join('')}
    </div></div>
    <div class="f-sort-row"><button class="f-reset-btn" onclick="resetEmblemFilter()" style="flex:1">リセット</button></div>
    <div class="modal-count" id="emblem-count"></div>`;
  document.getElementById('emblem-sidebar').innerHTML = html;
}
export const _renderEmblemModalList = () => {
  const list = document.getElementById('emblem-list');
  const isGuildMode = (enemy.mode === 'guildbattle' || enemy.mode === 'guildbattle_special');
  const slotColor = SLOT_COLORS[emblemModalSlot];
  const items = (allGuildEmblems || []).filter(em => {
    if (slotColor && (+em.color || 0) !== slotColor) return false;
    if (emblemModalFilter.rarity.size > 0 && !emblemModalFilter.rarity.has(+em.rarity || 1)) return false;
    return true;
  }).sort((a,b) => ((a.guild_only?1:0) - (b.guild_only?1:0)) || (a.rarity||1) - (b.rarity||1) || a.id - b.id);
  const cnt = document.getElementById('emblem-count');
  if (cnt) cnt.textContent = items.length + ' 件';

  let html = `<div class="em-clear sticky" onclick="selectEmblem(null)">— エンブレムを外す</div>`;
  if (!items.length) { list.innerHTML = html + '<div class="em-no-results">該当なし</div>'; return; }
  for (const em of items) {
    const cur = (enemy.emblems[emblemModalSlot] || {}).id === em.id ? ' active' : '';
    const dim = (em.guild_only && !isGuildMode) ? ' style="opacity:.8"' : '';
    const gbTag = em.guild_only ? '<span class="badge weapon" style="background:rgba(91,127,255,.18);color:#7b9fff;border-color:rgba(91,127,255,.35)">GB限定</span>' : '';
    html += `<div class="em-item em-item-bg${cur}"${dim} onclick="selectEmblem(${em.id})">
      <img class="em-icon" src="../${em.image || 'icon/emblem/'+em.id+'.png'}" onerror="this.style.visibility='hidden'" alt="">
      <div class="em-bg-body">
        <div class="em-bg-header">
          <span class="badge weapon">★${em.rarity||1}</span>
          <span class="em-bg-name">${escHtml(em.name||'')}</span>
          ${gbTag}
        </div>
        <div class="em-bg-eff">${escHtml(em.effect_text||'')}</div>
      </div>
    </div>`;
  }
  list.innerHTML = html;
}
export const toggleEmblemRarity = (r) => {
  if (emblemModalFilter.rarity.has(r)) emblemModalFilter.rarity.delete(r);
  else emblemModalFilter.rarity.add(r);
  _renderEmblemModalSidebar();
  _renderEmblemModalList();
}
export const resetEmblemFilter = () => {
  emblemModalFilter.rarity.clear();
  _renderEmblemModalSidebar();
  _renderEmblemModalList();
}
export const selectEmblem = (id) => {
  if (emblemModalSlot < 0) return;
  setEmblem(emblemModalSlot, id == null ? '' : id);
  closeEmblemModal();
}

// Pick / equip / clear ─────────────────────────────────────
export const pickOmoide = (si, threshold, iconId) => {
  const tr = team[si].tr;
  if ((+threshold || 0) > (+tr.affinity || 0)) return; // locked
  if (!tr.omoide_picks) tr.omoide_picks = {};
  if (tr.omoide_picks[threshold] === iconId) {
    delete tr.omoide_picks[threshold];
  } else {
    tr.omoide_picks[threshold] = iconId;
  }
  if (omoideModalSlot === si) _renderOmoideModalBody();
  _refreshOmoideCountLabel(si);
  refreshAllStats();
}

export const equipAllOmoide = (si) => {
  const c = allCharas.find(x => x.id === team[si].chara);
  if (!c) return;
  const tr = team[si].tr;
  const aff = +tr.affinity || 0;
  if (!tr.omoide_picks) tr.omoide_picks = {};
  (c.omoide || []).forEach(row => {
    if ((+row.threshold || 0) > aff) return; // locked
    const opts = row.slots || [];
    let pick = opts.find(id => {
      const info = SENZAI_TABLE[id] || SENZAI_TABLE[String(id)];
      return info && (info.bunrui || []).includes(1);
    });
    if (pick == null && opts.length === 1) pick = opts[0];
    if (pick != null) tr.omoide_picks[row.threshold] = pick;
  });
  if (omoideModalSlot === si) _renderOmoideModalBody();
  _refreshOmoideCountLabel(si);
  refreshAllStats();
}

export const clearAllOmoide = (si) => {
  team[si].tr.omoide_picks = {};
  if (omoideModalSlot === si) _renderOmoideModalBody();
  _refreshOmoideCountLabel(si);
  refreshAllStats();
}


let omoideModalSlot = -1;
export const openOmoideModal = (si) => {

  document.getElementById('omoide-modal-title').textContent = `好感装備 — ${c.name}`;

export const closeOmoideModal = () => {

export const _renderOmoideModalBody = () => {
  const si = omoideModalSlot;
  if (si < 0) return;
  const c = allCharas.find(x => x.id === team[si].chara);
  if (!c) return;
  const tr = team[si].tr;
  const picks = tr.omoide_picks || {};
  const aff = +tr.affinity || 0;
  const rows = (c.omoide || []).map(row => {
    const locked = (+row.threshold || 0) > aff;
    const opts = (row.slots || []).map(iconId => {
      const info = SENZAI_TABLE[iconId] || SENZAI_TABLE[String(iconId)] || {};
      const sel = picks[row.threshold] === iconId;
      const lbl = (info.koka || ('icon' + iconId)).replace(/UP|\[★+\]/g, x => x.includes('★') ? x : '');
      const bStr = (info.bairitu != null && info.bairitu !== 0) ? ' (' + ctPfx(info.calc_type) + fmtNum(info.bairitu) + ')' : '';
      const dis = locked ? ' disabled style="cursor:not-allowed"' : '';
      return `<button class="om-opt${sel?' on':''}"${dis} onclick="pickOmoide(${si},${row.threshold},${iconId})" title="${escHtml(info.koka||'')}${bStr}">${escHtml(lbl + bStr)}</button>`;
    }).join('');
    const lockTag = locked ? '<span style="font-size:10px;color:#ff7777;margin-left:4px">🔒</span>' : '';
    return min`
      <div class="om-row${locked?' locked':''}">
        <div class="om-thresh">${row.threshold}${lockTag}</div>
        <div class="om-slots">${opts}</div>
      </div>`;
  }).join('');
  document.getElementById('omoide-modal-body').innerHTML = `
    <div class="om-toolbar">
      <span style="font-size:13px;color:var(--text2);font-weight:600">好感:</span>
      <input type="number" min="0" step="1" value="${aff}" onchange="setAffinity(${si},+this.value)"
        style="width:80px;padding:4px 6px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none;text-align:right">
      <button class="om-btn" onclick="equipAllOmoide(${si})">全装備（攻撃優先）</button>
      <button class="om-btn" onclick="clearAllOmoide(${si})">全解除</button>
    </div>
    ${rows}
  `;
}
export const _refreshOmoideCountLabel = (si) => {
  const c = allCharas.find(x => x.id === team[si].chara);
  if (!c) return;
  const picks = team[si].tr.omoide_picks || {};
  const equipped = Object.keys(picks).filter(k => picks[k] != null).length;
  const lbl = document.getElementById('om-count-' + si);
  if (lbl) lbl.textContent = `(${equipped}/${(c.omoide||[]).length})`;

export const _fmtStat = (v) => {
  if (v == null || isNaN(v)) return '-';
  // 超过 13 位数（≥ 1e13）改用科学计数法（小数点后 6 位）
  if (Math.abs(v) >= 1e13) return (+v).toExponential(6);
  return (+v).toLocaleString('en-US');
}

export const renderStatsPanel = (i, chara) => {
  if (!chara) return `<div class="stats-panel" id="stats-panel-${i}"></div>`;
  return `<div class="stats-panel" id="stats-panel-${i}">${_statsInner(i, chara)}</div>`;
}
// 各 slot の最新 computeStats 結果を保持（trace modal 用、IS_LOCAL_DEV のみ意味あり）
const _lastTrace = [null, null, null];

export const _statsInner = (i, chara) => {
  if (!chara) { _lastTrace[i] = null; return ''; }
  const tr = team[i].tr;
  const r = computeStats(chara, tr, i);
  if (!r) { _lastTrace[i] = null; return ''; }
  _lastTrace[i] = r;
  const dl = +r.damageLimit;
  const aMax = +r.stats['攻撃力']    || 0;
  const aMin = aMax * 0.95;
  const def  = +r.stats['防御力']    || 0;
  const hp   = +r.stats['HP']         || 0;
  const bk   = +r.stats['ブレイク力'] || 0;
  const hits = (r.hits || [0,0,0]).map(h => Math.floor(+h || 0));
  const total_hits = hits.reduce((sum, h) => sum + h, 0);

  const yMax = aMax >= dl ? ' style="color:#ffd040"' : '';
  const yMin = aMin >= dl ? ' style="color:#ffd040"' : '';

  // dev 環境のみ stat cell を clickable に。GitHub Pages では cursor も onclick もなし。
  const ck = IS_LOCAL_DEV
    ? (k) => ` onclick="openStatTrace(${i},'${k}')" style="cursor:pointer"`
    : () => '';

  // 显示顺序：攻撃力max / 攻撃力min / 防御力 / HP / BK / Hit数 / ダメ上限
  // 默认每 cell 1/2 行宽（.stats-grid 的 grid-template-columns 设为 repeat(2,1fr)）。
  const cells = [
    `<div class="stats-cell"${ck('攻撃力')}><span class="stats-key">攻撃力max</span><span class="stats-val"${yMax}>${_fmtStat(Math.ceil(aMax))}</span></div>`,
    `<div class="stats-cell"${ck('攻撃力')}><span class="stats-key">攻撃力min</span><span class="stats-val"${yMin}>${_fmtStat(Math.ceil(aMin))}</span></div>`,
    `<div class="stats-cell"${ck('防御力')}><span class="stats-key">防御力</span><span class="stats-val">${_fmtStat(Math.ceil(def))}</span></div>`,
    `<div class="stats-cell"${ck('HP')}><span class="stats-key">HP</span><span class="stats-val">${_fmtStat(Math.ceil(hp))}</span></div>`,
    `<div class="stats-cell"${ck('ブレイク力')}><span class="stats-key">BK</span><span class="stats-val">${_fmtStat(Math.ceil(bk))}</span></div>`,
    `<div class="stats-cell"${ck('Hit')}><span class="stats-key">Hit数</span><span class="stats-val">[${hits.join(', ')}] 合計 ${total_hits} hit</span></div>`,
    `<div class="stats-cell"${ck('ダメ上限')}><span class="stats-key">ダメ上限</span><span class="stats-val">${_fmtStat(Math.ceil(dl))}</span></div>`,
  ].join('');
  return `<div class="stats-grid">${cells}</div>`;
}
export const refreshStatsPanel = (i) => {
  const el = document.getElementById('stats-panel-' + i);
  if (!el) return;
  const c = allCharas.find(x => x.id === team[i].chara);
  el.innerHTML = _statsInner(i, c);
}
// BDゲージ上限 max 算出：各 slot の bdCapMax（computeStats 内で floor((10+Σadd)*(1+Σmul)
// +ΣfinalAdd)*(1+ΣfinalMul)) - 1 まで完了済み）の最大値を採用。基础 buff 無し = floor(10) - 1 = 9。
const _computeBdCapMax = () => {
  let bdMax = 9;  // baseline (buff 無し時の floor(10)-1)
  for (let si = 0; si < teamSize; si++) {
    const slot = team[si]; if (!slot) continue;
    const ch = allCharas.find(x => x.id === slot.chara);
    if (!ch) continue;
    const r = computeStats(ch, slot.tr, si);
    if (r && (r.bdCapMax || 0) > bdMax) bdMax = r.bdCapMax;
  }
  return bdMax;
};

// chara/soul/crystal/bg/masou 切替や 練度 変更で bdCapMax が変わった時、
// renderEnemyBar 全体は重いので slider/input/label の max 属性だけ更新する。
const refreshBdCapMax = () => {
  const bdCapMax = _computeBdCapMax();
  if ((+enemy.bd_cap || 0) > bdCapMax) enemy.bd_cap = bdCapMax;
  const sl  = document.querySelector('.bd-cap-slider');
  const ip  = document.querySelector('.bd-cap-input');
  const lbl = document.querySelector('.bd-cap-max');
  if (sl)  { sl.max  = bdCapMax; sl.value  = enemy.bd_cap; }
  if (ip)  { ip.max  = bdCapMax; ip.value  = enemy.bd_cap; }
  if (lbl) lbl.textContent = `/${bdCapMax}`;
};

export const refreshAllStats = () => {
  for (let i = 0; i < 3; i++) refreshStatsPanel(i);
  refreshBdCapMax();
}

// Hensei picker uses scope=2/3/4/5 → bucket value 2 in UI; CRYSTAL_SPEC scope is exact match.
// Wrap CRYSTAL_SPEC with picker-specific scope match.
const HENSEI_CRYSTAL_SPEC = Object.assign({}, CRYSTAL_SPEC, {
  filters: Object.assign({}, CRYSTAL_SPEC.filters, {
    scope: {
      match: function(c, set){
        return (c.effects||[]).some(function(ef){
          if(set.has(0)&&ef.scope===0)return true;
          if(set.has(1)&&ef.scope===1)return true;
          if(set.has(2)&&[2,3,4,5].indexOf(ef.scope)>=0)return true;
          return false;
        });
      },
    },
    // bg-style: any-effect element/type matching (more permissive than primary-derived)
    element: {
      match: function(c, set){
        return (c.effects||[]).some(function(ef){
          var arr = [].concat(ef.element||[]);
          for (var v of set) if (arr.indexOf(v)>=0) return true;
          return false;
        });
      },
    },
    weapon: {
      match: function(c, set){
        return (c.effects||[]).some(function(ef){
          var arr = [].concat(ef.weapon||[]);
          for (var v of set) if (arr.indexOf(v)>=0) return true;
          return false;
        });
      },
    },
  }),
});
const HENSEI_BG_SPEC = Object.assign({}, BG_SPEC, {
  filters: Object.assign({}, BG_SPEC.filters, {
    element: {
      match: function(c, set){
        return (c.effects||[]).some(function(ef){
          var arr = [].concat(ef.element||[]);
          for (var v of set) if (arr.indexOf(v)>=0) return true;
          return false;
        });
      },
    },
    weapon: {
      match: function(c, set){
        return (c.effects||[]).some(function(ef){
          var arr = [].concat(ef.weapon||[]);
          for (var v of set) if (arr.indexOf(v)>=0) return true;
          return false;
        });
      },
    },
  }),
});

export const applyEM = () => {
  const type=emType, f=mf[type];
  let items=[];
  if(type==='masou'){
    const cid=team[emSlot]?.chara;
    items = cid ? (masouByChara[cid]||[]).slice() : [];
    if(f.q){
      const q=String(f.q).toLowerCase();
      items=items.filter(m=>(m.name||'').toLowerCase().indexOf(q)>=0);
    }
  } else {
    let spec=null;
    if(type==='chara')      spec = CHARA_SPEC;
    else if(type==='soul')  spec = SOUL_SPEC;
    else if(type==='bg')    spec = HENSEI_BG_SPEC;
    else if(type==='crystal') spec = HENSEI_CRYSTAL_SPEC;
    if(!spec){ renderEMList([]); return; }
    items = FilterCore.applyFilters(allCharas && type==='chara' ? allCharas
      : type==='soul' ? allSouls
      : type==='bg' ? allBGs
      : allCrystals, {
        q: f.q, filters: f, sortKey: f.sort, sortDesc: f.desc !== false,
      }, spec);
    if(!f.sort || !spec.sortFns[f.sort]){
      if(type==='chara'){
        items.sort((a,b)=>(b.sort_id||b.id)-(a.sort_id||a.id));
      } else {
        items.sort((a,b)=>b.rarity-a.rarity||b.id-a.id);
      }
    }
  }
  const cnt=document.getElementById('em-count');
  if(cnt)cnt.textContent=items.length+' 件';
  renderEMList(items);
}

export const _fmtSortVal = (v) => {
  if(v==null) return '—';
  if(typeof v !== 'number') return String(v);
  return Number.isInteger(v) ? v.toLocaleString('en-US') : String(v);
}

}

export const _bgScopeLabel = (e) => {
  if(e.scope===3){
    if(e.element!=null)return (ELEMENT[e.element]||e.element)+'属性のみ';
    if(e.weapon!=null){const t=[].concat(e.weapon);return t.map(v=>WEAPON[v]||v).join('/')+'のみ';}
  }
  if(e.scope===5)return (e.name||'')+'のみ';
  return'';
}

    return`<div class="bgdm-eff-line">${btags}${cond}${scope}${val}</div>`;

  return min`

export const renderDMCrystal = (c) => {
  const fields=[];
  if(c.effect_text)fields.push(['効果',escHtml(c.effect_text)]);
  (c.effects||[]).forEach(ef=>{
    if(ef.bairitu!=null||ef.bairitu_init!=null){
      const pfx=ef.calc_type===1?'+':'×';
      const mn=ef.bairitu_init,mx=ef.bairitu;
      let range;
      if(mn!=null&&mx!=null&&mn!==mx){
        range=pfx+fmtLarge(mn)+'～'+pfx+fmtLarge(mx);
      } else {
        range=pfx+fmtLarge(mn??mx);
      }
      const btags=(ef.bunrui||[]).map(b=>`<span class="bunrui-tag">${BUNRUI_SHORT[b]||b}</span>`).join('');
      const scopeTag=fmtScopeTag(ef);
      fields.push(['効果量',`<div class="bgdm-eff-line">${btags}${scopeTag}<span class="tag-val">${range}</span></div>`]);
    }
    if(ef.condition)fields.push(['発動条件',escHtml(CONDITION[ef.condition]||String(ef.condition))]);
  });
  if(c['特殊条件'])fields.push(['特殊条件',escHtml(c['特殊条件'])]);
  if(c['対象'])fields.push(['対象',escHtml(c['対象'])]);
  if(c['上限値'])fields.push(['上限値',escHtml(c['上限値'])]);
  if(c['入手方法'])fields.push(['入手方法',escHtml(c['入手方法'])]);
  const fieldHtml=fields.map(([k,v])=>`<div class="bgdm-field-row"><div class="bgdm-field-key">${k}</div><div class="bgdm-field-val">${v}</div></div>`).join('');
  return min`
    <div class="bgdm-layout">
      <div class="bgdm-fields">${fieldHtml||'<div style="color:var(--text2)">データなし</div>'}</div>
      <div style="flex-shrink:0">
        <img src="${crystalImageSrc(c)}" onerror="this.style.display='none'"
          style="width:84px;height:84px;border-radius:8px;object-fit:cover;display:block;border:1px solid var(--border)" alt="">
        <div style="margin-top:8px;font-size:12px;font-weight:700;text-align:center;color:var(--text2)">★${c.rarity}</div>
      </div>
    </div>`;
}

export const switchDMState = (label) => {
  document.querySelectorAll('.dm-state-tab').forEach(t=>t.classList.toggle('active',t.dataset.state===label));
  document.querySelectorAll('.dm-state-content').forEach(d=>d.classList.toggle('active',d.dataset.state===label));
}

export const renderDMState = (state,stateLabel,chara) => {
  const parts=[];
  const dead = new Set(chara && Array.isArray(chara._deleted_skills) ? chara._deleted_skills : []);
  const baseSkills = (state.skills||[]).filter(sk=>!dead.has(sk.name||''));
  const addedSkills = (chara && chara._added_skills && chara._added_skills[stateLabel]) || [];
  const allSkills = baseSkills.concat(addedSkills);
  if(allSkills.length){
    const cards=allSkills.map(s=>{
      const tags=dmRightTags(s);
      const bairitu=fmtBairitu(s);
      return min`
        <div class="dm-skill-card">
          <div class="dm-skill-name-row">
            <span class="dm-skill-name">${escHtml(s.name||'')}</span>${tags}
          </div>
          <div class="dm-skill-eff-row">
            <span class="dm-skill-eff">${escHtml(s.effect_text||'')}</span>
            <span class="dm-skill-bairitu">${bairitu}</span>
          </div>
        </div>`;
    }).join('');
    parts.push(`<div class="dm-section"><div class="dm-section-title">スキル構成 (${allSkills.length})</div><div class="dm-skills-list">${cards}</div></div>`);
  }
  if(state.stats)parts.push(`<div class="dm-section"><div class="dm-section-title">ステータス</div>${renderDMStats(state.stats)}</div>`);
  if(state.basic_info)parts.push(`<div class="dm-section"><div class="dm-section-title">基本情報</div>${renderDMBasicInfo(state.basic_info)}</div>`);
  return parts.join('')||'<div style="color:var(--text2);padding:20px">データなし</div>';
}

export const dmRightTags = (s) => {
  let tags='';
  (s.effects||[]).forEach(e=>{
    (e.bunrui||[]).forEach(b=>tags+=`<span class="bunrui-tag">${BUNRUI_SHORT[b]||b}</span>`);
    if(e.scope===0)tags+=`<span class="scope-tag scope-self">自</span>`;
    else if(e.scope===1)tags+=`<span class="scope-tag scope-all">全</span>`;
    else if(e.scope===2||e.scope===3||e.scope===4){
      const lim=e.element!=null?(ELEMENT[[].concat(e.element)[0]]||'限'):e.weapon!=null?(WEAPON[[].concat(e.weapon)[0]]||'限'):'限';
      tags+=`<span class="scope-tag scope-lim">${lim}</span>`;
    } else if(e.scope===5)tags+=`<span class="scope-tag scope-lim">限</span>`;
    if(e.condition)tags+=`<span class="cond-tag cond-${e.condition}">${CONDITION[e.condition]||''}</span>`;
  });
  return`<div class="dm-skill-tags">${tags}</div>`;
}


export const renderDMStats = (stats) => {
  const max=stats.max||{},init=stats.initial||null;
  const cards=Object.keys(max).map(k=>{
    const lbl={HP:'HP','攻撃力':'攻撃力','防御力':'防御力','ブレイク力':'ブレイク力','フルヒット攻撃力':'フルヒット'}[k]||k;
    const mv=max[k]!=null?Number(max[k]).toLocaleString('ja-JP'):'-';
    const iv=init&&init[k]!=null?Number(init[k]).toLocaleString('ja-JP'):null;
    return min`
      <div class="dm-stat-card">
        <div class="dm-stat-label">${escHtml(lbl)}</div>
        <div class="dm-stat-row">
          <span class="dm-stat-row-lbl">最大</span>
          <span class="dm-stat-row-val">${mv}</span>
        </div>
        ${iv!==null ? min`
          <div class="dm-stat-row">
            <span class="dm-stat-row-lbl">初期</span>
            <span class="dm-stat-row-val init">${iv}</span>
          </div>` : ''}
      </div>`;
  }).join('');
  return`<div class="dm-stat-grid">${cards}</div>`;
}

export const renderDMBasicInfo = (info) => {
  const rows=Object.entries(info).map(([k,v])=>{
    let dv;
    if(k==='Hit数'&&Array.isArray(v)){
      const phases=v.map((n,i)=>`<span class="dm-hit-phase">${n}</span>${i<v.length-1?'<span class="dm-hit-arrow">-</span>':''}`).join('');
      const total=v.reduce((a,b)=>a+b,0);
      dv=`<div class="dm-hit-phases">${phases}<span style="color:var(--text2);font-size:11px;margin-left:4px">合計${total}hit</span></div>`;
    } else dv=escHtml(String(v??'-'));
    return`<div class="dm-info-cell lbl">${escHtml(k)}</div><div class="dm-info-cell val">${dv}</div>`;
  }).join('');
  return`<div class="dm-info-table">${rows}</div>`;
}

export const renderSlot = (i) => {
  const t=team[i];
  const chara=allCharas.find(x=>x.id===t.chara)||null;
  const soul=allSouls.find(x=>x.id===t.soul)||null;
  const bg=allBGs.find(x=>x.id===t.bg)||null;

  const usedCr=t.crystals.filter(Boolean).length;
  const eclr=chara?(ELEM_COLOR[chara.element]||'#888'):null;

    `<span class="bd-sp-tag bd-sp-${s}">${CHARA_TAG[s] || s}</span>`).join('') : '';

    ?`<span class="slot-chara-name">${escHtml(chara.name)}</span>${charaTagsHtml?`<span class="slot-chara-tags" style="display:inline-flex;gap:3px;flex-wrap:wrap;margin-left:6px">${charaTagsHtml}</span>`:''}`

    :`<div class="equip-icon-empty"></div>`;

    ?`<img class="equip-icon soul-img" src="https://img.altema.jp/bxb/soul/icon/${soul.id}.jpg" onerror="this.style.visibility='hidden'" alt="">`
    :`<div class="equip-icon-empty soul-img"></div>`;

    ?`<img class="equip-icon bg-img" src="https://img.altema.jp/bxb/blade_graph/icon/${bg.id}.jpg" onerror="this.style.visibility='hidden'" alt="">`
    :`<div class="equip-icon-empty bg-img"></div>`;

  let crystalHtml='';
  if(chara){
    const slots=Array.from({length:nCr},(_,ci)=>{
      const cfg=t.crystals[ci]??null;
      const cid=cfg?.id??null;
      const cr=cid?allCrystals.find(x=>x.id===cid):null;
      // ⚙ 按钮：仅当 crystal 有 weight_step > 0 / purity_step > 0 / 任意 effect 含 lv_delta 才显示
      const hasLvDelta = !!(cr && (cr.effects || []).some(e => e.lv_delta !== undefined) && cryLvMax(cr) > 1);
      const hasDims = !!(cr && (_parseScaling(cr.weight_step) > 0 || _parseScaling(cr.purity_step) > 0 || hasLvDelta));

        ? `<button class="crystal-cfg-btn" onclick="openCrystalDimPopover(${i},${ci},this)" title="重量/純度/Lv">⚙</button>`

        ?`<div class="crystal-slot-wrap">

          ${chara?`<div class="picker-sub"><span class="elem-dot" style="background:${eclr}"></span>${enam} ${wnam}</div>`:''}

        ${charaSkills?`<div class="detail-wrap" id="col${i}c">${charaSkills}</div>`:''}
