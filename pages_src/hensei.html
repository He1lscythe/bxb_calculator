        ${bgPanel?`<div class="detail-wrap" id="col${i}b">${bgPanel}</div>`:''}
      </div>
      ${crystalHtml}
    </div>`;
}

// ===== MOBILE SLOT FLIP =====
let mobileActiveSlot = 0;
let _txStart = 0, _tyStart = 0;
const MOB_DUR = 200;

export const isMob = () => { return window.innerWidth <= 760; }

export const msiClick = (idx) => {
  if(idx >= teamSize) return;
  flipMobSlot(idx, idx > mobileActiveSlot ? 1 : -1);
}

export const updateMobIndicator = () => {
  document.querySelectorAll('.msi-dot').forEach((d, i) => {
    d.classList.toggle('active', i === mobileActiveSlot);
    d.classList.toggle('mob-disabled', i >= teamSize);
  });
}

export const updateMobVisible = () => {
  if(!isMob()){
    for(let i=0;i<3;i++) document.getElementById('slot-'+i)?.classList.remove('mob-hidden');
    return;
  }
  for(let i=0;i<3;i++) document.getElementById('slot-'+i)?.classList.toggle('mob-hidden', i !== mobileActiveSlot);
  updateMobIndicator();
}

const _MOB_ANIM = ['mob-anim-outL','mob-anim-outR','mob-anim-inR','mob-anim-inL'];
export const _clearMobAnim = (el) => { _MOB_ANIM.forEach(c => el.classList.remove(c)); }

export const flipMobSlot = (nextIdx, dir) => {
  // wrap around within enabled slots
  nextIdx = ((nextIdx % teamSize) + teamSize) % teamSize;
  if(nextIdx === mobileActiveSlot) return;
  const cur = document.getElementById('slot-' + mobileActiveSlot);
  const nxt = document.getElementById('slot-' + nextIdx);
  if(!cur || !nxt) return;
  const outCls = dir > 0 ? 'mob-anim-outL' : 'mob-anim-outR';
  const inCls  = dir > 0 ? 'mob-anim-inR'  : 'mob-anim-inL';
  _clearMobAnim(cur);
  cur.classList.add(outCls);
  cur.addEventListener('animationend', function h(){
    cur.removeEventListener('animationend', h);
    _clearMobAnim(cur);
    cur.classList.add('mob-hidden');
    _clearMobAnim(nxt);
    nxt.classList.remove('mob-hidden');
    nxt.classList.add(inCls);
    mobileActiveSlot = nextIdx;
    updateMobIndicator();
    nxt.addEventListener('animationend', function h2(){
      nxt.removeEventListener('animationend', h2);
      _clearMobAnim(nxt);
    });
  });
}

const _sGrid = document.getElementById('slots-grid');
let _swipeBlocked = false;
_sGrid.addEventListener('touchstart', e => {
  _txStart = e.touches[0].clientX;
  _tyStart = e.touches[0].clientY;
  _swipeBlocked = !!e.target.closest('input[type=range]');
}, {passive: true});
_sGrid.addEventListener('touchend', e => {
  if(!isMob() || _swipeBlocked) return;
  const dx = _txStart - e.changedTouches[0].clientX;
  const dy = Math.abs(_tyStart - e.changedTouches[0].clientY);
  if(Math.abs(dx) > 50 && Math.abs(dx) > dy * 1.5){
    if(dx > 0) flipMobSlot(mobileActiveSlot + 1, 1);
    else        flipMobSlot(mobileActiveSlot - 1, -1);
  }
}, {passive: true});

window.addEventListener('resize', updateMobVisible);

// ===== STAT TRACE MODAL（IS_LOCAL_DEV のみ）=====
// 各 stat の計算 trace を stage 別に展開表示。GitHub Pages では UI 入口無効・本ブロック全部 no-op。
const _statTraceState = { slot: -1, statKey: '攻撃力', openStages: new Set() };

const _STAT_TRACE_TABS = ['攻撃力', '防御力', 'HP', 'ブレイク力', 'Hit', 'ダメ上限'];

const _fmtTraceVal = (v) => {
  if (v == null || !Number.isFinite(v)) return '-';
  if (Math.abs(v) >= 10000 || (Math.abs(v) > 0 && Math.abs(v) < 0.01)) return v.toExponential(3);
  return (+v.toFixed(4)).toString();
};
const _fmtTraceStat = (v) => {
  if (v == null || !Number.isFinite(v)) return '-';
  if (Math.abs(v) >= 1e13) return v.toExponential(4);
  return Math.round(v * 100) / 100 < 1 ? (+v.toFixed(4)).toString() : Math.round(v).toLocaleString('en-US');
};
const _opSymbol = (op) => {
  if (op === 'add' || op === 'final-add') return '+';
  if (op === 'mul' || op === 'final-mul') return '×';
  return op;
};

// Hit tab は 3 stage hits + total を 1 view に統合表示するため特別扱い。
const _statTraceMatch = (step, statKey) => {
  if (statKey === 'Hit') return /^Hit[123]$/.test(step.stat);
  return step.stat === statKey;
};

const _statTraceFinalValue = (trace, statKey) => {
  if (!trace) return null;
  if (statKey === 'Hit') return null;  // hit は array なので別途
  if (statKey === 'ダメ上限') {
    let last = trace.damageLimitBase;
    for (const st of trace.stages) for (const s of st.steps) if (s.stat === 'ダメ上限') last = s.after;
    return last;
  }
  let last = trace.base[statKey];
  for (const st of trace.stages) for (const s of st.steps) if (s.stat === statKey) last = s.after;
  return last;
};

const _statTraceBase = (trace, statKey) => {
  if (!trace) return 0;
  if (statKey === 'Hit') return 0;
  if (statKey === 'ダメ上限') return trace.damageLimitBase;
  return trace.base[statKey] || 0;
};

export const openStatTrace = (si, statKey) => {
  if (!IS_LOCAL_DEV) return;
  _statTraceState.slot = si;
  _statTraceState.statKey = statKey;
  _statTraceState.openStages = new Set();  // 全 stage 折りたたみで開始
  const r = _lastTrace[si];
  const c = allCharas.find(x => x.id === team[si].chara);
  const title = document.getElementById('stat-trace-title');
  if (title) title.textContent = `Slot${si + 1}  ${c?.name || ''} — 計算明細`;
  _renderStatTraceTabs();
  _renderStatTraceBody();
  document.getElementById('stat-trace-modal').classList.add('open');
};

export const closeStatTrace = () => {
  const el = document.getElementById('stat-trace-modal');
  if (el) el.classList.remove('open');
};

export const setStatTraceTab = (statKey) => {
  _statTraceState.statKey = statKey;
  _statTraceState.openStages = new Set();
  _renderStatTraceTabs();
  _renderStatTraceBody();
};

export const toggleStatTraceStage = (key) => {
  if (_statTraceState.openStages.has(key)) _statTraceState.openStages.delete(key);
  else _statTraceState.openStages.add(key);
  _renderStatTraceBody();
};

const _renderStatTraceTabs = () => {
  const cur = _statTraceState.statKey;
  const html = _STAT_TRACE_TABS.map(k => {
    const label = k === '攻撃力' ? '攻撃力' : k === 'ブレイク力' ? 'BK' : k === 'Hit' ? 'Hit数' : k;
    return `<button class="${cur === k ? 'on' : ''}" onclick="setStatTraceTab('${k}')">${label}</button>`;
  }).join('');
  document.getElementById('stat-trace-tabs').innerHTML = html;
};

const _renderStatTraceBody = () => {
  const si = _statTraceState.slot;
  const statKey = _statTraceState.statKey;
  const r = _lastTrace[si];
  const body = document.getElementById('stat-trace-body');
  if (!r || !r.trace) { body.innerHTML = '<div style="padding:20px;color:var(--text2)">trace なし</div>'; return; }
  const trace = r.trace;

  // Hit tab は 3 stage の hits を並べる
  if (statKey === 'Hit') {
    let html = `<div class="trace-base">Base hits: [${(trace.hitsBase || []).join(', ')}]</div>`;
    for (const stage of trace.stages) {
      const hitSteps = stage.steps.filter(s => /^Hit[123]$/.test(s.stat));
      if (!hitSteps.length) continue;
      const open = _statTraceState.openStages.has(stage.key);
      html += `<div class="trace-stage">
        <div class="trace-stage-head" onclick="toggleStatTraceStage('${stage.key}')">
          <span><span class="arrow">${open ? '▼' : '▶'}</span> ${escHtml(stage.label)}</span>
          <span class="trace-stage-tot">${hitSteps.length} 件</span>
        </div>`;
      if (open) {
        html += hitSteps.map(s => `<div class="trace-step">
          <span class="src" title="${escHtml(s.src)}">${escHtml(s.src)} [${s.stat}]</span>
          <span class="op">${_opSymbol(s.op)}</span>
          <span class="val">${_fmtTraceVal(s.val)}</span>
          <span class="after">${s.before} → ${s.after}</span>
        </div>`).join('');
      }
      html += `</div>`;
    }
    const finalHits = r.hits.map(h => Math.floor(+h || 0));
    html += `<div class="trace-final">最終 hits: [${finalHits.join(', ')}]  合計 ${finalHits.reduce((a, b) => a + b, 0)}</div>`;
    body.innerHTML = html;
    return;
  }

  const base = _statTraceBase(trace, statKey);
  const finalVal = _statTraceFinalValue(trace, statKey);
  let html = `<div class="trace-base">${escHtml(statKey)} base: ${_fmtTraceStat(base)}</div>`;

  for (const stage of trace.stages) {
    const steps = stage.steps.filter(s => _statTraceMatch(s, statKey));
    const isEmpty = steps.length === 0;
    const open = _statTraceState.openStages.has(stage.key);
    const stageBefore = isEmpty ? null : steps[0].before;
    const stageAfter  = isEmpty ? null : steps[steps.length - 1].after;
    const headRight = isEmpty
      ? '<span class="trace-stage-tot">（無し）</span>'
      : `<span class="trace-stage-tot">${_fmtTraceStat(stageBefore)} → ${_fmtTraceStat(stageAfter)}</span>`;
    html += `<div class="trace-stage${isEmpty ? ' empty' : ''}">
      <div class="trace-stage-head" onclick="toggleStatTraceStage('${stage.key}')">
        <span><span class="arrow">${open ? '▼' : '▶'}</span> ${escHtml(stage.label)}</span>
        ${headRight}
      </div>`;
    if (open && !isEmpty) {
      html += steps.map(s => `<div class="trace-step">
        <span class="src" title="${escHtml(s.src)}">${escHtml(s.src)}</span>
        <span class="op">${_opSymbol(s.op)}</span>
        <span class="val">${_fmtTraceVal(s.val)}</span>
        <span class="after">${_fmtTraceStat(s.before)} → ${_fmtTraceStat(s.after)}</span>
      </div>`).join('');
    }
    html += `</div>`;
  }

  // 最終 + sanity check
  const displayed = statKey === '攻撃力' ? r.stats['攻撃力']
                  : statKey === 'ダメ上限' ? r.damageLimit
                  : r.stats[statKey];
  const mismatch = displayed != null && finalVal != null && Math.abs(displayed - finalVal) > 1e-3;
  html += `<div class="trace-final">最終: ${_fmtTraceStat(finalVal)}${mismatch ? '  ⚠ 表示値 ' + _fmtTraceStat(displayed) + ' と不一致' : '  ✓'}</div>`;
  if (statKey === '攻撃力') {
    html += `<div class="trace-final" style="opacity:.7;font-weight:400">攻撃力 min = max × 0.95 = ${_fmtTraceStat(finalVal * 0.95)}</div>`;
  }
  body.innerHTML = html;
};
