<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BxB 魔剣データベース</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: #2e3250;
  --text: #e0e4f0;
  --text2: #8890b0;
  --accent: #5b7fff;
  --ss: #ff5555;
  --s:  #ff9933;
  --aa: #55aaff;
  --a:  #55cc77;
  --fire:  #ff5533;
  --water: #3388ff;
  --wind:  #44cc66;
  --light: #ffcc00;
  --dark:  #aa55ff;
  --none:  #888899;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Yu Gothic', sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ===== TOPBAR ===== */
#topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#topbar h1 { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; }
#file-label { cursor: pointer; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; transition: opacity .15s; }
#file-label:hover { opacity: .85; }
#file-input { display: none; }
#file-status { color: var(--text2); font-size: 13px; }

/* ===== LAYOUT ===== */
#layout { display: flex; flex: 1; overflow: hidden; }

/* ===== SIDEBAR ===== */
#sidebar { width: 420px; min-width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#filters { padding: 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 7px; flex-shrink: 0; }
#filters input[type=text] { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; outline: none; }
#filters input[type=text]:focus { border-color: var(--accent); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-row select { flex: 1; min-width: 0; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 12px; outline: none; cursor: pointer; }
#char-count { font-size: 11px; color: var(--text2); text-align: right; padding: 2px 2px 0; }
#char-list { flex: 1; overflow-y: auto; }
#char-list::-webkit-scrollbar { width: 4px; }
#char-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.char-item { padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .1s; user-select: none; }
.char-item:hover { background: var(--bg3); }
.char-item.active { background: #1e2d5a; border-left: 3px solid var(--accent); }
.char-item .badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge { font-size: 12px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
.badge.SS { background: var(--ss); color: #fff; }
.badge.S  { background: var(--s);  color: #fff; }
.badge.AA { background: var(--aa); color: #fff; }
.badge.A  { background: var(--a);  color: #fff; }
.elem-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.char-item .char-name { flex: 1; font-size: 14px; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.state-dots { display: flex; gap: 2px; flex-shrink: 0; }
.state-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.state-dot.has { background: var(--accent); }
.badge.elem-1 { background: var(--fire);  color: #fff; }
.badge.elem-2 { background: var(--water); color: #fff; }
.badge.elem-3 { background: var(--wind);  color: #fff; }
.badge.elem-4 { background: var(--light); color: #000; }
.badge.elem-5 { background: var(--dark);  color: #fff; }
.badge.elem-6 { background: var(--none);  color: #fff; }
.badge.weapon { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.chara-icon { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
.profile-body { display: flex; gap: 16px; align-items: flex-start; }
.profile-body .profile-table { flex: 1; min-width: 0; }
.prof-image { width: 140px; flex-shrink: 0; border-radius: 8px; object-fit: cover; }
@media (max-width: 600px) { .prof-image { display: none; } }

/* ===== DETAIL PANEL ===== */
#detail { flex: 1; overflow-y: auto; padding: 20px 24px; }
#detail::-webkit-scrollbar { width: 5px; }
#detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
#placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text2); gap: 8px; }
#placeholder svg { opacity: .3; }

/* character header */
.chara-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.chara-header-info { flex: 1; }
.chara-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.chara-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.meta-chip { display: flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; }
.meta-chip .elem-dot { width: 8px; height: 8px; }

/* state tabs */
.state-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.state-tab { padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--text2); transition: color .15s; }
.state-tab:hover { color: var(--text); }
.state-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* state content */
.state-content { display: none; }
.state-content.active { display: block; }

/* sections */
.section { margin-bottom: 20px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* stat grid */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.stat-value { font-size: 16px; font-weight: 700; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 4px; }
.stat-row-label { font-size: 11px; color: var(--text2); }
.stat-row-value { font-size: 14px; font-weight: 700; }
.stat-row-value.init { color: var(--text2); font-size: 13px; font-weight: 600; }

/* info table */
.info-table { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
.info-cell { background: var(--bg3); padding: 7px 12px; }
.info-cell.label { color: var(--text2); font-size: 12px; }
.info-cell.value { font-weight: 600; font-size: 13px; }
.hit-phases { display: flex; gap: 4px; align-items: center; }
.hit-phase { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 12px; }
.hit-arrow { color: var(--text2); font-size: 10px; }

/* skills */
.skills-list { display: flex; flex-direction: column; gap: 6px; }
.skill-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
.skill-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: var(--accent); }
.skill-effect { font-size: 13px; line-height: 1.6; color: var(--text); }

.bd-card { background: #1a1040; border: 1px solid #4433aa; border-radius: 8px; padding: 12px 14px; }
.bd-label { font-size: 10px; font-weight: 700; color: #aa88ff; letter-spacing: .1em; margin-bottom: 4px; }
.bd-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; color: #cc99ff; }
.bd-effect { font-size: 13px; line-height: 1.6; }

/* profile */
.profile-toggle { cursor: pointer; color: var(--text2); font-size: 12px; display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
.profile-toggle:hover { color: var(--text); }
.profile-table { display: grid; grid-template-columns: max-content 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
.profile-key { background: var(--bg3); padding: 6px 12px; color: var(--text2); font-size: 12px; white-space: nowrap; }
.profile-val { background: var(--bg3); padding: 6px 12px; font-size: 12px; line-height: 1.5; }

/* empty state */
.no-results { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 13px; }

/* edit mode */
.btn-edit { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
.btn-edit:hover { background: rgba(91,127,255,.1); }
.edit-mode-active { background: rgba(91,127,255,.04); border: 1px solid rgba(91,127,255,.3); border-radius: 10px; padding: 14px; }
.edit-actions { display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0; }
.btn-save   { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-save:hover { opacity: .85; }
.btn-cancel { background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 16px; font-size: 13px; cursor: pointer; }
.btn-cancel:hover { color: var(--text); border-color: var(--text2); }
.edit-input  { background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 4px 8px; font-size: 13px; width: 100%; font-family: inherit; }
.edit-input:focus  { outline: none; border-color: #8aabff; }
.edit-input.title  { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.edit-select { background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px; color: var(--text); padding: 4px 8px; font-size: 12px; cursor: pointer; }
.edit-textarea { background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 6px 8px; font-size: 13px; width: 100%; min-height: 56px; resize: vertical; font-family: inherit; line-height: 1.6; }
.edit-textarea:focus { outline: none; border-color: #8aabff; }
.edit-stat-num { width: 100%; background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 2px 6px; font-size: 14px; font-weight: 700; text-align: right; }
.edit-stat-num:focus { outline: none; border-color: #8aabff; }
.edit-stat-num.init { color: var(--text2); font-size: 13px; font-weight: 600; }
.field-label { font-size: 11px; color: var(--text2); margin: 6px 0 3px; }
.field-label:first-child { margin-top: 0; }
.hit-inputs { display: flex; gap: 4px; align-items: center; }
.hit-num { width: 52px; background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 2px 6px; font-size: 13px; text-align: center; }
.hit-num:focus { outline: none; border-color: #8aabff; }
.skill-edit-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }

/* revise notification bar */
#revise-bar { display: none; align-items: center; gap: 10px; background: #142814; border: 1px solid #2d6b2d; border-radius: 8px; padding: 6px 14px; margin-left: auto; }
#revise-bar span { font-size: 12px; color: #88dd88; }
#revise-status { font-size: 12px; color: #55bb55; }
.btn-revise-save { background: #1e5c1e; color: #aaffaa; border: 1px solid #2d8c2d; border-radius: 6px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-revise-save:hover { background: #266626; }
.btn-revise-save:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>

<div id="topbar">
  <h1>⚔ BxB 魔剣データベース</h1>
  <label id="file-label" for="file-input">JSON を読み込む</label>
  <input type="file" id="file-input" accept=".json,.js">
  <span id="file-status">ファイルを選択してください</span>
  <div id="revise-bar">
    <button class="btn-revise-save" onclick="saveRevise()">Save</button>
    <span id="revise-status"></span>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div id="filters">
      <input type="text" id="search" placeholder="🔍 魔剣名で検索...">
      <div class="filter-row">
        <select id="f-rarity"><option value="">すべてのレアリティ</option></select>
        <select id="f-element"><option value="">すべての属性</option></select>
      </div>
      <div class="filter-row">
        <select id="f-type"><option value="">すべての武器種</option></select>
        <select id="f-state"><option value="">すべての状態</option>
          <option value="極弐">極弐あり</option>
          <option value="改造">改造あり</option>
          <option value="通常">通常あり</option>
        </select>
      </div>
      <div id="char-count"></div>
    </div>
    <div id="char-list"></div>
  </div>

  <div id="detail">
    <div id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <p>左の一覧から魔剣を選択してください</p>
    </div>
    <div id="chara-detail" style="display:none"></div>
  </div>
</div>

<script>
// ===== MAPPINGS =====
const RARITY = {1:'A',2:'AA',3:'S',4:'SS'};
const ELEMENT = {1:'火',2:'水',3:'風',4:'光',5:'闇',6:'無'};
const ELEM_COLOR = {1:'#ff5533',2:'#3388ff',3:'#44cc66',4:'#ffcc00',5:'#aa55ff',6:'#888899'};
const WEAPON = {1:'長剣',2:'大剣',3:'太刀',4:'杖棒',5:'弓矢',6:'連弩',7:'戦斧',8:'騎槍',9:'投擲',10:'拳闘',11:'魔典',12:'大鎌'};

// ===== STATE =====
let allChars = [];
let filteredChars = [];
let selectedId = null;
let activeState = {};  // charId -> state label

// ===== DATA LOAD =====
function loadFromArray(arr, label) {
  allChars = arr;
  document.getElementById('file-status').textContent = `${label} — ${allChars.length} 件読み込み完了`;
  buildFilterOptions();
  applyFilters();
}

function loadFromJson(text, label) {
  try {
    loadFromArray(JSON.parse(text), label);
  } catch(err) {
    document.getElementById('file-status').textContent = '読み込みエラー: ' + err.message;
  }
}

// Auto-load: fetch via HTTP server, fallback to file input
document.addEventListener('DOMContentLoaded', () => {
  // Load characters.json then pre-populate reviseData from characters_revise.json
  fetch('./characters.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(text => {
      loadFromJson(text, 'characters.json');
      // Load existing revise entries so they persist across sessions
      return fetch('./characters_revise.json');
    })
    .then(r => r.ok ? r.json() : [])
    .then(arr => {
      arr.forEach(c => { reviseData[c.id] = c; });
      if (arr.length) updateReviseBar();
    })
    .catch(() => {
      document.getElementById('file-status').textContent =
        'start.py を起動してください（または右のボタンでファイルを選択）';
    });
});

// Manual fallback
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadFromJson(ev.target.result, file.name);
  reader.readAsText(file, 'utf-8');
});

// ===== FILTER OPTIONS =====
function buildFilterOptions() {
  const rarities = [...new Set(allChars.map(c => c.rarity).filter(Boolean))].sort((a,b) => b-a);
  const elements = [...new Set(allChars.map(c => c.element).filter(Boolean))].sort((a,b) => a-b);
  const types    = [...new Set(allChars.map(c => c.type).filter(Boolean))].sort((a,b) => a-b);

  populateSelect('f-rarity', rarities, v => RARITY[v] ? `${RARITY[v]}ランク` : v, 'すべてのレアリティ');
  populateSelect('f-element', elements, v => ELEMENT[v] || v, 'すべての属性');
  populateSelect('f-type',    types,    v => WEAPON[v] || v,  'すべての武器種');
}

function populateSelect(id, vals, labelFn, placeholder) {
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  vals.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = labelFn(v);
    sel.appendChild(opt);
  });
}

// ===== FILTER LOGIC =====
['search','f-rarity','f-element','f-type','f-state'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
  document.getElementById(id).addEventListener('change', applyFilters);
});

function applyFilters() {
  const q       = document.getElementById('search').value.trim().toLowerCase();
  const rarity  = document.getElementById('f-rarity').value;
  const element = document.getElementById('f-element').value;
  const type    = document.getElementById('f-type').value;
  const state   = document.getElementById('f-state').value;

  filteredChars = allChars.filter(c => {
    if (q && !c.name.toLowerCase().includes(q)) return false;
    if (rarity  && String(c.rarity)  !== rarity)  return false;
    if (element && String(c.element) !== element)  return false;
    if (type    && String(c.type)    !== type)     return false;
    if (state   && !c.states?.[state])             return false;
    return true;
  });

  document.getElementById('char-count').textContent = `${filteredChars.length} 件`;
  renderList();
}

// ===== RENDER LIST =====
function renderList() {
  const list = document.getElementById('char-list');
  if (filteredChars.length === 0) {
    list.innerHTML = '<div class="no-results">該当なし</div>';
    return;
  }
  list.innerHTML = filteredChars.map(c => {
    const rLabel = RARITY[c.rarity] || c.rarity || '?';
    const eName  = ELEMENT[c.element] || String(c.element) || '?';
    const wName  = WEAPON[c.type] || String(c.type) || '-';
    const stateKeys = Object.keys(c.states || {});
    const dots = ['極弐','改造','通常'].map(s =>
      `<div class="state-dot ${stateKeys.includes(s) ? 'has' : ''}" title="${s}"></div>`
    ).join('');
    return `<div class="char-item ${c.id === selectedId ? 'active' : ''}" data-id="${c.id}">
      <div class="badges">
        <span class="badge ${rLabel}">${rLabel}</span>
        <span class="badge elem-${c.element}">${eName}</span>
        <span class="badge weapon">${escHtml(wName)}</span>
      </div>
      <div class="char-name">${escHtml(c.name)}</div>
      <div class="state-dots">${dots}</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.char-item').forEach(el => {
    el.addEventListener('click', () => selectChar(parseInt(el.dataset.id)));
  });

  // Scroll selected item into view
  if (selectedId !== null) {
    const active = list.querySelector('.char-item.active');
    if (active) active.scrollIntoView({block:'nearest'});
  }
}

// ===== SELECT CHARACTER =====
function selectChar(id) {
  selectedId = id;
  renderList();
  const c = allChars.find(x => x.id === id);
  if (!c) return;
  document.getElementById('placeholder').style.display = 'none';
  const detail = document.getElementById('chara-detail');
  detail.style.display = 'block';
  detail.innerHTML = renderDetail(c);
  // restore / set default active state tab
  const stateKeys = Object.keys(c.states || {});
  const preferred = ['極弐','改造','通常'].find(s => stateKeys.includes(s));
  const active = activeState[id] || preferred;
  switchState(id, active, detail);
}

// ===== RENDER DETAIL =====
function renderDetail(c) {
  const rLabel = RARITY[c.rarity] || c.rarity || '?';
  const eName  = ELEMENT[c.element] || c.element || '-';
  const eColor = ELEM_COLOR[c.element] || '#888';
  const wName  = WEAPON[c.type] || c.type || '-';
  const stateKeys = Object.keys(c.states || {});

  const tabs = ['極弐','改造','通常'].filter(s => stateKeys.includes(s)).map(s =>
    `<div class="state-tab" data-state="${s}" onclick="switchState(${c.id},'${s}',document.getElementById('chara-detail'))">${s}</div>`
  ).join('');

  const contents = ['極弐','改造','通常'].filter(s => stateKeys.includes(s)).map(s =>
    `<div class="state-content" data-state="${s}">${renderStateContent(c.states[s], s, c.id)}</div>`
  ).join('');

  return `
    <div class="chara-header">
      <div class="chara-header-info">
        <div class="chara-title">${escHtml(c.name)}<img class="chara-icon" src="https://img.altema.jp/bxb/chara/icon/${c.id}.jpg" onerror="this.style.display='none'" alt=""></div>
        <div class="chara-meta">
          <span class="meta-chip"><span class="badge ${rLabel}">${rLabel}</span></span>
          <span class="meta-chip"><span class="elem-dot" style="background:${eColor}"></span>${eName}属性</span>
          <span class="meta-chip">${wName}</span>
          ${c.url ? `<a class="meta-chip" href="${c.url}" target="_blank" style="color:var(--accent);text-decoration:none">Altema ↗</a>` : ''}
        </div>
      </div>
      <button class="btn-edit" onclick="enterEditMode(${c.id})">修改</button>
    </div>
    <div class="state-tabs">${tabs}</div>
    ${contents}
  `;
}

function switchState(id, stateLabel, container) {
  activeState[id] = stateLabel;
  container.querySelectorAll('.state-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.state === stateLabel);
  });
  container.querySelectorAll('.state-content').forEach(d => {
    d.classList.toggle('active', d.dataset.state === stateLabel);
  });
}

// ===== RENDER STATE CONTENT =====
function renderStateContent(state, stateLabel, charaId) {
  const parts = [];

  // --- BD Skill ---
  if (state.bd_skill?.name) {
    parts.push(`
      <div class="section">
        <div class="section-title">ブレイズドライブ</div>
        <div class="bd-card">
          <div class="bd-label">BD SKILL</div>
          <div class="bd-name">${escHtml(state.bd_skill.name)}</div>
          <div class="bd-effect">${escHtml(state.bd_skill.effect)}</div>
        </div>
      </div>`);
  }

  // --- Skills ---
  if (state.skills?.length) {
    const cards = state.skills.map(s =>
      `<div class="skill-card"><div class="skill-name">${escHtml(s.name)}</div><div class="skill-effect">${escHtml(s.effect)}</div></div>`
    ).join('');
    parts.push(`<div class="section"><div class="section-title">スキル構成 (${state.skills.length})</div><div class="skills-list">${cards}</div></div>`);
  }

  // --- Stats ---
  if (state.stats) {
    parts.push(`<div class="section"><div class="section-title">ステータス</div>${renderStats(state.stats, stateLabel)}</div>`);
  }

  // --- Basic Info ---
  if (state.basic_info) {
    parts.push(`<div class="section"><div class="section-title">基本情報</div>${renderBasicInfo(state.basic_info)}</div>`);
  }

  // --- Profile ---
  if (state.profile && Object.keys(state.profile).length > 0) {
    const rows = Object.entries(state.profile).map(([k,v]) =>
      `<div class="profile-key">${escHtml(k)}</div><div class="profile-val">${escHtml(v)}</div>`
    ).join('');
    const profImg = charaId
      ? `<img class="prof-image" src="https://img.altema.jp/bxb/chara/prof/${charaId}_1.jpg" onerror="this.style.display='none'" alt="">`
      : '';
    parts.push(`
      <div class="section">
        <div class="section-title">プロフィール</div>
        <div class="profile-body">
          <div class="profile-table">${rows}</div>
          ${profImg}
        </div>
      </div>`);
  }

  return parts.join('') || '<div class="no-results">データなし</div>';
}

// ===== RENDER STATS =====
function renderStats(stats, stateLabel) {
  const STAT_LABELS = {
    HP:'HP', '攻撃力':'攻撃力', '防御力':'防御力',
    'ブレイク力':'ブレイク力', 'フルヒット攻撃力':'フルヒット'
  };

  // All states now use {max:{...}} or {initial:{...}, max:{...}}
  const maxStats   = stats.max    || {};
  const initStats  = stats.initial || null;
  const keys = Object.keys(maxStats);

  const cards = keys.map(k => {
    const lbl = STAT_LABELS[k] || k;
    const max = fmt(maxStats[k]);
    const init = initStats ? fmt(initStats[k]) : null;
    return `<div class="stat-card">
      <div class="stat-label">${escHtml(lbl)}</div>
      <div class="stat-row">
        <span class="stat-row-label">最大</span>
        <span class="stat-row-value">${max}</span>
      </div>
      ${init !== null ? `<div class="stat-row">
        <span class="stat-row-label">初期</span>
        <span class="stat-row-value init">${init}</span>
      </div>` : ''}
    </div>`;
  }).join('');
  return `<div class="stat-grid">${cards}</div>`;
}

// ===== RENDER BASIC INFO =====
function renderBasicInfo(info) {
  const rows = Object.entries(info).map(([k, v]) => {
    let displayVal;
    if (k === 'Hit数' && Array.isArray(v)) {
      const phases = v.map((n,i) => `<span class="hit-phase">${n}</span>${i<v.length-1?'<span class="hit-arrow">→</span>':''}`).join('');
      const total = v.reduce((a,b)=>a+b,0);
      displayVal = `<div class="hit-phases">${phases}<span style="color:var(--text2);font-size:11px;margin-left:4px">合計${total}hit</span></div>`;
    } else if (k === 'Hit数' && typeof v === 'number') {
      // Legacy: single number stored before fix
      displayVal = `${v}hit`;
    } else {
      displayVal = escHtml(String(v ?? '-'));
    }
    return `<div class="info-cell label">${escHtml(k)}</div><div class="info-cell value">${displayVal}</div>`;
  }).join('');
  return `<div class="info-table">${rows}</div>`;
}

// ===== HELPERS =====
function fmt(n) {
  if (n == null) return '-';
  if (typeof n === 'number') return n.toLocaleString('ja-JP');
  return String(n);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== EDIT MODE STATE =====
let editData   = null;
let reviseData = {};

// ===== PATH UTILITIES =====
function setPath(obj, pathStr, value) {
  const parts = pathStr.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (cur[parts[i]] == null) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function setHit(stateLabel, idx, value) {
  const arr = editData.states[stateLabel].basic_info['Hit数'];
  if (Array.isArray(arr)) arr[idx] = value;
}

// ===== ENTER / CANCEL / SAVE =====
function enterEditMode(charId) {
  const c = allChars.find(x => x.id === charId);
  if (!c) return;
  editData = JSON.parse(JSON.stringify(c));
  const detail = document.getElementById('chara-detail');
  detail.innerHTML = renderEditDetail(editData);
  const stateKeys = Object.keys(editData.states || {});
  const first = ['極弐','改造','通常'].find(s => stateKeys.includes(s));
  if (first) switchState(charId, first, detail);
}

function cancelEdit() {
  editData = null;
  selectChar(selectedId);
}

function saveEdit() {
  if (!editData) return;
  const original = allChars.find(x => x.id === editData.id);
  if (JSON.stringify(editData) !== JSON.stringify(original)) {
    const idx = allChars.findIndex(x => x.id === editData.id);
    if (idx >= 0) allChars[idx] = editData;
    reviseData[editData.id] = editData;
    updateReviseBar();
  }
  editData = null;
  selectChar(selectedId);
}

function updateReviseBar() {
  const bar   = document.getElementById('revise-bar');
  const count = Object.keys(reviseData).length;
  bar.style.display = count > 0 ? 'flex' : 'none';
  document.getElementById('revise-status').textContent = '';
}

// ===== SAVE TO FILES (POST to local server) =====
async function saveRevise() {
  const btn    = document.querySelector('.btn-revise-save');
  const status = document.getElementById('revise-status');
  btn.textContent = '保存中...';
  btn.disabled    = true;
  try {
    const res = await fetch('/save', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        characters: allChars,
        revise:     Object.values(reviseData),
      }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || res.status);
    status.textContent = '✓ 保存完了';
  } catch (err) {
    status.textContent = '保存失敗 — start.py が起動していますか？';
    console.error(err);
  } finally {
    btn.textContent = 'Save';
    btn.disabled    = false;
  }
}

// ===== EDIT RENDERING =====
function renderEditDetail(c) {
  const stateKeys = Object.keys(c.states || {});
  const tabs = ['極弐','改造','通常'].filter(s => stateKeys.includes(s)).map(s =>
    `<div class="state-tab" data-state="${s}" onclick="switchState(${c.id},'${s}',document.getElementById('chara-detail'))">${s}</div>`
  ).join('');
  const contents = ['極弐','改造','通常'].filter(s => stateKeys.includes(s)).map(s =>
    `<div class="state-content" data-state="${s}">${renderEditStateContent(c, s)}</div>`
  ).join('');

  return `
    <div class="chara-header edit-mode-active">
      <div class="chara-header-info" style="flex:1;min-width:0">
        <input class="edit-input title" value="${escHtml(c.name)}"
               oninput="setPath(editData,'name',this.value)">
        <div class="chara-meta" style="margin-top:8px">
          <select class="edit-select" onchange="setPath(editData,'rarity',Number(this.value))">
            ${[4,3,2,1].map(r=>`<option value="${r}"${c.rarity==r?' selected':''}>${RARITY[r]}ランク</option>`).join('')}
          </select>
          <select class="edit-select" onchange="setPath(editData,'element',Number(this.value))">
            ${Object.entries(ELEMENT).map(([k,v])=>`<option value="${k}"${c.element==k?' selected':''}>${v}属性</option>`).join('')}
          </select>
          <select class="edit-select" onchange="setPath(editData,'type',Number(this.value))">
            ${Object.entries(WEAPON).map(([k,v])=>`<option value="${k}"${c.type==k?' selected':''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn-save"   onclick="saveEdit()">保存</button>
        <button class="btn-cancel" onclick="cancelEdit()">キャンセル</button>
      </div>
    </div>
    <div class="state-tabs">${tabs}</div>
    ${contents}`;
}

function renderEditStateContent(c, lbl) {
  const state = c.states[lbl];
  const p     = `states.${lbl}`;
  const parts = [];

  // BD Skill
  if ('bd_skill' in state) {
    const bd = state.bd_skill || {};
    parts.push(`
      <div class="section">
        <div class="section-title">ブレイズドライブ</div>
        <div class="bd-card">
          <div class="field-label">スキル名</div>
          <input class="edit-input" value="${escHtml(bd.name||'')}"
                 oninput="setPath(editData,'${p}.bd_skill.name',this.value)">
          <div class="field-label">効果</div>
          <textarea class="edit-textarea"
                    oninput="setPath(editData,'${p}.bd_skill.effect',this.value)">${escHtml(bd.effect||'')}</textarea>
        </div>
      </div>`);
  }

  // Skills
  if (state.skills?.length) {
    const cards = state.skills.map((s, i) => `
      <div class="skill-edit-card">
        <div class="field-label">スキル名</div>
        <input class="edit-input" value="${escHtml(s.name||'')}"
               oninput="setPath(editData,'${p}.skills.${i}.name',this.value)">
        <div class="field-label">効果</div>
        <textarea class="edit-textarea"
                  oninput="setPath(editData,'${p}.skills.${i}.effect',this.value)">${escHtml(s.effect||'')}</textarea>
      </div>`).join('');
    parts.push(`<div class="section"><div class="section-title">スキル構成 (${state.skills.length})</div><div class="skills-list">${cards}</div></div>`);
  }

  // Stats
  if (state.stats) {
    const maxS  = state.stats.max  || {};
    const initS = state.stats.initial || null;
    const cards = Object.keys(maxS).map(k => {
      const lbl2 = {HP:'HP','攻撃力':'攻撃力','防御力':'防御力','ブレイク力':'ブレイク力','フルヒット攻撃力':'フルヒット'}[k] || k;
      return `<div class="stat-card">
        <div class="stat-label">${escHtml(lbl2)}</div>
        <div class="stat-row">
          <span class="stat-row-label">最大</span>
          <input type="number" class="edit-stat-num" value="${maxS[k]??''}"
                 oninput="setPath(editData,'${p}.stats.max.${k}',this.value===''?null:Number(this.value))">
        </div>
        ${initS ? `<div class="stat-row">
          <span class="stat-row-label">初期</span>
          <input type="number" class="edit-stat-num init" value="${initS[k]??''}"
                 oninput="setPath(editData,'${p}.stats.initial.${k}',this.value===''?null:Number(this.value))">
        </div>` : ''}
      </div>`;
    }).join('');
    parts.push(`<div class="section"><div class="section-title">ステータス</div><div class="stat-grid">${cards}</div></div>`);
  }

  // Basic Info
  if (state.basic_info) {
    const STRING_KEYS = new Set(['武器種','モーション','結晶スロット']);
    const rows = Object.entries(state.basic_info).map(([k, v]) => {
      let inp;
      if (k === 'Hit数' && Array.isArray(v)) {
        inp = `<div class="hit-inputs">${v.map((n,i)=>
          `<input type="number" class="hit-num" value="${n}"
                  oninput="setHit('${lbl}',${i},Number(this.value))">`
          + (i<v.length-1?'<span class="hit-arrow">→</span>':'')).join('')}</div>`;
      } else if (STRING_KEYS.has(k)) {
        inp = `<input class="edit-input" value="${escHtml(String(v??''))}"
                      oninput="setPath(editData,'${p}.basic_info.${k}',this.value)">`;
      } else {
        inp = `<input type="number" class="edit-input" value="${v??''}"
                      oninput="setPath(editData,'${p}.basic_info.${k}',this.value===''?null:Number(this.value))">`;
      }
      return `<div class="info-cell label">${escHtml(k)}</div><div class="info-cell value">${inp}</div>`;
    }).join('');
    parts.push(`<div class="section"><div class="section-title">基本情報</div><div class="info-table">${rows}</div></div>`);
  }

  // Profile
  if (state.profile && Object.keys(state.profile).length) {
    const rows = Object.entries(state.profile).map(([k, v]) =>
      `<div class="profile-key">${escHtml(k)}</div>
       <div class="profile-val"><input class="edit-input" value="${escHtml(v||'')}"
             oninput="setPath(editData,'${p}.profile.${k}',this.value)"></div>`
    ).join('');
    parts.push(`<div class="section"><div class="section-title">プロフィール</div><div class="profile-table">${rows}</div></div>`);
  }

  return parts.join('') || '<div class="no-results">データなし</div>';
}
</script>
