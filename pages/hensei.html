function switchDMState(label){
  document.querySelectorAll('.dm-state-tab').forEach(t=>t.classList.toggle('active',t.dataset.state===label));
  document.querySelectorAll('.dm-state-content').forEach(d=>d.classList.toggle('active',d.dataset.state===label));
}

function renderDMState(state,stateLabel,chara){
  const parts=[];
  const dead = new Set(chara && Array.isArray(chara._deleted_skills) ? chara._deleted_skills : []);
  const baseSkills = (state.skills||[]).filter(sk=>!dead.has(sk.name||''));
  const addedSkills = (chara && chara._added_skills && chara._added_skills[stateLabel]) || [];
  const allSkills = baseSkills.concat(addedSkills);
  if(allSkills.length){
    const cards=allSkills.map(s=>{
      const tags=dmRightTags(s);
      const bairitu=dmFmtBairitu(s);
      return`<div class="dm-skill-card">
        <div class="dm-skill-name-row"><span class="dm-skill-name">${esc(s.name||'')}</span>${tags}</div>
        <div class="dm-skill-eff-row"><span class="dm-skill-eff">${esc(s.effect||'')}</span><span class="dm-skill-bairitu">${bairitu}</span></div>
      </div>`;
    }).join('');
    parts.push(`<div class="dm-section"><div class="dm-section-title">スキル構成 (${allSkills.length})</div><div class="dm-skills-list">${cards}</div></div>`);
  }
  if(state.stats)parts.push(`<div class="dm-section"><div class="dm-section-title">ステータス</div>${renderDMStats(state.stats)}</div>`);
  if(state.basic_info)parts.push(`<div class="dm-section"><div class="dm-section-title">基本情報</div>${renderDMBasicInfo(state.basic_info)}</div>`);
  return parts.join('')||'<div style="color:var(--text2);padding:20px">データなし</div>';
}

function dmRightTags(s){
  let tags='';
  (s.effects||[]).forEach(e=>{
    (e.bunrui||[]).forEach(b=>tags+=`<span class="bunrui-tag">${BUNRUI_S[b]||b}</span>`);
    if(e.scope===0)tags+=`<span class="scope-tag scope-self">自</span>`;
    else if(e.scope===1)tags+=`<span class="scope-tag scope-all">全</span>`;
    else if(e.scope===2||e.scope===3||e.scope===4){
      const lim=e.element!=null?(ELEM[[].concat(e.element)[0]]||'限'):e.type!=null?(WEAPON[[].concat(e.type)[0]]||'限'):'限';
      tags+=`<span class="scope-tag scope-lim">${lim}</span>`;
    } else if(e.scope===5)tags+=`<span class="scope-tag scope-lim">限</span>`;
    if(e.condition===1)tags+=`<span class="cond-tag cond-1">浑身</span>`;
    else if(e.condition===2)tags+=`<span class="cond-tag cond-2">背水</span>`;
    else if(e.condition===3)tags+=`<span class="cond-tag cond-3">破損</span>`;
  });
  return`<div class="dm-skill-tags">${tags}</div>`;
}

function dmFmtBairitu(s){
  return(s.effects||[]).map(e=>{
    const bunrui = e.bunrui || [];
    const isHitOnly = bunrui.length===1 && bunrui[0]===7;
    if(isHitOnly) return fmtHitStages(e);
    let bs='';
    if(e.bairitu!=null && e.bairitu!==0){
      bs = e.calc_type===1?('+'+fmtLarge(e.bairitu)):('x'+e.bairitu);
      if(e.bairitu_scaling) bs += ' + '+e.bairitu_scaling+'*熟度';
    }
    if(bunrui.includes(7)){
      const h = fmtHitStages(e);
      if(h) bs = bs ? (bs+' / '+h) : h;
    }
    return bs;
  }).filter(Boolean).join(' / ');
}

function renderDMStats(stats){
  const max=stats.max||{},init=stats.initial||null;
  const cards=Object.keys(max).map(k=>{
    const lbl={HP:'HP','攻撃力':'攻撃力','防御力':'防御力','ブレイク力':'ブレイク力','フルヒット攻撃力':'フルヒット'}[k]||k;
    const mv=max[k]!=null?Number(max[k]).toLocaleString('ja-JP'):'-';
    const iv=init&&init[k]!=null?Number(init[k]).toLocaleString('ja-JP'):null;
    return`<div class="dm-stat-card"><div class="dm-stat-label">${esc(lbl)}</div>
      <div class="dm-stat-row"><span class="dm-stat-row-lbl">最大</span><span class="dm-stat-row-val">${mv}</span></div>
      ${iv!==null?`<div class="dm-stat-row"><span class="dm-stat-row-lbl">初期</span><span class="dm-stat-row-val init">${iv}</span></div>`:''}
    </div>`;
  }).join('');
  return`<div class="dm-stat-grid">${cards}</div>`;
}

function renderDMBasicInfo(info){
  const rows=Object.entries(info).map(([k,v])=>{
    let dv;
    if(k==='Hit数'&&Array.isArray(v)){
      const phases=v.map((n,i)=>`<span class="dm-hit-phase">${n}</span>${i<v.length-1?'<span class="dm-hit-arrow">-</span>':''}`).join('');
      const total=v.reduce((a,b)=>a+b,0);
      dv=`<div class="dm-hit-phases">${phases}<span style="color:var(--text2);font-size:11px;margin-left:4px">合計${total}hit</span></div>`;
    } else dv=esc(String(v??'-'));
    return`<div class="dm-info-cell lbl">${esc(k)}</div><div class="dm-info-cell val">${dv}</div>`;
  }).join('');
  return`<div class="dm-info-table">${rows}</div>`;
}

// ===== RENDER SLOTS =====
function toggleDetail(id,btn){
  const el=document.getElementById(id);
  const open=el.classList.toggle('open');
  btn.textContent=open?'▼':'▶';
}
function renderAll(){for(let i=0;i<3;i++)renderSlot(i);}

function renderSlot(i){
  const t=team[i];
  const chara=allCharas.find(x=>x.id===t.chara)||null;
  const soul=allSouls.find(x=>x.id===t.soul)||null;
  const bg=allBGs.find(x=>x.id===t.bg)||null;
  const st=chara?getBestState(chara):null;
  const nCr=crystalSlotCount(chara, i);
  const usedCr=t.crystals.filter(Boolean).length;
  const eclr=chara?(ELEM_CLR[chara.element]||'#888'):null;
  const enam=chara?(ELEM[chara.element]||''):'';
  const wnam=chara?(WEAPON[chara.type]||''):'';

  const hdrName=chara
    ?`<span class="slot-chara-name">${esc(chara.name)}</span><span class="slot-chara-meta">${enam} ${wnam}</span>`
    :`<span class="slot-chara-name" style="color:var(--text2);font-style:italic">未選択</span>`;

  const charaIcon=chara
    ?`<img class="equip-icon" src="https://img.altema.jp/bxb/chara/icon/${chara.id}.jpg" onerror="this.style.visibility='hidden'" alt="">`
    :`<div class="equip-icon-empty"></div>`;
  const soulIcon=soul
    ?`<img class="equip-icon soul-img" src="https://img.altema.jp/bxb/soul/icon/${soul.id}.jpg" onerror="this.style.visibility='hidden'" alt="">`
    :`<div class="equip-icon-empty soul-img"></div>`;
  const bgIcon=bg
    ?`<img class="equip-icon bg-img" src="https://img.altema.jp/bxb/blade_graph/icon/${bg.id}.jpg" onerror="this.style.visibility='hidden'" alt="">`
    :`<div class="equip-icon-empty bg-img"></div>`;

  let crystalHtml='';
  if(chara){
    const slots=Array.from({length:nCr},(_,ci)=>{
      const cid=t.crystals[ci]??null;
      const cr=cid?allCrystals.find(x=>x.id===cid):null;
      return cr
        ?`<div class="crystal-slot-wrap">
            <img class="crystal-thumb" src="https://img.altema.jp/bxb/kioku_kessyou/icon/${cr.id}.jpg"
              onerror="this.style.visibility='hidden'" title="${esc(cr.name)}"
              onclick="openEM(${i},'crystal',${ci})">
            <button class="crystal-rm" onclick="setCrystal(${i},${ci},null)">✕</button>
          </div>`
        :`<div class="crystal-slot-wrap">
            <div class="crystal-empty" title="結晶を選択" onclick="openEM(${i},'crystal',${ci})">+</div>
            <span style="font-size:8px;opacity:0">.</span>
          </div>`;
    }).join('');
    const crEffHtml=renderCrystalEffList(t.crystals);
    crystalHtml=`<div class="equip-section">
      <div class="equip-label">記憶結晶 ${usedCr}/${nCr}${crEffHtml?`<button class="detail-toggle" onclick="toggleDetail('col${i}r',this)">▶</button>`:''}</div>
      <div class="crystals-grid">${slots}</div>
      ${crEffHtml?`<div class="detail-wrap" id="col${i}r">${crEffHtml}</div>`:''}
    </div>`;
  }

  const charaSkills=chara?renderSkillsPanel(_resolveCharaSkills(chara)):'';
  const soulSkills=soul?renderSkillsPanel(_resolveSoulSkills(soul)):'';
  const bgPanel=renderBgPanel(bg);
  document.getElementById('slot-'+i).innerHTML=`
    <div class="slot-header"><span class="slot-num">${i+1}号位</span>${hdrName}<button class="slot-clear-btn" onclick="clearSlot(${i})">外す</button></div>
    <div class="slot-body">
      <div class="equip-section">
        <div class="equip-label">魔剣${charaSkills?`<button class="detail-toggle" onclick="toggleDetail('col${i}c',this)">▶</button>`:''}</div>
        <div class="equip-row">${charaIcon}<div class="picker-wrap">
          <div class="picker-row">
            <button class="picker-btn ${chara?'has-val':'empty'}" onclick="openEM(${i},'chara')">${chara?esc(chara.name):'魔剣を選択...'}</button>
            ${chara?`<button class="em-detail-btn" onclick="openDetailModal(${chara.id},'chara',false)">詳細</button>`:''}
          </div>
          ${chara?`<div class="picker-sub"><span class="elem-dot" style="background:${eclr}"></span>${enam} ${wnam}</div>`:''}
        </div></div>
        ${charaSkills?`<div class="detail-wrap" id="col${i}c">${charaSkills}</div>`:''}
      </div>
      ${renderTraining(i,chara)}
      ${chara?renderOmoideEquip(i,chara):''}
      ${chara?renderStatsPanel(i,chara):''}
      <div class="equip-section">
        <div class="equip-label">ソウル${soulSkills?`<button class="detail-toggle" onclick="toggleDetail('col${i}s',this)">▶</button>`:''}</div>
        <div class="equip-row">${soulIcon}<div class="picker-wrap">
          <div class="picker-row">
            <button class="picker-btn ${soul?'has-val':'empty'}" onclick="openEM(${i},'soul')">${soul?esc(soul.name):'ソウルを選択...'}</button>
            ${soul?`<button class="em-detail-btn" onclick="openDetailModal(${soul.id},'soul',false)">詳細</button>`:''}
          </div>
        </div></div>
        ${soul?renderSoulTraining(i,soul):''}
        ${soulSkills?`<div class="detail-wrap" id="col${i}s">${soulSkills}</div>`:''}
      </div>
      <div class="equip-section">
        <div class="equip-label">心象結晶${bgPanel?`<button class="detail-toggle" onclick="toggleDetail('col${i}b',this)">▶</button>`:''}</div>
        <div class="equip-row">${bgIcon}<div class="picker-wrap">
          <div class="picker-row">
            <button class="picker-btn ${bg?'has-val':'empty'}" onclick="openEM(${i},'bg')">${bg?esc(bg.name):'なし'}</button>
            ${bg?`<button class="em-detail-btn" onclick="openDetailModal(${bg.id},'bg',false)">詳細</button>`:''}
          </div>
        </div></div>
        ${bgPanel?`<div class="detail-wrap" id="col${i}b">${bgPanel}</div>`:''}
      </div>
      ${crystalHtml}
    </div>`;
}

// ===== MOBILE SLOT FLIP =====
let mobileActiveSlot = 0;
let _txStart = 0, _tyStart = 0;
const MOB_DUR = 200;

function isMob(){ return window.innerWidth <= 760; }

function msiClick(idx){
  if(idx >= teamSize) return;
  flipMobSlot(idx, idx > mobileActiveSlot ? 1 : -1);
}

function updateMobIndicator(){
  document.querySelectorAll('.msi-dot').forEach((d, i) => {
    d.classList.toggle('active', i === mobileActiveSlot);
    d.classList.toggle('mob-disabled', i >= teamSize);
  });
}

function updateMobVisible(){
  if(!isMob()){
    for(let i=0;i<3;i++) document.getElementById('slot-'+i)?.classList.remove('mob-hidden');
    return;
  }
  for(let i=0;i<3;i++) document.getElementById('slot-'+i)?.classList.toggle('mob-hidden', i !== mobileActiveSlot);
  updateMobIndicator();
}

const _MOB_ANIM = ['mob-anim-outL','mob-anim-outR','mob-anim-inR','mob-anim-inL'];
function _clearMobAnim(el){ _MOB_ANIM.forEach(c => el.classList.remove(c)); }

function flipMobSlot(nextIdx, dir){
  // wrap around within enabled slots
  nextIdx = ((nextIdx % teamSize) + teamSize) % teamSize;
  if(nextIdx === mobileActiveSlot) return;
  const cur = document.getElementById('slot-' + mobileActiveSlot);
  const nxt = document.getElementById('slot-' + nextIdx);
  if(!cur || !nxt) return;
  const outCls = dir > 0 ? 'mob-anim-outL' : 'mob-anim-outR';
  const inCls  = dir > 0 ? 'mob-anim-inR'  : 'mob-anim-inL';
  _clearMobAnim(cur);
  cur.classList.add(outCls);
  cur.addEventListener('animationend', function h(){
    cur.removeEventListener('animationend', h);
    _clearMobAnim(cur);
    cur.classList.add('mob-hidden');
    _clearMobAnim(nxt);
    nxt.classList.remove('mob-hidden');
    nxt.classList.add(inCls);
    mobileActiveSlot = nextIdx;
    updateMobIndicator();
    nxt.addEventListener('animationend', function h2(){
      nxt.removeEventListener('animationend', h2);
      _clearMobAnim(nxt);
    });
  });
}

const _sGrid = document.getElementById('slots-grid');
let _swipeBlocked = false;
_sGrid.addEventListener('touchstart', e => {
  _txStart = e.touches[0].clientX;
  _tyStart = e.touches[0].clientY;
  _swipeBlocked = !!e.target.closest('input[type=range]');
}, {passive: true});
_sGrid.addEventListener('touchend', e => {
  if(!isMob() || _swipeBlocked) return;
  const dx = _txStart - e.changedTouches[0].clientX;
  const dy = Math.abs(_tyStart - e.changedTouches[0].clientY);
  if(Math.abs(dx) > 50 && Math.abs(dx) > dy * 1.5){
    if(dx > 0) flipMobSlot(mobileActiveSlot + 1, 1);
    else        flipMobSlot(mobileActiveSlot - 1, -1);
  }
}, {passive: true});

window.addEventListener('resize', updateMobVisible);
</script>
