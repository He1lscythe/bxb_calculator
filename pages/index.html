<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BxB 魔剣データベース</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: #2e3250;
  --text: #e0e4f0;
  --text2: #8890b0;
  --accent: #5b7fff;
  --ss: #ff5555;
  --s:  #ff9933;
  --aa: #55aaff;
  --a:  #55cc77;
  --fire:  #ff5533;
  --water: #3388ff;
  --wind:  #44cc66;
  --light: #ffcc00;
  --dark:  #aa55ff;
  --none:  #888899;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
button { -webkit-user-select: text; user-select: text; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Yu Gothic', sans-serif; font-size: 14px; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
#page-wrap { max-width: 72rem; width: 100%; display: flex; flex-direction: column; overflow: hidden; }


/* ===== LAYOUT ===== */
#layout { display: flex; flex: 1; overflow: hidden; }

/* ===== SIDEBAR ===== */
#sidebar { width: 340px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#filters { padding: 7px 8px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
#filters input[type=text] { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; outline: none; }
#filters input[type=text]:focus { border-color: var(--accent); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-row select { flex: 1; min-width: 0; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 12px; outline: none; cursor: pointer; }
.filter-section { display: flex; flex-direction: column; gap: 3px; }
.filter-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }
.filter-toggles { display: flex; flex-wrap: wrap; gap: 3px; }
.filter-toggles.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); }
.filter-toggles.grid-6 { display: grid; grid-template-columns: repeat(6, max-content); gap: 3px; }
.ftog { font-size: 11px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer; transition: all .1s; white-space: nowrap; }
.ftog:hover { border-color: var(--accent); color: var(--text); }
.ftog.on { background: rgba(91,127,255,.25); border-color: #5b7fff; color: #7b9fff; font-weight: 700; }
#sort-dir { flex-shrink: 0; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; }
#sort-dir:hover { border-color: var(--accent); color: var(--accent); }
#char-count { font-size: 11px; color: var(--text2); text-align: right; padding: 2px 2px 0; }
/* Mobile filter toggle — hidden on desktop */
.filter-toggle-btn { display: none; width: 100%; margin: 4px 0; padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; }
.filter-toggle-btn:hover { border-color: var(--accent); }
/* Desktop: filter body always visible */
#filters-body { display: flex; flex-direction: column; gap: 8px; }
#char-list { flex: 1; overflow-y: auto; }
/* Mobile-only modal navbar (hidden on desktop) */
#detail-mob-bar { display: none; align-items: center; justify-content: space-between; gap: 8px; position: sticky; top: 0; z-index: 10; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 12px; }
#detail-mob-bar button { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-size: 14px; padding: 6px 14px; border-radius: 6px; cursor: pointer; min-width: 56px; }
#detail-mob-bar button:hover { border-color: var(--accent); }
#detail-mob-bar button:disabled { opacity: 0.3; cursor: default; }
#detail-mob-bar .nav-label { font-size: 12px; color: var(--text2); flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#char-list::-webkit-scrollbar { width: 4px; }
#char-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.char-item { padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .1s; }
.char-item:hover { background: var(--bg3); }
.char-item.active { background: #1e2d5a; border-left: 3px solid var(--accent); }
.char-item .badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
.badge.SS { background: var(--ss); color: #fff; }
.badge.S  { background: var(--s);  color: #fff; }
.badge.AA { background: var(--aa); color: #fff; }
.badge.A  { background: var(--a);  color: #fff; }
.elem-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.char-item .char-name { flex: 1; font-size: 12px; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.char-item .sort-val { font-size: 11px; font-weight: 700; color: var(--accent); white-space: nowrap; flex-shrink: 0; padding: 1px 6px; border-radius: 4px; background: rgba(91,127,255,.12); border: 1px solid rgba(91,127,255,.3); }
.state-dots { display: flex; gap: 2px; flex-shrink: 0; }
.state-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.state-dot.has { background: var(--accent); }
.badge.elem-1 { background: var(--fire);  color: #fff; }
.badge.elem-2 { background: var(--water); color: #fff; }
.badge.elem-3 { background: var(--wind);  color: #fff; }
.badge.elem-4 { background: var(--light); color: #000; }
.badge.elem-5 { background: var(--dark);  color: #fff; }
.badge.elem-6 { background: var(--none);  color: #fff; }
.badge.weapon { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
@media (max-width: 768px) {
  body { height: auto; overflow-y: auto; }
  #page-wrap { overflow: visible; }
  #layout { flex-direction: column; overflow: visible; flex: none; }
  #sidebar { width: 100%; height: auto; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); overflow: visible; }
  #char-list { height: auto; flex: none; overflow: visible; }
  /* Detail as fullscreen modal on mobile */
  #detail {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 0;
  }
  #detail.show-mob { display: block; }
  #placeholder { display: none; }
  #detail-mob-bar { display: flex; }
  #chara-detail { padding: 14px 16px; }
  .filter-toggle-btn { display: block; }
  #filters-body { display: none; }
  #topbar { position: static !important; }
  #filters {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg2);
  }
}

/* ===== DETAIL PANEL ===== */
#detail { flex: 1; overflow-y: auto; padding: 20px 24px; }
#detail::-webkit-scrollbar { width: 5px; }
#detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
#placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text2); gap: 8px; }
#placeholder svg { opacity: .3; }

/* character header */
.chara-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.chara-header-info { flex: 1; }
.chara-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.chara-icon { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
.btn-latent { padding: 5px 12px; border-radius: 6px; border: 1px solid #5b7fff; background: rgba(91,127,255,.15); color: #7b9fff; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; user-select: text; -webkit-user-select: text; }
.btn-latent:hover { background: rgba(91,127,255,.3); }

/* latent modal */
#latent-modal { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; }
#prompt-modal { display: none; position: fixed; inset: 0; z-index: 2000; align-items: center; justify-content: center; }
.prompt-panel { position: relative; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: min(360px, 92vw); z-index: 1; padding: 20px 20px 16px; display: flex; flex-direction: column; gap: 12px; }
.prompt-title { font-size: 14px; font-weight: 700; }
.prompt-actions { display: flex; gap: 8px; justify-content: flex-end; }
.latent-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.6); touch-action: none; }
.latent-panel { position: relative; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: min(520px, 92vw); max-height: 80vh; display: flex; flex-direction: column; z-index: 1; }
.latent-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.latent-panel-header span { font-size: 15px; font-weight: 700; }
.latent-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; }
.latent-close:hover { color: var(--text); background: var(--bg3); }
.latent-body { overflow-y: auto; padding: 12px 18px 16px; flex: 1; }
.latent-body::-webkit-scrollbar { width: 4px; }
.latent-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.omoide-row { margin-bottom: 16px; }
.omoide-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.omoide-slots { display: flex; flex-direction: column; gap: 4px; }
.latent-slot { display: grid; grid-template-columns: 1fr 1fr minmax(4.5em, auto); align-items: baseline; gap: 6px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; }
.latent-slot-koka { font-weight: 600; color: var(--text); }
.latent-slot-syosai { color: var(--text2); }
.latent-slot-bairitu { font-size: 11px; color: var(--accent); white-space: nowrap; text-align: right; }
.latent-slot-bairitu.empty { color: var(--border); }
.chara-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.meta-chip { display: flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; }
.meta-chip .elem-dot { width: 8px; height: 8px; }

/* state tabs */
.state-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.state-tab { padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--text2); transition: color .15s; }
.state-tab:hover { color: var(--text); }
.state-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* state content */
.state-content { display: none; }
.state-content.active { display: block; }

/* sections */
.section { margin-bottom: 20px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* stat grid */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.stat-value { font-size: 16px; font-weight: 700; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 4px; }
.stat-row-label { font-size: 11px; color: var(--text2); }
.stat-row-value { font-size: 14px; font-weight: 700; }
.stat-row-value.init { color: var(--text2); font-size: 13px; font-weight: 600; }

/* info table */
.info-table { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
.info-cell { background: var(--bg3); padding: 7px 12px; }
.info-cell.label { color: var(--text2); font-size: 12px; }
.info-cell.value { font-weight: 600; font-size: 13px; }
.hit-phases { display: flex; gap: 4px; align-items: center; }
.hit-phase { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 12px; }
.hit-arrow { color: var(--text2); font-size: 10px; }

/* skills */
.skills-list { display: flex; flex-direction: column; gap: 6px; }
.skill-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
.skill-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.skill-name { font-weight: 600; font-size: 13px; color: var(--accent); flex: 1; min-width: 0; }
.skill-tags-right { display: flex; gap: 3px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.skill-effect-row { display: flex; align-items: flex-start; gap: 8px; }
.skill-effect { font-size: 13px; line-height: 1.6; color: var(--text); flex: 1; }
.skill-bairitu { flex-shrink: 0; font-size: 12px; color: var(--text2); white-space: nowrap; padding-top: 2px; }
.bunrui-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; background: rgba(91,127,255,.18); color: #7b9fff; border: 1px solid rgba(91,127,255,.35); white-space: nowrap; }
.scope-tag  { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; white-space: nowrap; }
.scope-self { background: rgba(120,120,120,.18); color: #999; border: 1px solid rgba(120,120,120,.3); }
.scope-all  { background: rgba(60,180,100,.18); color: #4cbb6e; border: 1px solid rgba(60,180,100,.35); }
.scope-lim  { background: rgba(255,180,40,.18); color: #ffb828; border: 1px solid rgba(255,180,40,.35); }
.cond-tag   { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; white-space: nowrap; }
.cond-1 { background: rgba(255,200,40,.18); color: #ffd040; border: 1px solid rgba(255,200,40,.35); }
.cond-2 { background: rgba(255,80,80,.18);  color: #ff6060; border: 1px solid rgba(255,80,80,.35); }
.cond-3 { background: rgba(160,80,255,.18); color: #b060ff; border: 1px solid rgba(160,80,255,.35); }

.bd-card { background: #1a1040; border: 1px solid #4433aa; border-radius: 8px; padding: 12px 14px; }
.bd-label { font-size: 10px; font-weight: 700; color: #aa88ff; letter-spacing: .1em; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.bd-cost-tag { font-size: 10px; color: #aa88ff; font-weight: 600; }
.bd-top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.bd-name { font-weight: 700; font-size: 14px; color: #cc99ff; }
.bd-effect { font-size: 13px; line-height: 1.6; }
.bd-tags { display: flex; flex-wrap: wrap; gap: 3px; justify-content: flex-end; flex-shrink: 0; }
.bd-sp-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
.bd-sp-1 { background: rgba(80,180,255,.2); color: #60c0ff; border: 1px solid rgba(80,180,255,.35); }
.bd-sp-2 { background: rgba(180,80,255,.2); color: #c060ff; border: 1px solid rgba(180,80,255,.35); }
.bd-sp-3 { background: rgba(255,150,50,.2); color: #ff9a40; border: 1px solid rgba(255,150,50,.35); }
.bd-sp-5 { background: rgba(80,220,100,.2); color: #50d070; border: 1px solid rgba(80,220,100,.35); }
.bd-sp-6 { background: rgba(255,200,50,.2); color: #ffc840; border: 1px solid rgba(255,200,50,.35); }
.bd-dur-tag { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px; background: rgba(100,120,160,.2); color: #a0b0d0; border: 1px solid rgba(100,120,160,.3); white-space: nowrap; }
.bd-hit-tag { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px; background: rgba(140,140,160,.15); color: #9090b0; border: 1px solid rgba(140,140,160,.25); white-space: nowrap; }

/* profile */
.profile-toggle { cursor: pointer; color: var(--text2); font-size: 12px; display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
.profile-toggle:hover { color: var(--text); }
.profile-table { display: grid; grid-template-columns: max-content 1fr; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
.profile-key { background: var(--bg3); padding: 6px 12px; color: var(--text2); font-size: 12px; white-space: nowrap; }
.profile-val { background: var(--bg3); padding: 6px 12px; font-size: 12px; line-height: 1.5; }

/* empty state */
.no-results { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 13px; }

/* edit mode */
.btn-edit { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
.btn-edit:hover { background: rgba(91,127,255,.1); }
.edit-mode-active { background: var(--bg2); border: 1px solid rgba(91,127,255,.3); border-bottom: 2px solid rgba(91,127,255,.4); border-radius: 10px 10px 0 0; padding: 14px; position: sticky; top: 0; z-index: 5; }
.edit-actions { display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0; }
.btn-save   { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-save:hover { opacity: .85; }
.btn-cancel { background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 16px; font-size: 13px; cursor: pointer; }
.btn-cancel:hover { color: var(--text); border-color: var(--text2); }
.edit-input  { background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 4px 8px; font-size: 13px; width: 100%; font-family: inherit; }
.edit-input:focus  { outline: none; border-color: #8aabff; }
.edit-input.title  { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.edit-select { background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px; color: var(--text); padding: 4px 8px; font-size: 12px; cursor: pointer; }
.edit-textarea { background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 6px 8px; font-size: 13px; width: 100%; min-height: 56px; resize: vertical; font-family: inherit; line-height: 1.6; }
.edit-textarea:focus { outline: none; border-color: #8aabff; }
.edit-stat-num { width: 80px; background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 2px 6px; font-size: 14px; font-weight: 700; text-align: right; flex-shrink: 0; }
.edit-readonly { font-size: 13px; color: var(--text2); padding: 4px 2px; line-height: 1.6; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
.edit-stat-num:focus { outline: none; border-color: #8aabff; }
.edit-stat-num.init { color: var(--text2); font-size: 13px; font-weight: 600; }
.field-label { font-size: 11px; color: var(--text2); margin: 6px 0 3px; }
.field-label:first-child { margin-top: 0; }
.hit-inputs { display: flex; gap: 4px; align-items: center; }
.hit-num { width: 52px; background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 2px 6px; font-size: 13px; text-align: center; }
.hit-num:focus { outline: none; border-color: #8aabff; }
.skill-edit-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; position: relative; }
.skill-edit-card.deleted { opacity: 0.45; }
.skill-edit-card.deleted .skill-name { text-decoration: line-through; color: var(--text2); }
.btn-skill-tomb { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text2); font-size: 14px; line-height: 18px; cursor: pointer; padding: 0; }
.btn-skill-tomb:hover { background: rgba(255,80,80,0.15); border-color: #ff5050; color: #ff8080; }
.skill-edit-card.deleted .btn-skill-tomb { background: rgba(91,127,255,0.15); border-color: #5b7fff; color: #7b9fff; }
.bunrui-toggles { display: flex; flex-wrap: wrap; gap: 3px; }
.btog { font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--text2); cursor: pointer; white-space: nowrap; }
.btog.on { background: rgba(91,127,255,.25); border-color: #5b7fff; color: #7b9fff; }
.skill-edit-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
.skill-edit-meta > div { display: flex; flex-direction: column; gap: 2px; min-width: 60px; }
.edit-num-sm { width: 130px; background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 3px 6px; font-size: 13px; text-align: right; }

/* latent edit */
.latent-edit-container { padding: 4px 2px; }
.latent-edit-row { margin-bottom: 8px; }
.latent-edit-label { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 3px; }
.latent-edit-slots { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.latent-edit-chip { display: inline-flex; align-items: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 2px 1px 6px; }
.latent-rm-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 13px; padding: 0 4px; line-height: 1; }
.latent-rm-btn:hover { color: var(--ss); }
.btn-add-slot { font-size: 11px; padding: 2px 8px; border-radius: 4px; border: 1px dashed var(--border); background: transparent; color: var(--text2); cursor: pointer; }
.btn-add-slot:hover { border-color: var(--accent); color: var(--accent); }
/* custom select dropdown */
.lcs-trigger { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-size: 11px; padding: 2px 8px; cursor: pointer; max-width: 180px; min-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
.lcs-trigger:hover { border-color: var(--accent); }
.lcs-dropdown { position: fixed; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; z-index: 3000; width: 240px; box-shadow: 0 4px 16px rgba(0,0,0,.6); display: none; }
.lcs-search { width: 100%; background: var(--bg3); border: none; border-bottom: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 6px 10px; outline: none; border-radius: 6px 6px 0 0; box-sizing: border-box; }
.lcs-list { max-height: 200px; overflow-y: auto; }
.lcs-list::-webkit-scrollbar { width: 4px; }
.lcs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.lcs-opt { padding: 5px 10px; cursor: pointer; font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lcs-opt:hover { background: var(--bg3); }
.lcs-opt.lcs-selected { color: var(--accent); font-weight: 600; }

</style>
</head>
<body>
<div id="page-wrap">
<script src="../nav.js"></script>
<script src="../shared/filter-core.js"></script>
<script src="../shared/chara-spec.js"></script>

<div id="prompt-modal">
  <div class="latent-overlay" onclick="_promptCancel()"></div>
  <div class="prompt-panel">
    <div class="prompt-title" id="prompt-title"></div>
    <input class="edit-input" id="prompt-input" type="text">
    <div class="prompt-actions">
      <button class="btn-cancel" onclick="_promptCancel()">キャンセル</button>
      <button class="btn-save"   onclick="_promptConfirm()">保存</button>
    </div>
  </div>
</div>

<div id="latent-modal">
  <div class="latent-overlay" onclick="closeLatentModal()"></div>
  <div class="latent-panel">
    <div class="latent-panel-header">
      <span>潜在開放</span>
      <button class="latent-close" onclick="closeLatentModal()">×</button>

<div id="layout">
  <div id="sidebar">
    <div id="filters">
      <input type="text" id="search" placeholder="🔍 魔剣名で検索..." oninput="applyFilters()">
      <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="toggleFilters()">▼ 絞り込み</button>
      <div id="filters-body">
      <div class="filter-section">
        <div class="filter-label">レア度</div>
        <div class="filter-toggles" id="f-rarity">

          <button class="ftog" data-val="3" onclick="toggleFilter('rarity',3,this)">S</button>
          <button class="ftog" data-val="2" onclick="toggleFilter('rarity',2,this)">AA</button>
          <button class="ftog" data-val="1" onclick="toggleFilter('rarity',1,this)">A</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">属性</div>
        <div class="filter-toggles" id="f-element">
          <button class="ftog" data-val="1" onclick="toggleFilter('element',1,this)" style="color:var(--fire)">火</button>
          <button class="ftog" data-val="2" onclick="toggleFilter('element',2,this)" style="color:var(--water)">水</button>
          <button class="ftog" data-val="3" onclick="toggleFilter('element',3,this)" style="color:var(--wind)">風</button>
          <button class="ftog" data-val="4" onclick="toggleFilter('element',4,this)" style="color:var(--light)">光</button>
          <button class="ftog" data-val="5" onclick="toggleFilter('element',5,this)" style="color:var(--dark)">闇</button>
          <button class="ftog" data-val="6" onclick="toggleFilter('element',6,this)" style="color:var(--none)">無</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">武器種</div>
        <div class="filter-toggles grid-6" id="f-type">
          <button class="ftog" data-val="1"  onclick="toggleFilter('type',1,this)">長剣</button>
          <button class="ftog" data-val="2"  onclick="toggleFilter('type',2,this)">大剣</button>
          <button class="ftog" data-val="3"  onclick="toggleFilter('type',3,this)">太刀</button>
          <button class="ftog" data-val="4"  onclick="toggleFilter('type',4,this)">杖棒</button>
          <button class="ftog" data-val="5"  onclick="toggleFilter('type',5,this)">弓矢</button>
          <button class="ftog" data-val="6"  onclick="toggleFilter('type',6,this)">連弩</button>
          <button class="ftog" data-val="7"  onclick="toggleFilter('type',7,this)">戦斧</button>
          <button class="ftog" data-val="8"  onclick="toggleFilter('type',8,this)">騎槍</button>
          <button class="ftog" data-val="9"  onclick="toggleFilter('type',9,this)">投擲</button>
          <button class="ftog" data-val="10" onclick="toggleFilter('type',10,this)">拳闘</button>
          <button class="ftog" data-val="11" onclick="toggleFilter('type',11,this)">魔典</button>
          <button class="ftog" data-val="12" onclick="toggleFilter('type',12,this)">大鎌</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">状態</div>
        <div class="filter-toggles" id="f-state">
          <button class="ftog" data-val="極弐" onclick="toggleFilter('state','極弐',this)">極弐</button>
          <button class="ftog" data-val="改造" onclick="toggleFilter('state','改造',this)">改造</button>
          <button class="ftog" data-val="通常" onclick="toggleFilter('state','通常',this)">通常</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">BD特殊効果</div>
        <div class="filter-toggles" id="f-bdSpecial">
          <button class="ftog" data-val="1" onclick="toggleFilter('bdSpecial',1,this)" style="color:#60c0ff">時止め</button>

          <button class="ftog" data-val="3" onclick="toggleFilter('bdSpecial',3,this)" style="color:#ff9a40">強制BK</button>
          <button class="ftog" data-val="5" onclick="toggleFilter('bdSpecial',5,this)" style="color:#50d070">弱体解除</button>
          <button class="ftog" data-val="6" onclick="toggleFilter('bdSpecial',6,this)" style="color:#ffc840">高倍率バフ</button>

          <button class="ftog" data-val="1" onclick="toggleFilter('omoideRarity',1,this)" style="color:var(--a)">A</button>

      <div class="filter-row">
        <select id="f-sort">
          <option value="">並び替えなし</option>
          <option value="攻撃力">攻撃力</option>
          <option value="防御力">防御力</option>
          <option value="ブレイク力">ブレイク力</option>
          <option value="HP">HP</option>
          <option value="LP">LP</option>
          <option value="保有魔力">保有魔力</option>
          <option value="結晶スロット">結晶スロット</option>
          <option value="B">B</option>
          <option value="W">W</option>
          <option value="H">H</option>
          <option value="BDコスト">BDコスト</option>
          <option value="__hit_max">合計hit</option>
          <option value="__bdhit_max">BDヒット</option>
        </select>
        <button id="sort-dir" onclick="toggleSortDir()">↓</button>
        <button onclick="resetFilters()" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;">リセット</button>
      </div>
      </div><!-- #filters-body -->
      <div id="char-count"></div>
    </div>
    <div id="char-list"></div>
  </div>

  <div id="detail">
    <div id="detail-mob-bar">
      <button id="detail-mob-prev" onclick="navChara(-1)" aria-label="前へ">‹</button>
      <span class="nav-label" id="detail-mob-label"></span>

        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <p>左の一覧から魔剣を選択してください</p>
    </div>
    <div id="chara-detail" style="display:none"></div>
  </div>
</div>
</div>

<script>
// ===== MAPPINGS =====
const RARITY = {1:'A',2:'AA',3:'S',4:'SS'};
const ELEMENT = {1:'火',2:'水',3:'風',4:'光',5:'闇',6:'無'};
const ELEM_COLOR = {1:'#ff5533',2:'#3388ff',3:'#44cc66',4:'#ffcc00',5:'#aa55ff',6:'#888899'};
const WEAPON = {1:'長剣',2:'大剣',3:'太刀',4:'杖棒',5:'弓矢',6:'連弩',7:'戦斧',8:'騎槍',9:'投擲',10:'拳闘',11:'魔典',12:'大鎌'};
const BUNRUI_SHORT = {1:'攻',2:'BK',3:'BD攻',4:'转',5:'速',6:'BD値',7:'hit',8:'aoe',9:'異常',10:'HP',11:'回復',12:'防',13:'軽',14:'蓝',15:'紅',16:'他',17:'限',18:'BD最大',19:'枠',20:'EXP',21:'BDhit'};
const BD_SPECIAL = {1:'時止め',2:'麻痺',3:'強制ブレイク',5:'弱体解除',6:'高倍率バフ'};
const OMOIDE_THRESHOLDS = [10,200,400,700,1000,2000,3000,4000,5000,6000,7000,9000,11000,13000,15000,18000,21000,24000,27000,30000,33000,36000,39000,42000,45000,48000,51000,54000,57000,60000,63000,66000,69000,72000,75000,78000,81000,84000,87000,90000];

function hasOmoide(c) {
  return c.omoide && c.omoide.some(function(r) { return r.slots && r.slots.length > 0; });
}

function renderRightTags(s) {
  var tags = '';
  (s.effects || []).forEach(function(e) {
    (e.bunrui || []).forEach(function(b) {
      tags += '<span class="bunrui-tag">' + (BUNRUI_SHORT[b] || b) + '</span>';
    });
    if (e.scope === 0) {
      tags += '<span class="scope-tag scope-self">自</span>';
    } else if (e.scope === 1) {
      tags += '<span class="scope-tag scope-all">全</span>';
    } else if (e.scope === 2) {
      var lim = e.element != null ? (ELEMENT[e.element] || e.element) : (e.type != null ? (WEAPON[e.type] || e.type) : '限');
      tags += '<span class="scope-tag scope-lim">' + lim + '</span>';
    }
    if (e.condition === 1) tags += '<span class="cond-tag cond-1">浑身</span>';
    else if (e.condition === 2) tags += '<span class="cond-tag cond-2">背水</span>';
    else if (e.condition === 3) tags += '<span class="cond-tag cond-3">破損</span>';
  });
  return '<div class="skill-tags-right">' + tags + '</div>';
}

function fmtNum(v) {
  if (typeof v === 'string') return v;
  if (Number.isInteger(v)) return v.toLocaleString('en-US');
  return String(parseFloat(v.toFixed(4)));
}
function parseBairituVal(s) {
  if (s === '') return null;
  if (s.includes('/')) {
    var p = s.trim().split('/');
    return (p.length === 2 && p[0] !== '' && p[1] !== '') ? s.trim() : null;
  }
  var n = Number(s);
  return isNaN(n) ? null : n;
}
function ctPfx(ct) { return ct === 1 ? '+' : '×'; }
function fmtHitStages(e) {
  // Render hit_per_stage with optional milestone scaling
  var hps = Array.isArray(e.hit_per_stage) ? e.hit_per_stage : [];
  var sc  = Array.isArray(e.hit_per_stage_scaling) ? e.hit_per_stage_scaling : [0,0,0];
  if (!hps.length) return '';
  var ht  = e.hit_type != null ? e.hit_type : 0;
  var op  = (ht === 2) ? '×' : (ht === 3) ? '=' : '+';  // 2=乗算→×, 3=設定値→=, else→+
  function stageStr(v, s) {
    return op + fmtNum(v) + (s ? '(+' + fmtNum(s) + '/熟度)' : '');
  }
  // Condensed form: all 3 stages identical → show once with "全段"
  var s0 = sc[0] || 0, s1 = sc[1] || 0, s2 = sc[2] || 0;
  if (hps.length === 3 && hps[0] !== 0 && hps[0] === hps[1] && hps[1] === hps[2] && s0 === s1 && s1 === s2) {
    return stageStr(hps[0], s0);
  }
  var parts = hps.map(function(v, i) {
    if (v == null || v === 0) return null;
    return (i + 1) + '撃' + stageStr(v, sc[i] || 0);
  }).filter(Boolean);
  return parts.length ? parts.join(' / ') : '';
}

function fmtBairitu(s) {
  return (s.effects || []).map(function(e) {
    var bunrui = e.bunrui || [];
    var isHitOnly = bunrui.length === 1 && bunrui[0] === 7;
    if (isHitOnly) return fmtHitStages(e);
    var bairituStr = '';
    if (e.bairitu != null && e.bairitu !== 0) {
      var sc = e.bairitu_scaling;
      var pfx = ctPfx(e.calc_type);
      bairituStr = pfx + fmtNum(e.bairitu);
      if (sc) bairituStr += ' + ' + fmtNum(sc) + ' * 熟度';
    }
    var hitStr = bunrui.includes(7) ? fmtHitStages(e) : '';
    return [bairituStr, hitStr].filter(Boolean).join(' / ');
  }).filter(Boolean).join(' / ');
}

// ===== STATE =====
let allChars = [];
let filteredChars = [];
let selectedId = null;
let activeState = {};  // charId -> state label
let sortKey = '';
let sortDesc = true;

// ===== DATA LOAD =====
var SENZAI_TABLE = {};
fetch('../data/senzai_table.json').then(r => r.ok ? r.json() : {}).then(d => { SENZAI_TABLE = d; }).catch(() => {});

let omoideTemplates = [];
fetch('../data/omoide_templates.json').then(r => r.ok ? r.json() : []).then(d => {
  omoideTemplates = Array.isArray(d) ? d : [];
  const sel = document.getElementById('omoide-tpl-sel');
  if (sel) {
    const cur = sel.value;
    sel.innerHTML = '<option value="">テンプレートを選択...</option>'
      + omoideTemplates.map(t => `<option value="${t.id}">${escHtml(t.name)}</option>`).join('');
    if (cur) sel.value = cur;
  }
}).catch(() => {});

document.addEventListener('DOMContentLoaded', () => {
  fetch('../data/characters.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(arr => {
      allChars = arr;
      arr.forEach(c => { originalData[c.id] = JSON.parse(JSON.stringify(c)); });
      applyFilters();
      return fetch('../data/characters_revise.json');
    })
    .then(r => r.ok ? r.json() : [])
    .then(arr => {
      arr.forEach(c => {
        reviseData[c.id] = c;
        const idx = allChars.findIndex(x => x.id === c.id);
        if (idx >= 0) deepApply(allChars[idx], c);
      });
      if (arr.length) applyFilters();
      return fetch('../data/omoide_revise.json');
    })
    .then(r => r.ok ? r.json() : [])
    .then(arr => {
      arr.forEach(c => {
        omoideReviseData[c.id] = c;
        const idx = allChars.findIndex(x => x.id === c.id);
        if (idx >= 0) deepApply(allChars[idx], c);
      });
      if (arr.length) applyFilters();
    })
    .catch(() => {});
});

var _filtersOpenScrollY = null;
function toggleFilters() {
  var body = document.getElementById('filters-body');
  var btn = document.getElementById('filter-toggle-btn');
  var open = body.style.display === 'flex' || body.style.display === 'block';
  body.style.display = open ? '' : 'flex';
  btn.textContent = open ? '▼ 絞り込み' : '▲ 絞り込み';
  _filtersOpenScrollY = open ? null : window.scrollY;
}
function collapseFiltersOnScroll() {
  if (window.innerWidth > 768) return;
  var body = document.getElementById('filters-body');
  if (!body || !(body.style.display === 'flex' || body.style.display === 'block')) return;
  if (_filtersOpenScrollY === null) return;
  if (Math.abs(window.scrollY - _filtersOpenScrollY) < 30) return;
  body.style.display = '';
  var btn = document.getElementById('filter-toggle-btn');
  if (btn) btn.textContent = '▼ 絞り込み';
  _filtersOpenScrollY = null;
}
window.addEventListener('scroll', collapseFiltersOnScroll, { passive: true });

// ===== FILTER STATE =====
const filterSets = { rarity: new Set(), element: new Set(), type: new Set(), state: new Set(), bdSpecial: new Set(), omoideRarity: new Set() };

function toggleFilter(key, val, btn) {
  if (filterSets[key].has(val)) { filterSets[key].delete(val); btn.classList.remove('on'); }
  else                           { filterSets[key].add(val);    btn.classList.add('on'); }
  applyFilters();
}

// ===== FILTER LOGIC =====
['f-sort'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

function toggleSortDir() {
  sortDesc = !sortDesc;
  document.getElementById('sort-dir').textContent = sortDesc ? '↓' : '↑';
  applyFilters();
}

function getBestState(c) {
  for (const s of ['極弐', '改造', '通常']) {
    if (c.states?.[s]) return c.states[s];
  }
  return null;
}

function getSortValue(c, key) {
  const fn = CHARA_SPEC.sortFns[key];
  return fn ? fn(c) : null;
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('f-sort').value = '';
  Object.keys(filterSets).forEach(k => {
    filterSets[k].clear();
    document.querySelectorAll(`#f-${k} .ftog`).forEach(b => b.classList.remove('on'));
  });
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.trim();
  sortKey = document.getElementById('f-sort').value;

  filteredChars = FilterCore.applyFilters(allChars, {
    q: q,
    filters: filterSets,
    sortKey: sortKey,
    sortDesc: sortDesc,
  }, CHARA_SPEC);

  // Default order when no sort key: by sort_id/id (preserve existing behavior)
  if (!sortKey) {
    filteredChars.sort((a, b) => {
      const va = a.sort_id ?? a.id ?? 0;
      const vb = b.sort_id ?? b.id ?? 0;
      return sortDesc ? vb - va : va - vb;
    });
  }

  document.getElementById('char-count').textContent = `${filteredChars.length} 件`;
  renderList();
}

// ===== RENDER LIST =====
function _fmtSortVal(v) {
  if (v == null) return '—';
  if (typeof v !== 'number') return String(v);
  return Number.isInteger(v) ? v.toLocaleString('en-US') : String(v);
}
function renderSortBadge(c, key) {
  return `<span class="sort-val">${_fmtSortVal(getSortValue(c, key))}</span>`;
}

function renderList() {
  const list = document.getElementById('char-list');
  if (filteredChars.length === 0) {
    list.innerHTML = '<div class="no-results">該当なし</div>';
    return;
  }
  list.innerHTML = filteredChars.map(c => {
    const rLabel = RARITY[c.rarity] || c.rarity || '?';
    const eName  = ELEMENT[c.element] || String(c.element) || '?';
    const wName  = WEAPON[c.type] || String(c.type) || '-';
    const stateKeys = Object.keys(c.states || {});
    const dots = ['極弐','改造','通常'].map(s =>
      `<div class="state-dot ${stateKeys.includes(s) ? 'has' : ''}" title="${s}"></div>`
    ).join('');
    const sortBadge = sortKey ? renderSortBadge(c, sortKey) : '';
    return `<div class="char-item ${c.id === selectedId ? 'active' : ''}" data-id="${c.id}">
      <div class="badges">
        <span class="badge ${rLabel}">${rLabel}</span>
        <span class="badge elem-${c.element}">${eName}</span>
        <span class="badge weapon">${escHtml(wName)}</span>
      </div>
      <div class="char-name">${escHtml(c.name)}</div>
      ${sortBadge}
      <div class="state-dots">${dots}</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.char-item').forEach(el => {
    el.addEventListener('click', () => selectChar(parseInt(el.dataset.id)));
  });

  // Scroll selected item into view
  if (selectedId !== null) {
    const active = list.querySelector('.char-item.active');
    if (active) active.scrollIntoView({block:'nearest'});
  }
}

// ===== SELECT CHARACTER =====
function selectChar(id) {
  selectedId = id;
  renderList();
  const c = allChars.find(x => x.id === id);
  if (!c) return;
  document.getElementById('placeholder').style.display = 'none';
  const detail = document.getElementById('chara-detail');
  detail.style.display = 'block';
  detail.innerHTML = renderDetail(c);

// ===== RENDER STATE CONTENT =====
function _deletedSkillSet(c) {
  return new Set(Array.isArray(c && c._deleted_skills) ? c._deleted_skills : []);
}

function renderStateContent(state, stateLabel, chara) {
  const parts = [];
  const dead  = _deletedSkillSet(chara);

  // --- Skills (base filtered by tombstone + user-added per state) ---
  const baseSkills  = state.skills || [];
  const addedSkills = (chara && chara._added_skills && chara._added_skills[stateLabel]) || [];
  const baseV  = baseSkills.filter(s => !dead.has(s.name||''));
  const allSkills = baseV.concat(addedSkills);
  if (allSkills.length) {
    const cards = allSkills.map(s =>
      '<div class="skill-card"><div class="skill-name-row"><span class="skill-name">' + escHtml(s.name) + '</span>' + renderRightTags(s) + '</div><div class="skill-effect-row"><span class="skill-effect">' + escHtml(s.effect) + '</span><span class="skill-bairitu">' + fmtBairitu(s) + '</span></div></div>'
    ).join('');
    parts.push(`<div class="section"><div class="section-title">スキル構成 (${allSkills.length})</div><div class="skills-list">${cards}</div></div>`);
  }

  // --- Stats ---
  if (state.stats) {
    parts.push(`<div class="section"><div class="section-title">ステータス</div>${renderStats(state.stats, stateLabel)}</div>`);
  }

  // --- Basic Info ---
  if (state.basic_info) {
    parts.push(`<div class="section"><div class="section-title">基本情報</div>${renderBasicInfo(state.basic_info)}</div>`);
  }

  // --- Profile ---
  if (state.profile && Object.keys(state.profile).length > 0) {
    const rows = Object.entries(state.profile)
      .filter(([k]) => k !== 'B' && k !== 'W' && k !== 'H')
      .map(([k,v]) =>
        `<div class="profile-key">${escHtml(k)}</div><div class="profile-val">${escHtml(v)}</div>`
      ).join('');
    parts.push(`
      <div class="section">
        <div class="section-title">プロフィール</div>
        <div class="profile-table">${rows}</div>
      </div>`);
  }

  return parts.join('') || '<div class="no-results">データなし</div>';
}

// ===== RENDER STATS =====
function renderStats(stats, stateLabel) {
  const STAT_LABELS = {
    HP:'HP', '攻撃力':'攻撃力', '防御力':'防御力',
    'ブレイク力':'ブレイク力', 'フルヒット攻撃力':'フルヒット'
  };

  // All states now use {max:{...}} or {initial:{...}, max:{...}}
  const maxStats   = stats.max    || {};
  const initStats  = stats.initial || null;
  const keys = Object.keys(maxStats);

  const cards = keys.map(k => {
    const lbl = STAT_LABELS[k] || k;
    const max = fmt(maxStats[k]);
    const init = initStats ? fmt(initStats[k]) : null;
    return `<div class="stat-card">
      <div class="stat-label">${escHtml(lbl)}</div>
      <div class="stat-row">
        <span class="stat-row-label">最大</span>
        <span class="stat-row-value">${max}</span>
      </div>
      ${init !== null ? `<div class="stat-row">
        <span class="stat-row-label">初期</span>
        <span class="stat-row-value init">${init}</span>
      </div>` : ''}
    </div>`;
  }).join('');
  return `<div class="stat-grid">${cards}</div>`;
}

// ===== RENDER BASIC INFO =====
function renderBasicInfo(info) {
  const rows = Object.entries(info).map(([k, v]) => {
    let displayVal;
    if (k === 'Hit数' && Array.isArray(v)) {
      const phases = v.map((n,i) => `<span class="hit-phase">${n}</span>${i<v.length-1?'<span class="hit-arrow">-</span>':''}`).join('');
      const total = v.reduce((a,b)=>a+b,0);
      displayVal = `<div class="hit-phases">${phases}<span style="color:var(--text2);font-size:11px;margin-left:4px">合計${total}hit</span></div>`;
    } else if (k === 'Hit数' && typeof v === 'number') {
      // Legacy: single number stored before fix
      displayVal = `${v}hit`;
    } else {
      displayVal = escHtml(String(v ?? '-'));
    }
    return `<div class="info-cell label">${escHtml(k)}</div><div class="info-cell value">${displayVal}</div>`;
  }).join('');
  return `<div class="info-table">${rows}</div>`;
}

// ===== HELPERS =====
function fmt(n) {
  if (n == null) return '-';
  if (typeof n === 'number') return n.toLocaleString('ja-JP');
  return String(n);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== PATH UTILITIES =====
function getPath(obj, pathStr) {
  return pathStr.split('.').reduce((cur, k) => (cur == null ? undefined : cur[k]), obj);
}

function toggleBunrui(path, b, btn) {
  var prev = (getPath(editData, path + '.bunrui') || []).slice();
  var arr  = prev.slice();
  var idx  = arr.indexOf(b);
  if (idx >= 0) { arr.splice(idx, 1); btn.classList.remove('on'); }
  else { arr.push(b); arr.sort(function(a,b){return a-b;}); btn.classList.add('on'); }
  setPath(editData, path + '.bunrui', arr);
  // When bunrui becomes [7]-only, bairitu/bairitu_scaling are no longer meaningful — zero them
  var nowHitOnly = arr.length === 1 && arr[0] === 7;
  if (nowHitOnly) {
    setPath(editData, path + '.bairitu', 0);
    if (getPath(editData, path + '.bairitu_scaling') != null) {
      setPath(editData, path + '.bairitu_scaling', 0);
    }
  }
  // Re-render so bairitu/bairitu_scaling and hit fields toggle visibility
  var prevHitOnly = prev.length === 1 && prev[0] === 7;
  var prevHasHit  = prev.includes(7);
  var nowHasHit   = arr.includes(7);
  if (prevHasHit !== nowHasHit || prevHitOnly !== nowHitOnly) {
    if (typeof reRenderActiveState === 'function') reRenderActiveState();
  }
}

function setPath(obj, pathStr, value) {
  const parts = pathStr.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (cur[parts[i]] == null) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function setHit(stateLabel, idx, value) {
  const arr = editData.states[stateLabel].basic_info['Hit数'];
  if (Array.isArray(arr)) arr[idx] = value;

function _deepDiff(oval, mval) {
  // Plain object: recurse into changed keys
  if (mval && typeof mval === 'object' && !Array.isArray(mval) &&
      oval && typeof oval === 'object' && !Array.isArray(oval)) {
    const sub = {};
    for (const k in mval)
      if (JSON.stringify(mval[k]) !== JSON.stringify(oval[k]))
        sub[k] = _deepDiff(oval[k], mval[k]);
    return sub;
  }
  // Same-length array of objects: sparse index-keyed diff (only changed indices)
  if (Array.isArray(oval) && Array.isArray(mval) && oval.length === mval.length &&
      mval.length > 0 &&
      mval.every(x => x && typeof x === 'object' && !Array.isArray(x))) {
    const sparse = {};
    mval.forEach((m, i) => {
      if (JSON.stringify(m) !== JSON.stringify(oval[i]))
        sparse[i] = _deepDiff(oval[i], m);
    });
    return sparse;
  }
  return JSON.parse(JSON.stringify(mval));
}
function computeDiff(original, modified) {
  const diff = { id: modified.id, name: modified.name };
  for (const key in modified) {
    if (key === 'id') continue;
    if (JSON.stringify(modified[key]) !== JSON.stringify(original[key]))
      diff[key] = _deepDiff(original[key], modified[key]);
  }
  return diff;
}
function deepApply(target, patch) {
  for (var k in patch) {
    if (k === 'id') continue;
    var pv = patch[k], tv = target[k];
    // Sparse array diff: target field is array, patch is plain object with numeric-string keys
    if (Array.isArray(tv) && pv && typeof pv === 'object' && !Array.isArray(pv) &&
        Object.keys(pv).every(kk => /^\d+$/.test(kk))) {
      for (var idx in pv) {
        var i = +idx;
        if (i >= tv.length) continue;
        var pvi = pv[idx];
        if (pvi && typeof pvi === 'object' && !Array.isArray(pvi) &&
            tv[i] && typeof tv[i] === 'object' && !Array.isArray(tv[i])) {
          deepApply(tv[i], pvi);
        } else {
          tv[i] = JSON.parse(JSON.stringify(pvi));
        }
      }
    } else if (pv !== null && typeof pv === 'object' && !Array.isArray(pv) &&
        tv !== null && typeof tv === 'object' && !Array.isArray(tv)) {
      deepApply(tv, pv);
    } else {
      target[k] = JSON.parse(JSON.stringify(pv));
    }
  }
}

function saveEdit() {
  if (!editData) return;
  // Strip null slots (unselected after 追加)
  if (editData.omoide) {
    editData.omoide.forEach(function(row) {
      row.slots = (row.slots || []).filter(function(s) { return s != null; });
    });
    editData.omoide = editData.omoide.filter(function(row) { return row.slots.length > 0; });
  }
  // Clean up empty tombstone / added skill arrays
  if (Array.isArray(editData._deleted_skills) && editData._deleted_skills.length === 0) {
    delete editData._deleted_skills;
  }
  if (editData._added_skills && typeof editData._added_skills === 'object') {
    Object.keys(editData._added_skills).forEach(k => {
      if (!Array.isArray(editData._added_skills[k]) || editData._added_skills[k].length === 0)
        delete editData._added_skills[k];
    });
    if (!Object.keys(editData._added_skills).length) delete editData._added_skills;
  }
  const id  = editData.id;
  const idx = allChars.findIndex(x => x.id === id);
  if (idx >= 0) {
    const changed = JSON.stringify(editData) !== JSON.stringify(originalData[id]);
    allChars[idx] = editData;
    if (changed) {
      const diff = computeDiff(originalData[id], editData);
      const charDiff = { id: diff.id, name: diff.name };
      const omoideDiff = { id: diff.id, name: diff.name };
      let hasChar = false, hasOmoide = false;
      for (const key in diff) {
        if (key === 'id' || key === 'name') continue;
        if (OMOIDE_KEYS.has(key)) { omoideDiff[key] = diff[key]; hasOmoide = true; }
        else                       { charDiff[key]   = diff[key]; hasChar   = true; }
      }
      if (hasChar)   { reviseData[id]       = charDiff;   } else { delete reviseData[id]; }
      if (hasOmoide) { omoideReviseData[id] = omoideDiff; } else { delete omoideReviseData[id]; }
      sessionReviseIds.add(id);
    } else {
      delete reviseData[id];
      delete omoideReviseData[id];
      sessionReviseIds.delete(id);
    }
    updateReviseBar();
  }
  editData = null;
  selectChar(selectedId);
}

async function saveRevise() {
  const btn    = document.querySelector('.btn-revise-save');
  const status = document.getElementById('revise-status');
  btn.textContent = '保存中...';
  btn.disabled    = true;
  try {
    const res  = await fetch('/save', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ revise: Object.values(reviseData), omoide_revise: Object.values(omoideReviseData) }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || res.status);
    sessionReviseIds.clear();
    status.textContent = '✓ 保存完了';
  } catch (err) {
    status.textContent = '保存失敗';
    console.error(err);
  } finally {
    btn.disabled = false;
    updateReviseBar();
  }
}

      return `
      <div class="skill-edit-card${isDeleted?' deleted':''}">
        ${tombBtn}
        ${nameField}
        ${effectField}
        ${isDeleted ? '<div style="color:#ff8080;font-size:12px;padding:4px 0">⚠ このスキルは削除マーク中（保存後ビューで非表示）</div>' : effectBlocks}
      </div>`;
    }).join('');
    parts.push(`<div class="section"><div class="section-title">スキル構成 (${baseSkills.length + addedSkills.length})</div><div class="skills-list">${cards}</div><button class="btn-add-slot" style="margin-top:8px" onclick="addNewCharaSkill('${lbl}')">+ スキル追加</button></div>`);
  }

  // Stats
  if (state.stats) {
    const maxS  = state.stats.max  || {};
    const initS = state.stats.initial || null;
    const cards = Object.keys(maxS).map(k => {
      const lbl2 = {HP:'HP','攻撃力':'攻撃力','防御力':'防御力','ブレイク力':'ブレイク力','フルヒット攻撃力':'フルヒット'}[k] || k;

        ${initS ? `<div class="stat-row">
          <span class="stat-row-label">初期</span>
          <input type="number" class="edit-stat-num init" value="${initS[k]??''}"
                 oninput="setPath(editData,'${p}.stats.initial.${k}',this.value===''?null:Number(this.value))">
        </div>` : ''}
      </div>`;
    }).join('');
    parts.push(`<div class="section"><div class="section-title">ステータス</div><div class="stat-grid">${cards}</div></div>`);
  }

  // Basic Info
  if (state.basic_info) {
    const STRING_KEYS = new Set(['武器種','モーション','結晶スロット']);
    const rows = Object.entries(state.basic_info).map(([k, v]) => {
      let inp;
      if (k === 'Hit数' && Array.isArray(v)) {
        inp = `<div class="hit-inputs">${v.map((n,i)=>
          `<input type="number" class="hit-num" value="${n}"
                  oninput="setHit('${lbl}',${i},Number(this.value))">`
          + (i<v.length-1?'<span class="hit-arrow">-</span>':'')).join('')}</div>`;
      } else if (STRING_KEYS.has(k)) {
        inp = `<input class="edit-input" value="${escHtml(String(v??''))}"
                      oninput="setPath(editData,'${p}.basic_info.${k}',this.value)">`;
      } else {
        inp = `<input type="number" class="edit-input" value="${v??''}"
                      oninput="setPath(editData,'${p}.basic_info.${k}',this.value===''?null:Number(this.value))">`;
      }
      return `<div class="info-cell label">${escHtml(k)}</div><div class="info-cell value">${inp}</div>`;
    }).join('');
    parts.push(`<div class="section"><div class="section-title">基本情報</div><div class="info-table">${rows}</div></div>`);
  }

  return parts.join('') || '<div class="no-results">データなし</div>';
}

function toggleSkillTombstone(name) {
  if (!editData) return;
  if (!Array.isArray(editData._deleted_skills)) editData._deleted_skills = [];
  const idx = editData._deleted_skills.indexOf(name);
  if (idx >= 0) editData._deleted_skills.splice(idx, 1);
  else          editData._deleted_skills.push(name);
  reRenderActiveState();
}

function addNewCharaSkill(stateLabel) {
  if (!editData) return;
  if (!editData._added_skills || typeof editData._added_skills !== 'object' || Array.isArray(editData._added_skills)) {
    editData._added_skills = {};
  }
  if (!Array.isArray(editData._added_skills[stateLabel])) editData._added_skills[stateLabel] = [];
  editData._added_skills[stateLabel].push({
    name: '新しいスキル',
    effect: '',
    effects: [{bunrui:[1], scope:0, condition:0, calc_type:0, bairitu:0, bairitu_scaling:0}]
  });
  reRenderActiveState();
}

function removeAddedCharaSkill(stateLabel, i) {
  if (!editData || !editData._added_skills || !editData._added_skills[stateLabel]) return;
  editData._added_skills[stateLabel].splice(i, 1);
  if (!editData._added_skills[stateLabel].length) delete editData._added_skills[stateLabel];
  reRenderActiveState();
}

function reRenderActiveState() {
  // Re-render the entire chara detail (preserves active state via switchState below)
  const detail = document.getElementById('chara-detail');
  if (!detail || !editData) return;
  const active = activeState[editData.id] || Object.keys(editData.states || {})[0];
  detail.innerHTML = renderEditDetail(editData);
  if (active) switchState(editData.id, active, detail);
}

function setHitStage(path, idx, val) {
  var arr = (getPath(editData, path + '.hit_per_stage') || [null, null, null]).slice();
  while (arr.length < 3) arr.push(null);
  arr[idx] = val === '' ? null : +val;
  setPath(editData, path + '.hit_per_stage', arr);
}

function setHitStageScaling(path, idx, val) {
  var arr = (getPath(editData, path + '.hit_per_stage_scaling') || [null, null, null]).slice();
  while (arr.length < 3) arr.push(null);
  arr[idx] = val === '' ? null : +val;
  setPath(editData, path + '.hit_per_stage_scaling', arr);
}

function _renderHitEdit(ep, e) {
  if (!(e.bunrui || []).includes(7)) return '';
  var ht  = e.hit_type != null ? e.hit_type : 0;
  var hps = Array.isArray(e.hit_per_stage) ? e.hit_per_stage : [null, null, null];
  var hpss = Array.isArray(e.hit_per_stage_scaling) ? e.hit_per_stage_scaling : [null, null, null];
  function opt(v, lbl) {
    return '<option value="' + v + '"' + (ht === v ? ' selected' : '') + '>' + lbl + '</option>';
  }
  function stageIn(idx) {
    var v = hps[idx] != null ? hps[idx] : '';
    return '<div><div class="field-label">' + (idx + 1) + '撃</div>'
      + '<input type="number" step="any" class="edit-num-sm" style="width:42px" value="' + v + '"'
      + ' oninput="setHitStage(\'' + ep + '\',' + idx + ',this.value)"></div>';
  }
  function scaleIn(idx) {
    var v = hpss[idx] != null ? hpss[idx] : '';
    return '<div><div class="field-label">' + (idx + 1) + '撃+</div>'
      + '<input type="number" step="any" class="edit-num-sm" style="width:42px" value="' + v + '"'
      + ' oninput="setHitStageScaling(\'' + ep + '\',' + idx + ',this.value)"></div>';
  }
  return '<div class="field-label" style="margin-top:6px">ヒット計算 <span style="font-weight:400;color:var(--text2)">(bunrui=7)</span></div>'
    + '<div class="skill-edit-meta">'
    + '<div><div class="field-label">hit_type</div>'
    + '<select class="edit-select" onchange="setPath(editData,\'' + ep + '.hit_type\',+this.value)">'
    + opt(0, '0 減衰なし加算') + opt(1, '1 ダメージ維持加算') + opt(2, '2 乗算') + opt(3, '3 設定値')
    + '</select></div>'
    + stageIn(0) + stageIn(1) + stageIn(2)
    + scaleIn(0) + scaleIn(1) + scaleIn(2)
    + '</div>';
}

// ===== LATENT EDIT =====
function _senzaiLabel(iconId) {
  var tbl = (typeof SENZAI_TABLE !== 'undefined') ? SENZAI_TABLE : {};
  var info = tbl[iconId] || tbl[String(iconId)] || {};
  var bVal = (info.bairitu != null && info.bairitu !== 0) ? ' (' + ctPfx(info.calc_type) + fmtNum(info.bairitu) + ')' : '';
  return (info.koka || ('icon ' + iconId)) + bVal;
}

var _OMOIDE_RARITY_TH = new Set([45000, 60000, 75000, 90000]);
var _ICON_TO_RARITY   = {88:1, 89:2, 90:3, 91:4, 92:5};

function getLinkedThresholds(threshold, omoideRarity) {
  var star1 = [10, 200, 700, 2000, 3000, 5000, 7000, 9000, 13000];
  var s2h = [], s3h = [], icon = [];
  for (var n = 0; n < 5; n++) {
    [18000, 21000, 27000].forEach(function(b) { s2h.push(b + 15000 * n); });
    s3h.push(24000 + 15000 * n);
    icon.push(30000 + 15000 * n);
  }
  // SS/限定SS (rarity=4/5): 6000 も同じ rarity icon → icon group に追加
  if (omoideRarity === 4 || omoideRarity === 5) icon.push(6000);
  // A (rarity=1) の 30000 は icon group に入らない（star3_high 扱い）
  if (omoideRarity === 1) icon = icon.filter(function(t) { return t !== 30000; });
  if (star1.indexOf(threshold) >= 0) return star1;
  if (s2h.indexOf(threshold) >= 0) return s2h;
  if (s3h.indexOf(threshold) >= 0) return s3h;
  if (icon.indexOf(threshold) >= 0) return icon;
  return null;
}

function makeLCSHtml(iconId, t, slotIdx, restricted) {
  var tbl = (typeof SENZAI_TABLE !== 'undefined') ? SENZAI_TABLE : {};
  var keys = Object.keys(tbl).sort(function(a, b) { return parseInt(a) - parseInt(b); });
  if (restricted) keys = keys.filter(function(k) { return +k >= 88 && +k <= 92; });
  var opts = keys.map(function(k) {
    var info = tbl[k];
    var bVal = (info.bairitu != null && info.bairitu !== 0) ? ' (' + ctPfx(info.calc_type) + fmtNum(info.bairitu) + ')' : '';
    var label = (info.koka || ('icon ' + k)) + bVal;
    var sel = (iconId != null && parseInt(k) === iconId) ? ' class="lcs-opt lcs-selected"' : ' class="lcs-opt"';
    return '<div' + sel + ' data-val="' + k + '" onclick="selectLCS(this,' + t + ',' + slotIdx + ')">' + escHtml(label) + '</div>';
  }).join('');
  var triggerLabel = iconId != null ? _senzaiLabel(iconId) : '選択...';
  var searchHtml = restricted ? '' : '<input class="lcs-search" type="text" placeholder="絞込..." oninput="filterLCS(this)">';
  return '<div class="latent-edit-chip">'
    + '<button class="lcs-trigger" onclick="toggleLCS(event,this)">' + escHtml(triggerLabel) + '</button>'
    + '<div class="lcs-dropdown">'
    + searchHtml
    + '<div class="lcs-list">' + opts + '</div>'
    + '</div>'
    + '<button class="latent-rm-btn" onclick="removeLatentSlot(' + t + ',' + slotIdx + ')">×</button>'
    + '</div>';
}

function renderLatentEditBody(c) {
  var omoideMap = {};
  (c.omoide || []).forEach(function(row) { omoideMap[row.threshold] = row.slots || []; });
  return OMOIDE_THRESHOLDS.map(function(t) {
    var restricted = _OMOIDE_RARITY_TH.has(t);
    var slots = omoideMap[t] || [];
    var slotsHtml = slots.map(function(iconId, slotIdx) {
      return makeLCSHtml(iconId, t, slotIdx, restricted);
    }).join('');
    var showAdd = !restricted || slots.length === 0;
    var addBtn = showAdd ? '<button class="btn-add-slot" onclick="addLatentSlot(' + t + ')">+ 追加</button>' : '';
    return '<div class="latent-edit-row">'
      + '<div class="latent-edit-label">思い出 ' + t.toLocaleString('ja-JP') + '</div>'
      + '<div class="latent-edit-slots">' + slotsHtml + addBtn
      + '</div></div>';
  }).join('');
}

var _lcsOpen = null;

function toggleLCS(e, triggerBtn) {
  e.stopPropagation();
  var chip = triggerBtn.parentElement;
  var dropdown = chip.querySelector('.lcs-dropdown');
  if (_lcsOpen === dropdown) { closeLCS(); return; }
  closeLCS();
  var rect = triggerBtn.getBoundingClientRect();
  var top = rect.bottom + 2;
  var left = rect.left;
  if (top + 220 > window.innerHeight) top = rect.top - 220;
  if (left + 244 > window.innerWidth) left = window.innerWidth - 248;
  dropdown.style.top = top + 'px';
  dropdown.style.left = left + 'px';
  dropdown.style.display = 'block';
  _lcsOpen = dropdown;
  var s = dropdown.querySelector('.lcs-search');
  s.value = ''; filterLCS(s);
}

function closeLCS() {
  if (_lcsOpen) { _lcsOpen.style.display = 'none'; _lcsOpen = null; }
}

function filterLCS(input) {
  var q = input.value.toLowerCase();
  input.closest('.lcs-dropdown').querySelectorAll('.lcs-opt').forEach(function(opt) {
    opt.style.display = opt.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function selectLCS(optEl, threshold, slotIdx) {
  var icon = parseInt(optEl.dataset.val);
  changeLatentSlot(threshold, slotIdx, icon);
  if (threshold === 90000 && _ICON_TO_RARITY[icon] != null) {
    editData.omoide_rarity = _ICON_TO_RARITY[icon];
  }
  var linked = getLinkedThresholds(threshold, editData.omoide_rarity);
  if (linked && linked.length > 1) {
    linked.forEach(function(t) {
      if (t === threshold) return;
      var row = (editData.omoide || []).find(function(r) { return r.threshold === t; });
      if (row && slotIdx < row.slots.length) row.slots[slotIdx] = icon;
    });
    reRenderLatentEdit();
    return;
  }
  var chip = optEl.closest('.latent-edit-chip');
  chip.querySelector('.lcs-trigger').textContent = optEl.textContent;
  optEl.closest('.lcs-list').querySelectorAll('.lcs-opt').forEach(function(o) {
    o.classList.toggle('lcs-selected', o === optEl);
  });
  closeLCS();
}

document.addEventListener('click', function(e) {
  if (_lcsOpen && !e.target.closest('.latent-edit-chip')) closeLCS();
});

// ===== OMOIDE TEMPLATE =====
function getCrystalSlotsJS(c) {
  for (const lbl of ['改造', '極弐', '通常']) {
    const v = c.states?.[lbl]?.basic_info?.['結晶スロット'];
    if (v != null) { const n = parseInt(v); if (!isNaN(n)) return n; }
  }
  return 0;
}

function fillOmoideSlots(omoideArr, omoideRarity, k, star2High, star3High) {
  const omap = {};
  (omoideArr || []).forEach(r => { if (r.slots?.length) omap[r.threshold] = r.slots; });
  const star1 = omap[10] || [], star2 = omap[400] || [];
  const star3_raw = omap[1000] || [];
  if (!star1.length && !star2.length && !star3_raw.length) return omoideArr;
  const _s3icon = x => x>=54&&x<=64 ? x+4 : x>=83&&x<=87 ? x+1 : x<=82 ? x+6 : x;
  // If 1000好感 count != 400好感 count → special slot, derive per type
  let star3;
  if (star2.length && star3_raw.length && star3_raw.length !== star2.length)
    star3 = star2.map(_s3icon);
  else if (star2.length && !star3_raw.length)
    star3 = star2.map(_s3icon);
  else
    star3 = star3_raw;
  const r = omoideRarity || 1;
  const s2h = star2High?.length ? star2High : star2;
  const s3h = star3High?.length ? star3High : (star2High?.length ? s2h.map(_s3icon) : star3);
  const rules = {};
  [2000,3000,5000,7000,9000,13000].forEach(t => { rules[t] = star1; });
  rules[4000] = star2;
  rules[6000]  = r===5?[92]:r===4?[91]:(k>=3?star3:[93]);
  rules[11000] = star3;
  rules[15000] = r>=4?[94,95,96]:(k>=4?star3:[93]);
  for (let n = 0; n < 5; n++) {
    rules[18000+15000*n] = s2h;
    rules[21000+15000*n] = s2h;
    rules[24000+15000*n] = s3h;
    rules[27000+15000*n] = s2h;
    const t30 = 30000+15000*n;
    rules[t30] = r===5?[92]:r===4?[91]:r===3?[90]:r===2?[89]:(n===0?s3h:[88]);
  }
  const BASE = new Set([10,200,400,700,1000]);
  for (const [t, slots] of Object.entries(rules))
    if (!BASE.has(+t) && slots.length) omap[+t] = slots;
  return Object.keys(omap).sort((a,b)=>+a-+b)
    .map(t => ({threshold:+t, slots:omap[t]})).filter(r => r.slots.length);
}

function renderOmoideTemplateBar(c) {
  const opts = omoideTemplates.map(t =>
    `<option value="${t.id}"${c.omoide_template===t.id?' selected':''}>${escHtml(t.name)}</option>`
  ).join('');
  return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap">
    <select id="omoide-tpl-sel" class="edit-select" style="flex:1;min-width:120px">
      <option value="">テンプレートを選択...</option>
      ${opts}
    </select>
    <button class="btn-add-slot" onclick="applyOmoideTemplate()" style="white-space:nowrap;padding:3px 10px">適用</button>
    <button class="btn-add-slot" onclick="saveOmoideTemplate()" style="white-space:nowrap;padding:3px 10px">テンプレ保存</button>
  </div>`;
}

var _promptCb = null;
function showPrompt(title, defaultVal, cb) {
  _promptCb = cb;
  document.getElementById('prompt-title').textContent = title;
  const inp = document.getElementById('prompt-input');
  inp.value = defaultVal || '';
  const modal = document.getElementById('prompt-modal');
  modal.style.display = 'flex';
  setTimeout(() => { inp.focus(); inp.select(); }, 50);
}
function _promptConfirm() {
  const val = document.getElementById('prompt-input').value.trim();
  document.getElementById('prompt-modal').style.display = 'none';
  if (_promptCb) { _promptCb(val); _promptCb = null; }
}
function _promptCancel() {
  document.getElementById('prompt-modal').style.display = 'none';
  _promptCb = null;
}

function saveOmoideTemplate() {
  if (!editData) { alert('編集モードではありません'); return; }
  if (!editData.omoide || !editData.omoide.length) { alert('潜在データがありません'); return; }

  const sel = document.getElementById('omoide-tpl-sel');
  const existingId = sel?.value ? +sel.value : null;
  const existing = existingId ? omoideTemplates.find(t => t.id === existingId) : null;
  showPrompt('テンプレートを保存', existing?.name || 'テンプレート名', function(trimmed) {
    if (!trimmed) { alert('名前を入力してください'); return; }
    const omoide = JSON.parse(JSON.stringify(editData.omoide));
    if (existing) {
      existing.name = trimmed;
      existing.omoide = omoide;
    } else {
      const newId = omoideTemplates.length ? Math.max(...omoideTemplates.map(t => t.id)) + 1 : 1;
      omoideTemplates.push({ id: newId, name: trimmed, omoide });
    }
    fetch('/save', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ omoide_templates: omoideTemplates }) })
      .then(r => r.json())
      .then(j => {
        if (!j.ok) throw new Error(j.error);
        const savedId = existing ? existing.id : omoideTemplates[omoideTemplates.length - 1].id;
        const bar = document.getElementById('omoide-tpl-sel');
        if (bar) {
          bar.innerHTML = '<option value="">テンプレートを選択...</option>'
            + omoideTemplates.map(t =>
                `<option value="${t.id}"${t.id===savedId?' selected':''}>${escHtml(t.name)}</option>`
              ).join('');
          bar.value = savedId;
        }
        if (editData) editData.omoide_template = savedId;
      })
      .catch(e => { alert('保存失敗: ' + e.message); });
  });
}

function applyOmoideTemplate() {
  const sel = document.getElementById('omoide-tpl-sel');
  if (!sel || !sel.value) return;
  const tpl = omoideTemplates.find(t => t.id === +sel.value);
  if (!tpl?.omoide) return;
  editData.omoide = JSON.parse(JSON.stringify(tpl.omoide));
  editData.omoide_template = tpl.id;
  reRenderLatentEdit();
}

function reRenderLatentEdit() {
  closeLCS();
  var el = document.getElementById('latent-edit-section');
  if (el) el.innerHTML = renderLatentEditBody(editData);
}

function ensureOmoideRow(threshold) {
  if (!editData.omoide) editData.omoide = [];
  var row = editData.omoide.find(function(r) { return r.threshold === threshold; });
  if (!row) {
    row = { threshold: threshold, slots: [] };
    editData.omoide.push(row);
    editData.omoide.sort(function(a, b) { return a.threshold - b.threshold; });
  }
  return row;
}

function addLatentSlot(threshold) {
  var row = ensureOmoideRow(threshold);
  row.slots.push(null);
  var linked = getLinkedThresholds(threshold, editData.omoide_rarity);
  if (linked) {
    linked.forEach(function(t) {
      if (t === threshold) return;
      ensureOmoideRow(t).slots.push(null);
    });
  }
  reRenderLatentEdit();
}

function removeLatentSlot(threshold, slotIdx) {
  var row = (editData.omoide || []).find(function(r) { return r.threshold === threshold; });
  if (!row) return;
  row.slots.splice(slotIdx, 1);
  var linked = getLinkedThresholds(threshold, editData.omoide_rarity);
  if (linked) {
    linked.forEach(function(t) {
      if (t === threshold) return;
      var r2 = (editData.omoide || []).find(function(r) { return r.threshold === t; });
      if (r2 && slotIdx < r2.slots.length) r2.slots.splice(slotIdx, 1);
    });
  }
  reRenderLatentEdit();
}

function changeLatentSlot(threshold, slotIdx, iconId) {
  var row = (editData.omoide || []).find(function(r) { return r.threshold === threshold; });
  if (row) row.slots[slotIdx] = parseInt(iconId);
}

// ===== LATENT MODAL =====
function openLatentModal(charaId) {
  var c = allChars.find(function(x) { return x.id === charaId; });
  if (!c || !hasOmoide(c)) return;
  var tbl = (typeof SENZAI_TABLE !== 'undefined') ? SENZAI_TABLE : {};
  function fmtBairituJP(v, calcType) {
    if (v == null || v === 0) return '';
    var pfx = ctPfx(calcType);
    if (v >= 100000000) {
      var b = v / 100000000;
      return pfx + (b % 1 === 0 ? b : parseFloat(b.toFixed(2))) + '億';
    } else if (v >= 10000) {
      var m = v / 10000;
      return pfx + (m % 1 === 0 ? m : parseFloat(m.toFixed(1))) + '万';
    }
    return pfx + fmtNum(v);
  }
  var html = c.omoide.filter(function(row) { return row.slots && row.slots.length > 0; }).map(function(row) {
    var slotsHtml = row.slots.map(function(iconId) {
      var info = tbl[iconId] || {};
      var bairitu = info.bairitu;
      var b = (bairitu != null && bairitu !== 0) ? fmtBairituJP(bairitu, info.calc_type) : '';
      var sc = (info.bairitu_scaling != null && info.bairitu_scaling !== 0) ? fmtNum(info.bairitu_scaling) : '';
      var bStr = b ? (sc ? b + ' + ' + sc + '×熟度' : b) : (sc ? sc + '×熟度' : '');
      var bClass = bStr ? 'latent-slot-bairitu' : 'latent-slot-bairitu empty';
      var bDisplay = bStr || '—';
      return '<div class="latent-slot">'
        + '<span class="latent-slot-koka">' + escHtml(info.koka || '?') + '</span>'
        + '<span class="latent-slot-syosai">' + escHtml(info.syosai || '') + '</span>'
        + '<span class="' + bClass + '">' + escHtml(bDisplay) + '</span>'
        + '</div>';
    }).join('');
    return '<div class="omoide-row">'
      + '<div class="omoide-label">思い出 ' + row.threshold.toLocaleString('ja-JP') + '</div>'
      + '<div class="omoide-slots">' + slotsHtml + '</div>'
      + '</div>';
  }).join('');
  document.getElementById('latent-body').innerHTML = html;
  var modal = document.getElementById('latent-modal');
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeLatentModal() {
  document.getElementById('latent-modal').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
  if (document.getElementById('prompt-modal').style.display === 'flex') {
    if (e.key === 'Enter')  { e.preventDefault(); _promptConfirm(); }
    if (e.key === 'Escape') { _promptCancel(); }
    return;
  }
  if (e.key === 'Escape') { closeLCS(); closeLatentModal(); }
});
</script>
