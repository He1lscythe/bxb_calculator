document.addEventListener('DOMContentLoaded', () => {
  initFilterToggles();
  fetch('../data/bladegraph.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(arr => {
      state.allBG = arr;
      arr.forEach(c => { state.originalData[c.id] = JSON.parse(JSON.stringify(c)); });
      applyFilters();
      hideLoading();
      return fetch('../data/bladegraph_revise.json');

    .then(r => r.ok ? r.json() : [])
    .then(arr => {
      arr.forEach(c => {
        state.reviseData[c.id] = c;
        const idx = state.allBG.findIndex(x => x.id === c.id);
        if (idx >= 0) deepApply(state.allBG[idx], c);
      });
      if (arr.length) applyFilters();
      // bladegraph_check.json は本地のみ：fetch 成功なら per-item checkbox UI を有効化
      return fetch('../data/bladegraph_check.json');
    })
    .then(r => r && r.ok ? r.json() : null)
    .then(arr => {
      if (Array.isArray(arr)) {
        state.bgCheckEnabled = true;
        arr.forEach(id => state.bgCheck.add(id));
        applyFilters();
      }
    })
    .catch(() => { applyFilters(); hideLoading(); });
